name: ${LAB_COMPOSE_PROJECT:?LAB_COMPOSE_PROJECT is required}

services:
  sql:
    image: ${LAB_SQL_IMAGE:?LAB_SQL_IMAGE is required}
    hostname: ${LAB_CONTAINER_HOSTNAME:-lab-sql}
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: Developer
      MSSQL_SA_PASSWORD: ${LAB_SQL_SA_PASSWORD:?LAB_SQL_SA_PASSWORD is required}
      MSSQL_COLLATION: SQL_Latin1_General_CP1_CS_AS
      MSSQL_MEMORY_LIMIT_MB: "2048"
    volumes:
      - type: bind
        source: ${LAB_DATA_DIR:?LAB_DATA_DIR is required}
        target: /var/opt/mssql
      - type: bind
        source: ${LAB_RUNTIME_DIR:?LAB_RUNTIME_DIR is required}
        target: /lab/runtime
    networks:
      - lab-data
    labels:
      lab001.owner: SQL_SERVER_ANALYZE
      lab001.run-id: ${LAB_RUN_ID:?LAB_RUN_ID is required}
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          sqlcmd_path="$$(command -v sqlcmd 2>/dev/null || true)";
          if [ -z "$$sqlcmd_path" ]; then
          for candidate in /opt/mssql-tools18/bin/sqlcmd /opt/mssql-tools/bin/sqlcmd;
          do if [ -x "$$candidate" ]; then sqlcmd_path="$$candidate"; break; fi; done;
          fi;
          test -n "$$sqlcmd_path" &&
          "$$sqlcmd_path" -C -b -S localhost -U sa
          -P "$$MSSQL_SA_PASSWORD" -Q "SET NOCOUNT ON; SELECT 1;"
          >/dev/null 2>&1
      interval: 5s
      timeout: 5s
      retries: 60
      start_period: 20s
    restart: "no"

networks:
  lab-data:
    internal: true
    labels:
      lab001.owner: SQL_SERVER_ANALYZE
      lab001.run-id: ${LAB_RUN_ID:?LAB_RUN_ID is required}
