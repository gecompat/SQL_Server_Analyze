name: ${QTLAB_COMPOSE_PROJECT:?QTLAB_COMPOSE_PROJECT is required}

x-quicktest-healthcheck: &quicktest-healthcheck
  test:
    - CMD-SHELL
    - >-
      sqlcmd_path="$$(command -v sqlcmd 2>/dev/null || true)";
      if [ -z "$$sqlcmd_path" ]; then
      for candidate in /opt/mssql-tools18/bin/sqlcmd /opt/mssql-tools/bin/sqlcmd;
      do if [ -x "$$candidate" ]; then sqlcmd_path="$$candidate"; break; fi; done;
      fi;
      test -n "$$sqlcmd_path" &&
      SQLCMDPASSWORD="$$MSSQL_SA_PASSWORD" "$$sqlcmd_path" -C -b
      -S localhost -U sa -Q
      "SET NOCOUNT ON; SELECT CONVERT(int, SERVERPROPERTY('ProductMajorVersion'));"
      >/dev/null 2>&1
  interval: 5s
  timeout: 5s
  retries: 60
  start_period: 20s

x-quicktest-environment: &quicktest-environment
  - ACCEPT_EULA=Y
  - MSSQL_PID=Developer
  - MSSQL_SA_PASSWORD
  - MSSQL_COLLATION=SQL_Latin1_General_CP1_CS_AS
  - MSSQL_MEMORY_LIMIT_MB=${QTLAB_SQL_MEMORY_MB:?QTLAB_SQL_MEMORY_MB is required}

services:
  sql2019:
    profiles: [sql2019]
    image: ${QTLAB_SQL2019_IMAGE:?QTLAB_SQL2019_IMAGE is required}
    container_name: ${QTLAB_SQL2019_CONTAINER:?QTLAB_SQL2019_CONTAINER is required}
    hostname: sql2019
    environment: *quicktest-environment
    ports:
      - target: 1433
        published: ${QTLAB_SQL2019_PORT:?QTLAB_SQL2019_PORT is required}
        protocol: tcp
        mode: host
    volumes:
      - type: bind
        source: ${QTLAB_SQL2019_DATA_DIR:?QTLAB_SQL2019_DATA_DIR is required}
        target: /var/opt/mssql/data
      - type: bind
        source: ${QTLAB_SQL2019_LOG_DIR:?QTLAB_SQL2019_LOG_DIR is required}
        target: /var/opt/mssql/log
      - type: bind
        source: ${QTLAB_SQL2019_BACKUP_DIR:?QTLAB_SQL2019_BACKUP_DIR is required}
        target: /var/opt/mssql/backup
      - type: bind
        source: ${QTLAB_RUNTIME_DIR:?QTLAB_RUNTIME_DIR is required}
        target: /lab/runtime
    networks: [quicktest-data]
    labels:
      qt-lab.owner: SQL_SERVER_ANALYZE
      qt-lab.scope: ${QTLAB_SCOPE:?QTLAB_SCOPE is required}
      qt-lab.run-id: ${QTLAB_RUN_ID:?QTLAB_RUN_ID is required}
      qt-lab.sql-version: "2019"
    healthcheck: *quicktest-healthcheck
    restart: "no"

  sql2022:
    profiles: [sql2022]
    image: ${QTLAB_SQL2022_IMAGE:?QTLAB_SQL2022_IMAGE is required}
    container_name: ${QTLAB_SQL2022_CONTAINER:?QTLAB_SQL2022_CONTAINER is required}
    hostname: sql2022
    environment: *quicktest-environment
    ports:
      - target: 1433
        published: ${QTLAB_SQL2022_PORT:?QTLAB_SQL2022_PORT is required}
        protocol: tcp
        mode: host
    volumes:
      - type: bind
        source: ${QTLAB_SQL2022_DATA_DIR:?QTLAB_SQL2022_DATA_DIR is required}
        target: /var/opt/mssql/data
      - type: bind
        source: ${QTLAB_SQL2022_LOG_DIR:?QTLAB_SQL2022_LOG_DIR is required}
        target: /var/opt/mssql/log
      - type: bind
        source: ${QTLAB_SQL2022_BACKUP_DIR:?QTLAB_SQL2022_BACKUP_DIR is required}
        target: /var/opt/mssql/backup
      - type: bind
        source: ${QTLAB_RUNTIME_DIR:?QTLAB_RUNTIME_DIR is required}
        target: /lab/runtime
    networks: [quicktest-data]
    labels:
      qt-lab.owner: SQL_SERVER_ANALYZE
      qt-lab.scope: ${QTLAB_SCOPE:?QTLAB_SCOPE is required}
      qt-lab.run-id: ${QTLAB_RUN_ID:?QTLAB_RUN_ID is required}
      qt-lab.sql-version: "2022"
    healthcheck: *quicktest-healthcheck
    restart: "no"

  sql2025:
    profiles: [sql2025]
    image: ${QTLAB_SQL2025_IMAGE:?QTLAB_SQL2025_IMAGE is required}
    container_name: ${QTLAB_SQL2025_CONTAINER:?QTLAB_SQL2025_CONTAINER is required}
    hostname: sql2025
    environment: *quicktest-environment
    ports:
      - target: 1433
        published: ${QTLAB_SQL2025_PORT:?QTLAB_SQL2025_PORT is required}
        protocol: tcp
        mode: host
    volumes:
      - type: bind
        source: ${QTLAB_SQL2025_DATA_DIR:?QTLAB_SQL2025_DATA_DIR is required}
        target: /var/opt/mssql/data
      - type: bind
        source: ${QTLAB_SQL2025_LOG_DIR:?QTLAB_SQL2025_LOG_DIR is required}
        target: /var/opt/mssql/log
      - type: bind
        source: ${QTLAB_SQL2025_BACKUP_DIR:?QTLAB_SQL2025_BACKUP_DIR is required}
        target: /var/opt/mssql/backup
      - type: bind
        source: ${QTLAB_RUNTIME_DIR:?QTLAB_RUNTIME_DIR is required}
        target: /lab/runtime
    networks: [quicktest-data]
    labels:
      qt-lab.owner: SQL_SERVER_ANALYZE
      qt-lab.scope: ${QTLAB_SCOPE:?QTLAB_SCOPE is required}
      qt-lab.run-id: ${QTLAB_RUN_ID:?QTLAB_RUN_ID is required}
      qt-lab.sql-version: "2025"
    healthcheck: *quicktest-healthcheck
    restart: "no"

networks:
  quicktest-data:
    labels:
      qt-lab.owner: SQL_SERVER_ANALYZE
      qt-lab.scope: ${QTLAB_SCOPE:?QTLAB_SCOPE is required}
      qt-lab.run-id: ${QTLAB_RUN_ID:?QTLAB_RUN_ID is required}
