name: Fix P2 Broker database batches

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/fix-p2-broker-database-batches.yml'

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Split database creation and configuration batches
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          path=Path('Code/Tests/Integration/182_P2_Service_Broker_Runtime_Contract.sql')
          text=path.read_text(encoding='utf-8')
          start="    SET @Sql=N'CREATE DATABASE '+QUOTENAME(@NoneDb)"
          end="    /* BROKER-NONE */"
          a=text.index(start)
          b=text.index(end,a)
          replacement='\n'.join([
              "    SET @Sql=N'CREATE DATABASE '+QUOTENAME(@NoneDb)+N';';",
              '    EXEC [sys].[sp_executesql] @Sql;',
              "    SET @Sql=N'ALTER DATABASE '+QUOTENAME(@NoneDb)+N' SET DISABLE_BROKER WITH ROLLBACK IMMEDIATE;';",
              '    EXEC [sys].[sp_executesql] @Sql;',
              '',
              "    SET @Sql=N'CREATE DATABASE '+QUOTENAME(@ConfigDb)+N';';",
              '    EXEC [sys].[sp_executesql] @Sql;',
              "    SET @Sql=N'ALTER DATABASE '+QUOTENAME(@ConfigDb)+N' SET ENABLE_BROKER WITH ROLLBACK IMMEDIATE;';",
              '    EXEC [sys].[sp_executesql] @Sql;',
              '',
              "    SET @Sql=N'CREATE DATABASE '+QUOTENAME(@DisabledDb)+N';';",
              '    EXEC [sys].[sp_executesql] @Sql;',
              "    SET @Sql=N'ALTER DATABASE '+QUOTENAME(@DisabledDb)+N' SET ENABLE_BROKER WITH ROLLBACK IMMEDIATE;';",
              '    EXEC [sys].[sp_executesql] @Sql;',
              "    SET @Sql=N'USE '+QUOTENAME(@DisabledDb)+N'; CREATE QUEUE [dbo].[ExampleDisabledQueue]; CREATE SERVICE [ExampleDisabledService] ON QUEUE [dbo].[ExampleDisabledQueue] ([DEFAULT]);';",
              '    EXEC [sys].[sp_executesql] @Sql;',
              "    SET @Sql=N'ALTER DATABASE '+QUOTENAME(@DisabledDb)+N' SET DISABLE_BROKER WITH ROLLBACK IMMEDIATE;';",
              '    EXEC [sys].[sp_executesql] @Sql;',
              '',
          ])
          path.write_text(text[:a]+replacement+text[b:],encoding='utf-8',newline='\n')
          PY
      - name: Commit fix and remove helper
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/fix-p2-broker-database-batches.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Code/Tests/Integration/182_P2_Service_Broker_Runtime_Contract.sql .github/workflows/fix-p2-broker-database-batches.yml
          git diff --cached --check
          git commit -m 'test: split P2 Broker database batches'
          git push origin HEAD:main
