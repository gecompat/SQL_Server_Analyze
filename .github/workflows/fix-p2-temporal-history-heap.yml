name: Fix P2 Temporal history heap

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/fix-p2-temporal-history-heap.yml'

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Precreate index-free history table
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          path=Path('Code/Tests/Integration/181_P2_Temporal_Runtime_Contract.sql')
          text=path.read_text(encoding='utf-8')
          marker='    CREATE TABLE [dbo].[ExampleTemporalMissingIndex]\n'
          addition='\n'.join([
              '    CREATE TABLE [dbo].[ExampleTemporalMissingIndexHistory]',
              '    (',
              '        [Id] int NOT NULL,',
              '        [PeriodStart] datetime2 NOT NULL,',
              '        [PeriodEnd] datetime2 NOT NULL',
              '    );',
              '',
          ])
          if text.count(marker)!=1 or addition.strip() in text:
              raise SystemExit('unexpected Temporal history anchor')
          path.write_text(text.replace(marker,addition+marker,1),encoding='utf-8',newline='\n')
          PY
      - name: Commit fix and remove helper
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/fix-p2-temporal-history-heap.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Code/Tests/Integration/181_P2_Temporal_Runtime_Contract.sql .github/workflows/fix-p2-temporal-history-heap.yml
          git diff --cached --check
          git commit -m 'test: precreate P2 Temporal history heap'
          git push origin HEAD:main
