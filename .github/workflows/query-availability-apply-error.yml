name: Query availability apply error

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/query-availability-apply-error.yml'

permissions:
  contents: write
  actions: read

jobs:
  query:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh run view 29646770164 --log-failed > "$RUNNER_TEMP/availability-failed.log"
          python3 - <<'PY'
          from pathlib import Path
          import json,re
          lines=Path(__import__('os').environ['RUNNER_TEMP']+'/availability-failed.log').read_text(errors='replace').splitlines()
          allowed=[]
          for line in lines:
              m=re.search(r'(Unexpected[^\r\n]*|SystemExit:[^\r\n]*|SyntaxError:[^\r\n]*|NameError:[^\r\n]*|ValueError:[^\r\n]*|StopIteration[^\r\n]*)',line)
              if m:
                  allowed.append(m.group(1)[:300])
          result={'runId':29646770164,'errors':allowed[-3:]}
          Path('Metadata/Quality/Availability_Apply_Error.json').write_text(json.dumps(result,indent=2)+'\n')
          PY
      - shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/query-availability-apply-error.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Metadata/Quality/Availability_Apply_Error.json .github/workflows/query-availability-apply-error.yml
          git commit -m 'chore: record availability apply error class'
          git pull --rebase origin main
          git push origin HEAD:main
