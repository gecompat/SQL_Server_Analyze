name: Fix P2 Broker privacy gate

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/fix-p2-broker-privacy-gate.yml'

permissions:
  contents: write
  statuses: write

jobs:
  fix:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Refine executable mutation patterns
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          path=Path('Code/Tests/Integration/182_P2_Service_Broker_Runtime_Contract.sql')
          text=path.read_text(encoding='utf-8')
          replacements={
              "N'receive top'":"N'receive top ('",
              "N'alter queue'":"N'alter queue ['",
              "N'end conversation',LOWER(@Definition))>0":"N'end conversation [',LOWER(@Definition))>0\n       OR CHARINDEX(N'end conversation @',LOWER(@Definition))>0",
          }
          for old,new in replacements.items():
              if text.count(old)!=1:
                  raise SystemExit('unexpected Broker privacy token')
              text=text.replace(old,new,1)
          path.write_text(text,encoding='utf-8',newline='\n')
          PY
      - name: Commit fix and remove helper
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/fix-p2-broker-privacy-gate.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Code/Tests/Integration/182_P2_Service_Broker_Runtime_Contract.sql .github/workflows/fix-p2-broker-privacy-gate.yml
          git diff --cached --check
          git commit -m 'test: refine P2 Broker privacy gate'
          git push origin HEAD:main
      - name: Publish helper status
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          state='success'
          if [ "$JOB_STATUS" != 'success' ]; then state='failure'; fi
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state="$state" \
            -f description='P2 Broker privacy helper' \
            -f context='p2-broker-privacy-helper' >/dev/null
