name: Fix P2 Change Tracking option

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/fix-p2-change-tracking-option.yml'

permissions:
  contents: write
  statuses: write

jobs:
  fix:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Modify active Change Tracking options
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          path=Path('Code/Tests/Integration/184_P2_Data_Capture_Runtime_Contract.sql')
          text=path.read_text(encoding='utf-8')
          old="SET CHANGE_TRACKING = ON (CHANGE_RETENTION = 2 DAYS, AUTO_CLEANUP = OFF);"
          new="SET CHANGE_TRACKING (CHANGE_RETENTION = 2 DAYS, AUTO_CLEANUP = OFF);"
          if text.count(old)!=1:
              raise SystemExit('unexpected Change Tracking option statement')
          path.write_text(text.replace(old,new,1),encoding='utf-8',newline='\n')
          PY
      - name: Commit fix and remove helper
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/fix-p2-change-tracking-option.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Code/Tests/Integration/184_P2_Data_Capture_Runtime_Contract.sql .github/workflows/fix-p2-change-tracking-option.yml
          git diff --cached --check
          git commit -m 'test: modify active P2 Change Tracking options'
          git push origin HEAD:main
      - name: Publish helper status
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          state='success'; if [ "$JOB_STATUS" != 'success' ]; then state='failure'; fi
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state="$state" -f description='P2 Change Tracking option helper' \
            -f context='p2-change-tracking-option-helper' >/dev/null
