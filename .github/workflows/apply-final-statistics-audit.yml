name: Apply final statistics audit

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/apply-final-statistics-audit.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Update final public evidence values
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          path = Path('Metadata/Quality/Special_Case_Release_Audit.json')
          data = json.loads(path.read_text(encoding='utf-8'))
          data['generatedAtUtc'] = '2026-07-18T12:35:49Z'
          data['inventory']['repositoryFiles'] = 333
          data['inventory']['sqlFilesIncludingTestsAndExamples'] = 137
          data['staticChecks']['sqlLexicalBalance']['filesChecked'] = 137
          privacy = data['staticChecks']['repositoryPrivacyGate']
          privacy['repositoryFilesScanned'] = 333
          privacy['zipFilesScanned'] = 333
          evidence = data['testDocumentation']['actionEvidence']
          evidence['documentationRun'] = 'https://github.com/gecompat/SQL_Server_Analyze/actions/runs/29644565454'
          evidence['repositoryPrivacyRun'] = 'https://github.com/gecompat/SQL_Server_Analyze/actions/runs/29644565464'
          evidence['commitMessageRun'] = 'https://github.com/gecompat/SQL_Server_Analyze/actions/runs/29644565467'
          path.write_text(json.dumps(data, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          PY

      - name: Commit audit and remove workflow
        shell: bash
        run: |
          rm .github/workflows/apply-final-statistics-audit.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Metadata/Quality/Special_Case_Release_Audit.json .github/workflows/apply-final-statistics-audit.yml
          git diff --cached --check
          git commit -m 'docs: align final statistics release audit'
          git push origin HEAD:main
