name: Complete P2 finalization

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/complete-p2-finalization.yml'

permissions:
  contents: write
  actions: read
  statuses: write

jobs:
  finalize:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Make finalizer self-clean before validation
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          script = Path('.github/scripts/finalize_p2_evidence.py')
          text = script.read_text(encoding='utf-8')
          anchor = '# Validate generated evidence before committing.\n'
          insertion = '\n'.join([
              '# Remove temporary finalizer artifacts before generated evidence validation.',
              'for relative in (',
              '    ".github/workflows/finalize-p2-evidence.yml",',
              '    ".github/scripts/finalize_p2_evidence.py",',
              '):',
              '    path = ROOT / relative',
              '    if path.exists():',
              '        path.unlink()',
              '',
          ]) + '\n'
          if text.count(anchor) != 1:
              raise SystemExit('unexpected P2 finalizer validation anchor')
          script.write_text(text.replace(anchor, insertion + anchor, 1), encoding='utf-8', newline='\n')

          workflow = Path('.github/workflows/finalize-p2-evidence.yml')
          text = workflow.read_text(encoding='utf-8')
          replacements = {
              '          rm .github/workflows/finalize-p2-evidence.yml\n': '          rm -f .github/workflows/finalize-p2-evidence.yml\n',
              '          rm .github/scripts/finalize_p2_evidence.py\n': '          rm -f .github/scripts/finalize_p2_evidence.py\n',
          }
          for old, new in replacements.items():
              if text.count(old) != 1:
                  raise SystemExit('unexpected P2 finalizer cleanup anchor')
              text = text.replace(old, new, 1)
          workflow.write_text(text, encoding='utf-8', newline='\n')

          documentation_readme = Path('Documentation/README.md')
          text = documentation_readme.read_text(encoding='utf-8')
          old = ('Die Version `1.1.0-special.9` ergänzt Verschlüsselungslebenszyklus und Wartungsoperationen. '
                 'Der Release-Gate-Vertrag umfasst nun 19 Suiten; P0 und die ersten zwanzig P1-Fälle bis '
                 'Schema-/Designkorrektheit besitzen commitbezogene Drei-Versionen-Evidenz. Als nächste '
                 'P1-Gruppe folgt die begrenzte Statistikverteilung.')
          normalized = ('Die Version `1.1.0-special.9` ergänzt Verschlüsselungslebenszyklus und Wartungsoperationen. '
                        'Der Release-Gate-Vertrag umfasst nun 19 Suiten; P0 und die ersten zwanzig P1-Fälle besitzen '
                        'commitbezogene Drei-Versionen-Evidenz. Weitere Feature-Positiv-, Grenzwert-, Last- und '
                        'externe Restorefälle bleiben separate Nachweise.')
          if text.count(old) != 1:
              raise SystemExit('unexpected Documentation README status paragraph')
          documentation_readme.write_text(text.replace(old, normalized, 1), encoding='utf-8', newline='\n')
          PY

      - name: Read clean SQL runtime evidence
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          for run_id in 29656121684 29656121674 29656121672; do
            gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}"
          done | jq -s '.' > "$RUNNER_TEMP/p2-runs.json"

      - name: Generate and validate complete P2 evidence
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RUNS_JSON: ${{ runner.temp }}/p2-runs.json
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          if ! output=$(python3 -m py_compile .github/scripts/finalize_p2_evidence.py 2>&1 && python3 .github/scripts/finalize_p2_evidence.py 2>&1); then
            printf '%s\n' "$output"
            export FINALIZATION_OUTPUT="$output"
            slug=$(python3 - <<'PY'
          import os,re
          lines=[line.strip() for line in os.environ.get('FINALIZATION_OUTPUT','').splitlines() if line.strip()]
          value=lines[-1] if lines else 'unknown-p2-finalization-error'
          value=re.sub(r'[^a-z0-9]+','-',value.lower()).strip('-')[:140] or 'unknown-p2-finalization-error'
          print(value)
          PY
            )
            gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
              -f state='failure' \
              -f target_url="$RUN_URL" \
              -f description='P2 generated evidence validation failed' \
              -f context="p2-completion-error/${slug}" >/dev/null
            exit 1
          fi
          printf '%s\n' "$output"

      - name: Commit final evidence without temporary files
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          rm -f .github/workflows/complete-p2-finalization.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if ! git diff --cached --check; then
            gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
              -f state='failure' -f target_url="$RUN_URL" \
              -f description='P2 final evidence diff check failed' \
              -f context='p2-publish-error/diff-check' >/dev/null
            exit 1
          fi
          if ! git commit -m 'docs: finalize complete P2 evidence'; then
            gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
              -f state='failure' -f target_url="$RUN_URL" \
              -f description='P2 final evidence commit failed' \
              -f context='p2-publish-error/commit' >/dev/null
            exit 1
          fi
          if ! push_output=$(git push origin HEAD:main 2>&1); then
            printf '%s\n' "$push_output"
            export PUSH_OUTPUT="$push_output"
            slug=$(python3 - <<'PY'
          import os,re
          lines=[line.strip() for line in os.environ.get('PUSH_OUTPUT','').splitlines() if line.strip()]
          value=lines[-1] if lines else 'unknown-push-rejection'
          value=re.sub(r'[^a-z0-9]+','-',value.lower()).strip('-')[:140] or 'unknown-push-rejection'
          print(value)
          PY
            )
            gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
              -f state='failure' -f target_url="$RUN_URL" \
              -f description='P2 final evidence push failed' \
              -f context="p2-push-error/${slug}" >/dev/null
            exit 1
          fi
          printf '%s\n' "$push_output"

      - name: Publish completion status
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          state='success'; if [ "$JOB_STATUS" != 'success' ]; then state='failure'; fi
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state="$state" \
            -f target_url="$RUN_URL" \
            -f description='Complete P2 evidence synchronization' \
            -f context='complete-p2-finalization' >/dev/null
