name: Restore complete evidence procedure and console contract

on:
  push:
    branches:
      - agent/implement-execution-plan-analysis
    paths:
      - '.github/workflows/restore-evidence-console-contract.yml'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/restore-evidence-console-contract.yml'

permissions:
  contents: write

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/implement-execution-plan-analysis
          fetch-depth: 0
          show-progress: false

      - name: Restore complete canonical procedure and align console variables
        shell: bash
        run: |
          set -euo pipefail
          git show 403ddc5c01cd1f259b57f8ac88d680ec27ecb138:Code/04_PlanCache/052_USP_CreateExecutionEvidenceJson.sql \
            > Code/04_PlanCache/052_USP_CreateExecutionEvidenceJson.sql
          python3 - <<'PY'
          from pathlib import Path
          paths = [
              Path('Code/04_PlanCache/052_USP_CreateExecutionEvidenceJson.sql'),
              Path('Code/04_PlanCache/053_USP_ExecutionPlanAnalysis.sql'),
          ]
          for path in paths:
              text = path.read_text(encoding='utf-8')
              text = text.replace('@ConsoleRequested', '@ConsoleResultRequested')
              text = text.replace('Version      : 1.0.0', 'Version      : 1.0.1', 1)
              path.write_text(text, encoding='utf-8', newline='\n')
          evidence_lines = len(paths[0].read_text(encoding='utf-8').splitlines())
          if evidence_lines < 800:
              raise RuntimeError(f'Restored evidence procedure is unexpectedly short: {evidence_lines} lines.')
          for path in paths:
              text = path.read_text(encoding='utf-8')
              if '@ConsoleRequested' in text:
                  raise RuntimeError(f'Legacy console variable remains in {path}.')
              if '[monitor].[InternalEmitConsoleResult]' not in text:
                  raise RuntimeError(f'Central console renderer missing in {path}.')
          print(f'Restored complete evidence procedure with {evidence_lines} lines.')
          PY

      - name: Validate static contracts
        shell: bash
        run: |
          set -euo pipefail
          python3 ./Code/Tests/Static/950_Validate_Nonblocking_Metadata.py
          pwsh -NoLogo -NoProfile -File ./Code/Tests/Static/900_Validate_Analysis_Documentation.ps1

      - name: Commit restored procedures
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Code/04_PlanCache/052_USP_CreateExecutionEvidenceJson.sql Code/04_PlanCache/053_USP_ExecutionPlanAnalysis.sql
          if ! git diff --cached --quiet; then
            git commit -m 'Restore complete evidence procedure and console contract'
            git push origin HEAD:agent/implement-execution-plan-analysis
          fi
