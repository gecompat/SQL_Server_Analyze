name: Fix P2 graph fixture

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/fix-p2-graph-fixture.yml'

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          path=Path('Code/Tests/Integration/179_P2_Special_Feature_Inventory_Runtime_Contract.sql')
          text=path.read_text(encoding='utf-8')
          old="    CREATE TABLE [dbo].[ExampleFeatureGraphNode] AS NODE;"
          new="    CREATE TABLE [dbo].[ExampleFeatureGraphNode]\n    (\n        [Id] int NOT NULL CONSTRAINT [PK_ExampleFeatureGraphNode] PRIMARY KEY\n    ) AS NODE;"
          if text.count(old)!=1:
              raise SystemExit('unexpected graph fixture anchor')
          path.write_text(text.replace(old,new,1),encoding='utf-8',newline='\n')
          PY
      - shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/fix-p2-graph-fixture.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Code/Tests/Integration/179_P2_Special_Feature_Inventory_Runtime_Contract.sql .github/workflows/fix-p2-graph-fixture.yml
          git diff --cached --check
          git commit -m 'test: fix P2 graph fixture syntax'
          git push origin HEAD:main
