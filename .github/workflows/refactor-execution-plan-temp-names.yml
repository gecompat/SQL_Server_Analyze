name: Refactor execution plan temp names

on:
  push:
    branches:
      - agent/implement-execution-plan-analysis
    paths:
      - '.bootstrap/refactor_execution_plan_temp_names.py'
      - '.github/workflows/refactor-execution-plan-temp-names.yml'
  pull_request:
    branches:
      - main
    paths:
      - '.bootstrap/refactor_execution_plan_temp_names.py'
      - '.github/workflows/refactor-execution-plan-temp-names.yml'

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  refactor:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0
          show-progress: false

      - name: Apply canonical temp names
        shell: bash
        run: python3 ./.bootstrap/refactor_execution_plan_temp_names.py

      - name: Validate nonblocking metadata contract
        id: validate
        continue-on-error: true
        shell: bash
        run: python3 ./Code/Tests/Static/950_Validate_Nonblocking_Metadata.py > /tmp/nonblocking.log 2>&1

      - name: Report remaining contract violations
        if: steps.validate.outcome == 'failure'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const text = fs.existsSync('/tmp/nonblocking.log') ? fs.readFileSync('/tmp/nonblocking.log', 'utf8') : 'No diagnostic file was created.';
            const tail = text.split(/\r?\n/).slice(-80).join('\n');
            if (context.issue.number) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `Nonblocking metadata validation after temp-name refactoring:\n\n\`\`\`text\n${tail}\n\`\`\``
              });
            }
            core.setFailed('Nonblocking metadata contract still has violations.');

      - name: Commit canonical temp names
        if: steps.validate.outcome == 'success'
        shell: bash
        run: |
          set -euo pipefail
          git checkout -- .bootstrap/refactor_execution_plan_temp_names.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m 'Use canonical execution plan temp names'
            git push origin HEAD:${{ github.head_ref || github.ref_name }}
          fi
