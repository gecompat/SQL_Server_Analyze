name: Temporary documentation link fix

on:
  push:
    branches:
      - agent/automate-documentation-validation

permissions:
  contents: write

jobs:
  fix-links:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Check out branch
        uses: actions/checkout@v6
        with:
          ref: agent/automate-documentation-validation

      - name: Correct moved-document links and error reporting
        shell: python
        run: |
          from pathlib import Path

          concept_path = Path('Documentation/Analysis_Guides/Authoring/Deep_Research_Analysis_Guides_Concept.md')
          concept = concept_path.read_text(encoding='utf-8')
          old_prefix = '](../../Code/'
          new_prefix = '](../../../Code/'
          count = concept.count(old_prefix)
          if count < 1:
              raise RuntimeError('No moved-document Code links found to correct.')
          concept = concept.replace(old_prefix, new_prefix)
          concept_path.write_text(concept, encoding='utf-8', newline='\n')

          validator_path = Path('Code/Tests/Static/900_Validate_Analysis_Documentation.ps1')
          validator = validator_path.read_text(encoding='utf-8')
          old_block = """if ($errors.Count -gt 0) {
              $errors | Sort-Object -Unique | ForEach-Object { Write-Error $_ }
              exit 1
          }
          """
          new_block = """if ($errors.Count -gt 0) {
              foreach ($validationError in ($errors | Sort-Object -Unique)) {
                  [Console]::Error.WriteLine($validationError)
              }
              exit 1
          }
          """
          if validator.count(old_block) != 1:
              raise RuntimeError('Expected validator error block exactly once.')
          validator = validator.replace(old_block, new_block)
          validator_path.write_text(validator, encoding='utf-8', newline='\n')

      - name: Commit corrections
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Code/Tests/Static/900_Validate_Analysis_Documentation.ps1 Documentation/Analysis_Guides/Authoring/Deep_Research_Analysis_Guides_Concept.md
          git diff --cached --quiet && exit 0
          git commit -m 'fix: correct moved documentation links'
          git push origin HEAD:agent/automate-documentation-validation
