name: Temporary documentation link fix

on:
  push:
    branches:
      - agent/automate-documentation-validation

permissions:
  contents: write

jobs:
  fix-links:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Check out branch
        uses: actions/checkout@v6
        with:
          ref: agent/automate-documentation-validation

      - name: Correct Authoring-relative documentation links
        shell: python
        run: |
          from pathlib import Path

          path = Path('Documentation/Analysis_Guides/Authoring/Deep_Research_Analysis_Guides_Concept.md')
          text = path.read_text(encoding='utf-8')
          replacements = {
              '](../Architecture/': '](../../Architecture/',
              '](../Quality/': '](../../Quality/',
              '](../Reference/': '](../../Reference/',
              '](../Research/': '](../../Research/',
          }
          expected_counts = {
              '](../Architecture/': 2,
              '](../Quality/': 1,
              '](../Reference/': 2,
              '](../Research/': 1,
          }

          for old, new in replacements.items():
              count = text.count(old)
              if count != expected_counts[old]:
                  raise RuntimeError(
                      f'Expected {expected_counts[old]} occurrences of {old!r}, found {count}.'
                  )
              text = text.replace(old, new)

          path.write_text(text, encoding='utf-8', newline='\n')

      - name: Commit corrected links
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Documentation/Analysis_Guides/Authoring/Deep_Research_Analysis_Guides_Concept.md
          git diff --cached --quiet && exit 0
          git commit -m 'docs: correct authoring document links'
          git push origin HEAD:agent/automate-documentation-validation
