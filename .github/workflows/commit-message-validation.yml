name: Commit message validation

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: commit-message-validation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate direct Git commit messages
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before || '' }}
      HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

    steps:
      - name: Check out repository history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run commit-message validator self-tests
        shell: bash
        run: |
          set -euo pipefail
          python3 ./Code/Tests/Static/930_Validate_Commit_Message.py \
            --repository-root . \
            --delivery-mode DIRECT_GIT \
            --self-test

      - name: Validate newly introduced commits
        shell: bash
        run: |
          set -euo pipefail
          arguments=(--repository-root . --delivery-mode DIRECT_GIT --head-sha "$HEAD_SHA")
          if [[ "$BASE_SHA" =~ ^[0-9a-f]{40}$ ]] && [[ ! "$BASE_SHA" =~ ^0{40}$ ]]; then
            arguments+=(--base-sha "$BASE_SHA")
          fi
          python3 ./Code/Tests/Static/930_Validate_Commit_Message.py "${arguments[@]}"
