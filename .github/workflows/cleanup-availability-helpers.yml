name: Cleanup availability helpers

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/cleanup-availability-helpers.yml'

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Remove temporary availability helpers
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/cleanup-availability-helpers.yml
          rm -f .github/workflows/retry2-p1-availability-contract.yml
          rm -f .github/workflows/retry3-p1-availability-contract.yml
          rm -f .github/workflows/retry4-p1-availability-contract.yml
          rm -f .github/workflows/retry5-p1-availability-contract.yml
          rm -f .github/workflows/retry6-p1-availability-contract.yml
          rm -f .github/workflows/retry7-p1-availability-contract.yml
          rm -f Metadata/Quality/Availability_Apply_Diagnostic.json
          rm -f Metadata/Quality/Availability_Apply_Run.json
          rm -f Metadata/Quality/Availability_Apply_Error.json
          rm -f Metadata/Quality/Availability_Apply_Error_Tail.json
          rm -f Metadata/Quality/Availability_Retry2_Run.json
          rm -f Metadata/Quality/Availability_Retry2_Error.json
          rm -f Metadata/Quality/Availability_Retry3_Run.json
          rm -f Metadata/Quality/Availability_Retry4_Run.json
          rm -f Metadata/Quality/Availability_Retry5_Run.json
          rm -f Metadata/Quality/Availability_Retry6_Run.json
          rm -f Metadata/Quality/Availability_Retry7_Run.json
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/workflows Metadata/Quality
          git diff --cached --check
          git commit -m 'chore: remove availability helper artifacts'
          git pull --rebase origin main
          git push origin HEAD:main
