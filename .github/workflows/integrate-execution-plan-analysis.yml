name: Integrate execution plan analysis framework contracts

on:
  push:
    branches:
      - agent/implement-execution-plan-analysis
    paths:
      - '.bootstrap/integrate_execution_plan_analysis.py'
      - '.bootstrap/patch_integration_schema.py'
      - '.github/workflows/integrate-execution-plan-analysis.yml'
  pull_request:
    branches:
      - main
    paths:
      - '.bootstrap/integrate_execution_plan_analysis.py'
      - '.bootstrap/patch_integration_schema.py'
      - '.github/workflows/integrate-execution-plan-analysis.yml'

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  integrate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0
          show-progress: false

      - name: Patch schema derivation
        id: patch
        continue-on-error: true
        shell: bash
        run: python3 ./.bootstrap/patch_integration_schema.py > /tmp/epa-patch.log 2>&1

      - name: Apply framework integration
        id: integration
        if: steps.patch.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: python3 ./.bootstrap/integrate_execution_plan_analysis.py > /tmp/epa-integration.log 2>&1

      - name: Report integration failure
        if: steps.patch.outcome == 'failure' || steps.integration.outcome == 'failure'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const phase = '${{ steps.patch.outcome }}' === 'failure' ? 'schema patch' : 'framework integration';
            const path = phase === 'schema patch' ? '/tmp/epa-patch.log' : '/tmp/epa-integration.log';
            const text = fs.existsSync(path) ? fs.readFileSync(path, 'utf8') : 'No diagnostic file was created.';
            const tail = text.split(/\r?\n/).slice(-30).join('\n');
            if (context.issue.number) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `Execution-plan integration failed during **${phase}**:\n\n\`\`\`text\n${tail}\n\`\`\``
              });
            }
            core.setFailed(`Execution-plan integration failed during ${phase}.`);

      - name: Commit integrated framework contracts
        if: steps.patch.outcome == 'success' && steps.integration.outcome == 'success'
        shell: bash
        run: |
          set -euo pipefail
          rm -f .bootstrap/integrate_execution_plan_analysis.py
          rm -f .bootstrap/patch_integration_schema.py
          rm -f .bootstrap/integration-error.log
          rmdir .bootstrap 2>/dev/null || true
          rm -f .github/workflows/integrate-execution-plan-analysis.yml

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m 'Integrate execution plan analysis framework contracts'
            git push origin HEAD:${{ github.head_ref || github.ref_name }}
          fi
