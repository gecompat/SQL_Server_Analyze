name: Integrate execution plan analysis framework contracts

on:
  push:
    branches:
      - agent/implement-execution-plan-analysis
    paths:
      - '.bootstrap/integrate_execution_plan_analysis.py'
      - '.bootstrap/patch_integration_schema.py'
      - '.github/workflows/integrate-execution-plan-analysis.yml'
  pull_request:
    branches:
      - main
    paths:
      - '.bootstrap/integrate_execution_plan_analysis.py'
      - '.bootstrap/patch_integration_schema.py'
      - '.github/workflows/integrate-execution-plan-analysis.yml'

permissions:
  contents: write

jobs:
  integrate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0
          show-progress: false

      - name: Apply framework integration
        shell: bash
        run: |
          set -euo pipefail

          record_failure() {
            local phase="$1"
            local log_path="$2"
            {
              echo "Phase: ${phase}"
              echo
              tail -n 40 "$log_path"
            } > .bootstrap/integration-error.log
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git add .bootstrap/integration-error.log
            git commit -m 'Record execution plan integration failure'
            git push origin HEAD:${{ github.head_ref || github.ref_name }}
          }

          set +e
          python3 ./.bootstrap/patch_integration_schema.py > /tmp/epa-patch.log 2>&1
          patch_status=$?
          set -e
          if [ "$patch_status" -ne 0 ]; then
            record_failure 'schema patch' /tmp/epa-patch.log
            exit "$patch_status"
          fi

          set +e
          python3 ./.bootstrap/integrate_execution_plan_analysis.py > /tmp/epa-integration.log 2>&1
          integration_status=$?
          set -e
          if [ "$integration_status" -ne 0 ]; then
            record_failure 'framework integration' /tmp/epa-integration.log
            exit "$integration_status"
          fi

          rm -f .bootstrap/integrate_execution_plan_analysis.py
          rm -f .bootstrap/patch_integration_schema.py
          rm -f .bootstrap/integration-error.log
          rmdir .bootstrap 2>/dev/null || true
          rm -f .github/workflows/integrate-execution-plan-analysis.yml

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m 'Integrate execution plan analysis framework contracts'
            git push origin HEAD:${{ github.head_ref || github.ref_name }}
          fi
