name: Fix statistics partial status

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/fix-statistics-partial-status.yml'

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Enforce partial status for pre-analysis limitations
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('Code/03_ObjectIndex/040_USP_Statistics.sql')
          text = path.read_text(encoding='utf-8')
          marker = "\n    SELECT @TotalRows=(SELECT COUNT_BIG(*) FROM [#Result])+(SELECT COUNT_BIG(*) FROM [#Incremental]);"
          replacement = (
              "\n    IF @OverallStatus<>'AVAILABLE' SET @IsPartial=1;"
              "\n\n    SELECT @TotalRows=(SELECT COUNT_BIG(*) FROM [#Result])+(SELECT COUNT_BIG(*) FROM [#Incremental]);"
          )
          if text.count(marker) != 1:
              raise SystemExit('Expected one total-row aggregation marker.')
          text = text.replace(marker, replacement, 1)
          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit correction and remove one-time workflow
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/fix-statistics-partial-status.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Code/03_ObjectIndex/040_USP_Statistics.sql \
                  .github/workflows/fix-statistics-partial-status.yml
          git diff --cached --check
          git commit -m 'fix: mark restricted statistics results partial'
          git push origin HEAD:main
