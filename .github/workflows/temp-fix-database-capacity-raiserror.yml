name: Temporary fix capacity RAISERROR

on:
  push:
    branches:
      - agent/validate-sqlserver-2022-linux-gate

permissions:
  contents: write

jobs:
  fix-capacity-raiserror:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Check out branch
        uses: actions/checkout@v6
        with:
          ref: agent/validate-sqlserver-2022-linux-gate

      - name: Materialize RAISERROR message
        shell: python
        run: |
          from pathlib import Path

          path = Path('Code/08_ServerHealth/120_USP_DatabaseCapacityAnalysis.sql')
          text = path.read_text(encoding='utf-8')

          declaration_old = "    DECLARE @CrossDatabaseRequested bit = 0;\n"
          declaration_new = (
              "    DECLARE @CrossDatabaseRequested bit = 0;\n"
              "    DECLARE @MonitorPrintMessage nvarchar(2048) = NULL;\n"
          )
          if text.count(declaration_old) != 1:
              raise RuntimeError('Expected declaration anchor exactly once.')
          text = text.replace(declaration_old, declaration_new, 1)

          statement_old = (
              "    IF @PrintMeldungen = 1 AND @StatusCode <> 'AVAILABLE'\n"
              "        RAISERROR(N'USP_DatabaseCapacityAnalysis: %s', 10, 1, COALESCE(@ErrorMessage, @StatusCode)) WITH NOWAIT;\n"
          )
          statement_new = (
              "    IF @PrintMeldungen = 1 AND @StatusCode <> 'AVAILABLE'\n"
              "    BEGIN\n"
              "        SET @MonitorPrintMessage = COALESCE(@ErrorMessage, CONVERT(nvarchar(2048), @StatusCode));\n"
              "        RAISERROR(N'USP_DatabaseCapacityAnalysis: %s', 10, 1, @MonitorPrintMessage) WITH NOWAIT;\n"
              "    END;\n"
          )
          if text.count(statement_old) != 1:
              raise RuntimeError('Expected RAISERROR statement exactly once.')
          text = text.replace(statement_old, statement_new, 1)

          path.write_text(text, encoding='utf-8', newline='\n')

      - name: Commit capacity fix
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Code/08_ServerHealth/120_USP_DatabaseCapacityAnalysis.sql
          git diff --cached --quiet && exit 0
          git commit -m 'fix: materialize capacity RAISERROR message'
          git push origin HEAD:agent/validate-sqlserver-2022-linux-gate
