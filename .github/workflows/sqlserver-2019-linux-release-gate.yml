name: SQL Server 2019 Linux release gate

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths:
      - '.github/workflows/sqlserver-2019-linux-release-gate.yml'
      - 'Code/Tests/Static/925_Select_CI_Impact.py'
      - 'Code/**/*.sql'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/sqlserver-2019-linux-release-gate.yml'
      - 'Code/Tests/Static/925_Select_CI_Impact.py'
      - 'Code/**/*.sql'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sqlserver-2019-linux-release-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  impact:
    name: Select SQL Server 2019 impact
    runs-on: ubuntu-24.04
    outputs:
      run_runtime: ${{ steps.select.outputs.run_runtime }}
      full_suite: ${{ steps.select.outputs.full_suite }}
      run_release_tests: ${{ steps.select.outputs.run_release_tests }}
      permission_matrix: ${{ steps.select.outputs.permission_matrix }}
    steps:
      - name: Check out repository history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - id: select
        name: Select executable SQL impact
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before || '' }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          python3 ./Code/Tests/Static/925_Select_CI_Impact.py --self-test
          python3 ./Code/Tests/Static/925_Select_CI_Impact.py \
            --repository-root . \
            --base-sha "$BASE_SHA" \
            --head-sha "$HEAD_SHA" \
            --scope core \
            --github-output "$GITHUB_OUTPUT" \
            --plan-json "$RUNNER_TEMP/ci-impact.json"
          {
            echo '## SQL Server 2019 impact selection'
            echo '```json'
            cat "$RUNNER_TEMP/ci-impact.json"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  runtime:
    if: >-
      needs.impact.outputs.run_runtime == 'true' &&
      (github.event_name != 'pull_request' ||
       github.event.pull_request.draft == false ||
       github.head_ref != 'agent/implement-execution-plan-analysis')
    needs: impact
    name: SQL Server 2019 impacted runtime
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Prepare isolated SQL files
        shell: bash
        run: |
          set -euo pipefail
          cp -R Code "$RUNNER_TEMP/Code"
          find "$RUNNER_TEMP/Code" -type f -name '*.sql' -print0 \
            | xargs -0 perl -pi -e 's/\[DeineDatenbank\]/[SQLServerAnalyzeTest]/g'

      - name: Build impact-selected SQLCMD runner
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before || '' }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          python3 ./Code/Tests/Static/925_Select_CI_Impact.py \
            --repository-root . \
            --base-sha "$BASE_SHA" \
            --head-sha "$HEAD_SHA" \
            --scope core \
            --write-runner "$RUNNER_TEMP/Code/Tests/Run_Impact_Gate.sql"

      - name: Generate ephemeral SQL credential
        shell: bash
        run: |
          set -euo pipefail
          password="A$(openssl rand -hex 16)a1!"
          echo "::add-mask::$password"
          echo "MSSQL_EPHEMERAL_PASSWORD=$password" >> "$GITHUB_ENV"

      - name: Start SQL Server 2019 Linux
        shell: bash
        run: |
          set -euo pipefail
          image_reference='mcr.microsoft.com/mssql/server:2019-latest'
          docker pull --quiet "$image_reference" >/dev/null
          image_digest=$(docker image inspect --format='{{index .RepoDigests 0}}' "$image_reference")
          if [[ ! "$image_digest" =~ ^mcr\.microsoft\.com/mssql/server@sha256:[0-9a-f]{64}$ ]]; then
            echo 'SQL Server container image digest validation failed.'
            exit 1
          fi
          echo "SQLSERVER_IMAGE_REFERENCE=$image_reference" >> "$GITHUB_ENV"
          echo "SQLSERVER_IMAGE_DIGEST=$image_digest" >> "$GITHUB_ENV"
          echo "Captured container image digest: $image_digest"
          docker run --name sqlserver-analyze-test-2019 \
            --detach \
            --env ACCEPT_EULA=Y \
            --env MSSQL_PID=Developer \
            --env MSSQL_COLLATION=SQL_Latin1_General_CP1_CS_AS \
            --env MSSQL_SA_PASSWORD="$MSSQL_EPHEMERAL_PASSWORD" \
            --volume "$RUNNER_TEMP/Code:/work/Code:ro" \
            "$image_digest" >/dev/null

      - name: Wait for SQL Server readiness
        shell: bash
        run: |
          set -euo pipefail
          sqlcmd_path=''
          ready=0
          readiness_query="SET NOCOUNT ON; IF TRY_CONVERT(int,SERVERPROPERTY(N'ProductMajorVersion'))<>15 THROW 50000,N'VERSION_NOT_READY',1; IF CONVERT(sysname,SERVERPROPERTY(N'Collation'))<>N'SQL_Latin1_General_CP1_CS_AS' OR CONVERT(sysname,DATABASEPROPERTYEX(N'tempdb',N'Collation'))<>N'SQL_Latin1_General_CP1_CS_AS' THROW 50001,N'COLLATION_NOT_READY',1; SELECT 1;"
          for attempt in $(seq 1 120); do
            sqlcmd_path=$(docker exec sqlserver-analyze-test-2019 bash -lc \
              "if [ -x /opt/mssql-tools18/bin/sqlcmd ]; then echo /opt/mssql-tools18/bin/sqlcmd; elif [ -x /opt/mssql-tools/bin/sqlcmd ]; then echo /opt/mssql-tools/bin/sqlcmd; fi" \
              || true)
            if [ -n "$sqlcmd_path" ] && docker exec \
              --env SQLCMDPASSWORD="$MSSQL_EPHEMERAL_PASSWORD" \
              sqlserver-analyze-test-2019 \
              "$sqlcmd_path" -S localhost -U sa -C -b -Q "$readiness_query" >/dev/null 2>&1; then
              ready=1
              break
            fi
            sleep 2
          done
          if [ "$ready" -ne 1 ]; then
            docker logs --tail 40 sqlserver-analyze-test-2019
            exit 1
          fi
          product_version=$(docker exec \
            --env SQLCMDPASSWORD="$MSSQL_EPHEMERAL_PASSWORD" \
            sqlserver-analyze-test-2019 \
            "$sqlcmd_path" -S localhost -U sa -C -b -h -1 -W -Q \
            "SET NOCOUNT ON; SELECT CONVERT(varchar(128),SERVERPROPERTY(N'ProductVersion'));" \
            | tr -d '\r' | awk 'NF { print $1; exit }')
          if [[ ! "$product_version" =~ ^15\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo 'SQL Server product version validation failed.'
            exit 1
          fi
          echo "SQLCMD_PATH=$sqlcmd_path" >> "$GITHUB_ENV"
          echo "SQLSERVER_PRODUCT_VERSION=$product_version" >> "$GITHUB_ENV"
          echo "Captured SQL Server product version: $product_version"

      - name: Create synthetic test database
        shell: bash
        run: |
          set -euo pipefail
          docker exec \
            --env SQLCMDPASSWORD="$MSSQL_EPHEMERAL_PASSWORD" \
            sqlserver-analyze-test-2019 \
            "$SQLCMD_PATH" -S localhost -U sa -C -b -Q \
            "CREATE DATABASE [SQLServerAnalyzeTest] COLLATE SQL_Latin1_General_CP1_CS_AS; ALTER DATABASE [SQLServerAnalyzeTest] SET COMPATIBILITY_LEVEL = 150;" >/dev/null

      - name: Install framework
        shell: bash
        run: |
          set -euo pipefail
          install_log="$RUNNER_TEMP/sqlserver-analyze-2019-install.log"
          error_summary="$RUNNER_TEMP/sqlserver-analyze-2019-error.txt"
          if ! docker exec \
            --env SQLCMDPASSWORD="$MSSQL_EPHEMERAL_PASSWORD" \
            --workdir /work/Code/Install \
            sqlserver-analyze-test-2019 \
            "$SQLCMD_PATH" -S localhost -U sa -C -b -i Install_All.sql >"$install_log" 2>&1; then
            echo 'Framework installation failed.'
            {
              grep -A 2 -E 'Msg [0-9]+|Sqlcmd: Error|Error:' "$install_log" | tail -n 100 || true
              echo 'Unresolved SQLCMD variable references:'
              grep -R -n -E '\$\([A-Za-z_][A-Za-z0-9_]*\)' "$RUNNER_TEMP/Code" || true
            } >"$error_summary"
            cat "$error_summary"
            exit 1
          fi
          echo 'Framework installation succeeded.'

      - name: Run release gate
        if: needs.impact.outputs.run_release_tests == 'true'
        shell: bash
        run: |
          set -euo pipefail
          release_log="$RUNNER_TEMP/sqlserver-analyze-2019-release-gate.log"
          error_summary="$RUNNER_TEMP/sqlserver-analyze-2019-error.txt"
          if ! docker exec \
            --env SQLCMDPASSWORD="$MSSQL_EPHEMERAL_PASSWORD" \
            --workdir /work/Code/Tests \
            sqlserver-analyze-test-2019 \
            "$SQLCMD_PATH" -S localhost -U sa -C -b -i Run_Impact_Gate.sql >"$release_log" 2>&1; then
            echo 'Release gate failed.'
            {
              echo 'Release-gate markers:'
              grep -E 'RELEASE_GATE [0-9]+/[0-9]+' "$release_log" | tail -n 40 || true
              echo 'Detected SQL errors:'
              grep -B 2 -A 4 -E 'Msg [0-9]+|Sqlcmd: Error|Error:' "$release_log" | tail -n 120 || true
              echo 'Final release-gate output:'
              tail -n 120 "$release_log"
            } >"$error_summary"
            cat "$error_summary"
            exit 1
          fi
          echo 'Release gate succeeded.'

      - name: Run SQL Server 2019 permission matrix
        if: needs.impact.outputs.permission_matrix == 'true'
        shell: bash
        run: |
          set -euo pipefail
          permission_log="$RUNNER_TEMP/sqlserver-analyze-2019-permission-matrix.log"
          error_summary="$RUNNER_TEMP/sqlserver-analyze-2019-error.txt"
          if ! docker exec \
            --env SQLCMDPASSWORD="$MSSQL_EPHEMERAL_PASSWORD" \
            --workdir /work/Code/Tests \
            sqlserver-analyze-test-2019 \
            "$SQLCMD_PATH" -S localhost -U sa -C -b \
            -v PermissionMatrixPassword="$MSSQL_EPHEMERAL_PASSWORD" \
            -i Permissions/110_SQL_Server_2019_Permission_Matrix.sql >"$permission_log" 2>&1; then
            echo 'Permission matrix failed.'
            {
              echo 'Final permission-matrix output:'
              tail -n 240 "$permission_log"
            } >"$error_summary"
            cat "$error_summary"
            exit 1
          fi
          echo 'Permission matrix succeeded.'

      - name: Record generic success summary
        if: success()
        shell: bash
        run: |
          {
            echo '## SQL Server 2019 Linux release gate'
            echo '- Target: synthetic SQL Server 2019 Developer on Linux'
            echo '- Compatibility level: 150'
            echo "- Product version: $SQLSERVER_PRODUCT_VERSION"
            echo "- Container image reference: $SQLSERVER_IMAGE_REFERENCE"
            echo "- Container image digest: $SQLSERVER_IMAGE_DIGEST"
            echo '- Installer: passed'
            echo '- Release gate: passed'
            echo '- Permission matrix: passed'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload sanitized failure summary
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: sqlserver-2019-linux-release-gate-error
          path: ${{ runner.temp }}/sqlserver-analyze-2019-error.txt
          if-no-files-found: ignore
          retention-days: 1

      - name: Stop synthetic SQL Server
        if: always()
        shell: bash
        run: docker rm --force sqlserver-analyze-test-2019 >/dev/null 2>&1 || true

  release-gate:
    if: always()
    needs:
      - impact
      - runtime
    name: SQL Server 2019 Linux release gate
    runs-on: ubuntu-24.04
    steps:
      - name: Confirm selected gate result
        shell: bash
        env:
          IMPACT_RESULT: ${{ needs.impact.result }}
          RUNTIME_REQUIRED: ${{ needs.impact.outputs.run_runtime }}
          RUNTIME_RESULT: ${{ needs.runtime.result }}
        run: |
          set -euo pipefail
          if [ "$IMPACT_RESULT" != 'success' ]; then
            echo 'CI impact selection failed.'
            exit 1
          fi
          if [ "$RUNTIME_REQUIRED" = 'true' ] && [ "$RUNTIME_RESULT" != 'success' ]; then
            echo 'Required SQL Server runtime checks did not pass.'
            exit 1
          fi
          if [ "$RUNTIME_REQUIRED" != 'true' ] && [ "$RUNTIME_RESULT" != 'skipped' ]; then
            echo 'SQL Server runtime was expected to be skipped.'
            exit 1
          fi
          echo 'Relevant SQL Server checks passed; unrelated runtime checks were skipped.'
