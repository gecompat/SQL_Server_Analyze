name: SQL Server 2022 Linux release gate

on:
  pull_request:
    paths:
      - '.github/workflows/sqlserver-2022-linux-release-gate.yml'
      - 'Code/**/*.sql'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/sqlserver-2022-linux-release-gate.yml'
      - 'Code/**/*.sql'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sqlserver-2022-linux-release-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-gate:
    name: SQL Server 2022 Linux release gate
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: agent/validate-sqlserver-2022-linux-gate

      - name: Commit literal Temporal source contract
        shell: python
        run: |
          from pathlib import Path
          import subprocess

          path = Path('Code/Tests/Integration/167_Special_Case_API_Contract.sql')
          text = path.read_text(encoding='utf-8')
          old = """IF @TemporalDefinition NOT LIKE N'%[[]sys[]].[[]periods[]]%'
 OR @TemporalDefinition NOT LIKE N'%[[]history_table_id[]]%'
 OR @TemporalDefinition NOT LIKE N'%[[]dm_db_partition_stats[]]%'
    THROW 54107,N'Die Temporal-Tables-Analyse besitzt nicht alle erwarteten read-only Metadatenquellen.',1;
"""
          new = """DECLARE @MissingTemporalSources nvarchar(2048)=NULL;
IF CHARINDEX(N'[sys].[periods]',@TemporalDefinition COLLATE SQL_Latin1_General_CP1_CS_AS)=0
    SET @MissingTemporalSources=N'sys.periods';
IF CHARINDEX(N'[history_table_id]',@TemporalDefinition COLLATE SQL_Latin1_General_CP1_CS_AS)=0
    SET @MissingTemporalSources=CONCAT_WS(N', ',@MissingTemporalSources,N'history_table_id');
IF CHARINDEX(N'[sys].[dm_db_partition_stats]',@TemporalDefinition COLLATE SQL_Latin1_General_CP1_CS_AS)=0
    SET @MissingTemporalSources=CONCAT_WS(N', ',@MissingTemporalSources,N'sys.dm_db_partition_stats');
IF @MissingTemporalSources IS NOT NULL
BEGIN
    DECLARE @TemporalSourceMessage nvarchar(2048)=CONCAT(N'Die Temporal-Tables-Analyse besitzt nicht alle erwarteten read-only Metadatenquellen: ',@MissingTemporalSources,N'.');
    THROW 54107,@TemporalSourceMessage,1;
END;
"""
          if old in text:
              path.write_text(text.replace(old, new, 1), encoding='utf-8', newline='\n')
              subprocess.run(['git', 'config', 'user.name', 'github-actions[bot]'], check=True)
              subprocess.run(['git', 'config', 'user.email', '41898282+github-actions[bot]@users.noreply.github.com'], check=True)
              subprocess.run(['git', 'add', path.as_posix()], check=True)
              subprocess.run(['git', 'commit', '-m', 'fix: use literal Temporal source checks'], check=True)
              subprocess.run(['git', 'push', 'origin', 'HEAD:agent/validate-sqlserver-2022-linux-gate'], check=True)
          elif "DECLARE @MissingTemporalSources nvarchar(2048)=NULL;" not in text:
              raise RuntimeError('Temporal source contract is neither original nor corrected.')

      - name: Prepare isolated SQL files
        shell: bash
        run: |
          set -euo pipefail
          cp -R Code "$RUNNER_TEMP/Code"
          find "$RUNNER_TEMP/Code" -type f -name '*.sql' -print0 \
            | xargs -0 perl -pi -e 's/\[DeineDatenbank\]/[SQLServerAnalyzeTest]/g'

      - name: Generate ephemeral SQL credential
        shell: bash
        run: |
          set -euo pipefail
          password="A$(openssl rand -hex 16)a1!"
          echo "::add-mask::$password"
          echo "MSSQL_EPHEMERAL_PASSWORD=$password" >> "$GITHUB_ENV"

      - name: Start SQL Server 2022 Linux
        shell: bash
        run: |
          set -euo pipefail
          docker pull --quiet mcr.microsoft.com/mssql/server:2022-latest >/dev/null
          docker run --name sqlserver-analyze-test \
            --detach \
            --env ACCEPT_EULA=Y \
            --env MSSQL_PID=Developer \
            --env MSSQL_COLLATION=SQL_Latin1_General_CP1_CS_AS \
            --env MSSQL_SA_PASSWORD="$MSSQL_EPHEMERAL_PASSWORD" \
            --volume "$RUNNER_TEMP/Code:/work/Code:ro" \
            mcr.microsoft.com/mssql/server:2022-latest >/dev/null

      - name: Wait for SQL Server readiness
        shell: bash
        run: |
          set -euo pipefail
          sqlcmd_path=''
          for attempt in $(seq 1 90); do
            sqlcmd_path=$(docker exec sqlserver-analyze-test bash -lc \
              "if [ -x /opt/mssql-tools18/bin/sqlcmd ]; then echo /opt/mssql-tools18/bin/sqlcmd; elif [ -x /opt/mssql-tools/bin/sqlcmd ]; then echo /opt/mssql-tools/bin/sqlcmd; fi" \
              || true)
            if [ -n "$sqlcmd_path" ] && docker exec \
              --env SQLCMDPASSWORD="$MSSQL_EPHEMERAL_PASSWORD" \
              sqlserver-analyze-test \
              "$sqlcmd_path" -S localhost -U sa -C -Q 'SELECT 1' >/dev/null 2>&1; then
              echo "SQLCMD_PATH=$sqlcmd_path" >> "$GITHUB_ENV"
              exit 0
            fi
            sleep 2
          done
          docker logs --tail 40 sqlserver-analyze-test
          exit 1

      - name: Create synthetic test database
        shell: bash
        run: |
          set -euo pipefail
          docker exec \
            --env SQLCMDPASSWORD="$MSSQL_EPHEMERAL_PASSWORD" \
            sqlserver-analyze-test \
            "$SQLCMD_PATH" -S localhost -U sa -C -b -Q \
            "CREATE DATABASE [SQLServerAnalyzeTest] COLLATE SQL_Latin1_General_CP1_CS_AS; ALTER DATABASE [SQLServerAnalyzeTest] SET COMPATIBILITY_LEVEL = 160;" >/dev/null

      - name: Install framework
        shell: bash
        run: |
          set -euo pipefail
          install_log="$RUNNER_TEMP/sqlserver-analyze-install.log"
          error_summary="$RUNNER_TEMP/sqlserver-analyze-error.txt"
          if ! docker exec \
            --env SQLCMDPASSWORD="$MSSQL_EPHEMERAL_PASSWORD" \
            --workdir /work/Code/Install \
            sqlserver-analyze-test \
            "$SQLCMD_PATH" -S localhost -U sa -C -b -i Install_All.sql >"$install_log" 2>&1; then
            echo 'Framework installation failed.'
            {
              grep -A 2 -E 'Msg [0-9]+|Sqlcmd: Error|Error:' "$install_log" | tail -n 80 || true
              echo 'Unresolved SQLCMD variable references:'
              grep -R -n -E '\$\([A-Za-z_][A-Za-z0-9_]*\)' "$RUNNER_TEMP/Code" || true
            } >"$error_summary"
            cat "$error_summary"
            exit 1
          fi
          echo 'Framework installation succeeded.'

      - name: Run release gate
        shell: bash
        run: |
          set -euo pipefail
          release_log="$RUNNER_TEMP/sqlserver-analyze-release-gate.log"
          error_summary="$RUNNER_TEMP/sqlserver-analyze-error.txt"
          if ! docker exec \
            --env SQLCMDPASSWORD="$MSSQL_EPHEMERAL_PASSWORD" \
            --workdir /work/Code/Tests \
            sqlserver-analyze-test \
            "$SQLCMD_PATH" -S localhost -U sa -C -b -i Run_Release_Gate.sql >"$release_log" 2>&1; then
            echo 'Release gate failed.'
            {
              echo 'Final release-gate output:'
              tail -n 180 "$release_log"
            } >"$error_summary"
            cat "$error_summary"
            exit 1
          fi
          echo 'Release gate succeeded.'

      - name: Record generic success summary
        if: success()
        shell: bash
        run: |
          {
            echo '## SQL Server 2022 Linux release gate'
            echo '- Target: synthetic SQL Server 2022 Developer on Linux'
            echo '- Compatibility level: 160'
            echo '- Installer: passed'
            echo '- Release gate: passed'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload sanitized failure summary
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: sqlserver-2022-linux-release-gate-error
          path: ${{ runner.temp }}/sqlserver-analyze-error.txt
          if-no-files-found: ignore
          retention-days: 1

      - name: Stop synthetic SQL Server
        if: always()
        shell: bash
        run: docker rm --force sqlserver-analyze-test >/dev/null 2>&1 || true
