name: Cleanup obsolete branches

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/cleanup-obsolete-branches.yml

permissions:
  contents: write

jobs:
  cleanup:
    name: Delete verified obsolete branches
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Delete exact verified refs
        uses: actions/github-script@v8
        with:
          script: |
            const containedBranches = [
              'agent/automate-documentation-validation',
              'agent/automate-documentation-validation-check',
              'agent/automate-documentation-validation-final',
              'agent/automate-documentation-validation-pr',
              'agent/automate-documentation-validation-ready',
              'agent/sqlserver-2019-linux-release-gate',
              'agent/sqlserver-2022-linux-release-gate-final',
              'agent/sqlserver-2022-permission-matrix',
              'agent/sqlserver-2025-linux-release-gate',
              'agent/sqlserver-2025-permission-classification-fix',
              'agent/sqlserver-2025-permission-diagnostic',
              'agent/sqlserver-2025-regex-contracts',
              'agent/sqlserver-2025-regex-matrix-final',
              'agent/validate-sqlserver-2022-linux-gate'
            ];

            const supersededBranch = {
              name: 'agent/sqlserver-2025-regex-final',
              expectedSha: 'e8d5d2c3550baaba7ca5c309e5214ceeff8914be'
            };

            const failures = [];
            const getRef = async (branch) => {
              try {
                const response = await github.rest.git.getRef({
                  ...context.repo,
                  ref: `heads/${branch}`
                });
                return response.data.object.sha;
              } catch (error) {
                if (error.status === 404) {
                  core.info(`${branch}: already absent`);
                  return null;
                }
                throw error;
              }
            };

            for (const branch of containedBranches) {
              try {
                const sha = await getRef(branch);
                if (!sha) continue;

                const comparison = await github.rest.repos.compareCommitsWithBasehead({
                  ...context.repo,
                  basehead: `main...${branch}`
                });
                if (comparison.data.ahead_by !== 0) {
                  failures.push(`${branch}: ahead_by=${comparison.data.ahead_by}`);
                  continue;
                }

                await github.rest.git.deleteRef({
                  ...context.repo,
                  ref: `heads/${branch}`
                });
                core.info(`${branch}: deleted at ${sha}`);
              } catch (error) {
                failures.push(`${branch}: ${error.message}`);
              }
            }

            try {
              const sha = await getRef(supersededBranch.name);
              if (sha && sha !== supersededBranch.expectedSha) {
                failures.push(
                  `${supersededBranch.name}: head changed from expected SHA`
                );
              } else if (sha) {
                await github.rest.git.deleteRef({
                  ...context.repo,
                  ref: `heads/${supersededBranch.name}`
                });
                core.info(`${supersededBranch.name}: deleted at verified SHA`);
              }
            } catch (error) {
              failures.push(`${supersededBranch.name}: ${error.message}`);
            }

            if (failures.length) {
              core.setFailed(failures.join('\n'));
            }
