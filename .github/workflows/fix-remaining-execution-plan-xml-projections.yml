name: Fix remaining execution plan XML projections

on:
  push:
    branches:
      - agent/implement-execution-plan-analysis
    paths:
      - '.github/workflows/fix-remaining-execution-plan-xml-projections.yml'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/fix-remaining-execution-plan-xml-projections.yml'

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/implement-execution-plan-analysis
          fetch-depth: 0
          show-progress: false

      - name: Materialize remaining nodes aliases
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          root = Path('Code/04_PlanCache')
          files = [path for path in root.glob('*.sql') if path.name[:3] in {
              '046','047','048','049','050','051','052','053'
          }]
          pattern = re.compile(r'(?P<prefix>[=,]\s*)(?P<node>\[[A-Za-z][A-Za-z0-9_]*\]\.\[n\])(?!\s*\.)')
          changed = []
          for path in files:
              text = path.read_text(encoding='utf-8')
              text, count = pattern.subn(
                  lambda match: match.group('prefix') + match.group('node') + ".query('.')",
                  text,
              )
              if count:
                  path.write_text(text, encoding='utf-8', newline='\n')
                  changed.append((path.as_posix(), count))

          remaining = []
          for path in files:
              text = path.read_text(encoding='utf-8')
              for match in pattern.finditer(text):
                  remaining.append(f'{path}:{match.start()}')
          if remaining:
              raise RuntimeError('Direct nodes() projections remain at: ' + ', '.join(remaining))
          if not changed:
              raise RuntimeError('No remaining nodes() projection was found to correct.')
          print('Corrected:', changed)
          PY

      - name: Commit XML projection corrections
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Code/04_PlanCache
          if ! git diff --cached --quiet; then
            git commit -m 'Fix remaining execution plan XML projections'
            git push origin HEAD:agent/implement-execution-plan-analysis
          fi
