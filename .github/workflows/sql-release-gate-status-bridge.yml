name: SQL release gate status bridge

on:
  workflow_run:
    workflows:
      - SQL Server 2019 Linux release gate
      - SQL Server 2022 Linux release gate
      - SQL Server 2025 Linux release gate
    types:
      - completed

permissions:
  contents: read
  statuses: write

jobs:
  publish-status:
    if: github.event.workflow_run.event == 'push' || github.event.workflow_run.event == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Publish classic commit status
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
          RUN_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
        run: |
          set -euo pipefail

          case "$WORKFLOW_NAME" in
            'SQL Server 2019 Linux release gate')
              context='sqlserver-2019-linux-release-gate'
              description='SQL Server 2019 Linux release gate'
              ;;
            'SQL Server 2022 Linux release gate')
              context='sqlserver-2022-linux-release-gate'
              description='SQL Server 2022 Linux release gate'
              ;;
            'SQL Server 2025 Linux release gate')
              context='sqlserver-2025-linux-release-gate'
              description='SQL Server 2025 Linux release gate'
              ;;
            *)
              echo 'Unexpected workflow name.'
              exit 1
              ;;
          esac

          case "$RUN_CONCLUSION" in
            success)
              state='success'
              ;;
            cancelled|skipped|neutral|stale)
              state='error'
              ;;
            *)
              state='failure'
              ;;
          esac

          export STATUS_STATE="$state"
          export STATUS_CONTEXT="$context"
          export STATUS_DESCRIPTION="$description"

          payload=$(python3 - <<'PY'
          import json
          import os

          print(json.dumps({
              'state': os.environ['STATUS_STATE'],
              'target_url': os.environ['RUN_URL'],
              'description': (
                  f"{os.environ['STATUS_DESCRIPTION']}: "
                  f"{os.environ['RUN_CONCLUSION']}"
              ),
              'context': os.environ['STATUS_CONTEXT'],
          }))
          PY
          )

          curl --fail-with-body --silent --show-error \
            --request POST \
            --header 'Accept: application/vnd.github+json' \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/statuses/${HEAD_SHA}" \
            --data "$payload" >/dev/null
