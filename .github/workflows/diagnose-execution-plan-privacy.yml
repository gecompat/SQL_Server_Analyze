name: Diagnose execution plan privacy gate

on:
  push:
    branches:
      - agent/implement-execution-plan-analysis
    paths:
      - '.github/workflows/diagnose-execution-plan-privacy.yml'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/diagnose-execution-plan-privacy.yml'

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/implement-execution-plan-analysis
          show-progress: false

      - name: Run privacy validator
        id: privacy
        continue-on-error: true
        shell: bash
        run: |
          python3 ./Code/Tests/Static/910_Validate_Repository_Privacy.py \
            --repository-root . \
            --allowlist ./Metadata/Quality/Repository_Privacy_Allowlist.csv \
            > "${RUNNER_TEMP}/execution-plan-privacy.log" 2>&1

      - name: Upload safe privacy diagnostic
        uses: actions/upload-artifact@v7
        with:
          name: execution-plan-privacy-diagnostic
          path: ${{ runner.temp }}/execution-plan-privacy.log
          retention-days: 1

      - name: Preserve failure state
        if: ${{ steps.privacy.outcome == 'failure' }}
        shell: bash
        run: exit 1
