name: Synchronize statistics evidence

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/synchronize-statistics-evidence.yml'

permissions:
  contents: write

jobs:
  synchronize:
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Remove temporary probe and synchronize evidence
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/synchronize-statistics-evidence.yml
          rm Metadata/Quality/Final_Head_Run_Probe.json

          python3 - <<'PY'
          import csv
          import json
          import re
          import subprocess
          from collections import OrderedDict
          from datetime import datetime, timezone
          from pathlib import Path

          commit = 'f4bf1d4333e7f4a38814dea72a0799ca1d949364'
          runs = {
              '2019': '29644565510',
              '2022': '29644565475',
              '2025': '29644565446',
              'docs': '29644565454',
              'privacy': '29644565464',
              'commit': '29644565467',
          }
          run_url = lambda key: f'https://github.com/gecompat/SQL_Server_Analyze/actions/runs/{runs[key]}'

          # Special-case test cases.
          path = Path('Metadata/Quality/Special_Case_Test_Cases.csv')
          lines = path.read_text(encoding='utf-8').splitlines()
          case_ids = {
              'STAT-UNIFORM','STAT-DOMINANT','STAT-TAIL','STAT-MODIFIED',
              'STAT-FILTERED','STAT-INCREMENTAL','STAT-BOUNDED','STAT-DENIED'
          }
          seen = set()
          for index, line in enumerate(lines):
              case_id = line.split(',', 1)[0]
              if case_id in case_ids:
                  if not line.endswith(',NOT_EXECUTED,'):
                      raise SystemExit(f'Unexpected status row for {case_id}.')
                  lines[index] = line[:-len(',NOT_EXECUTED,')] + f',PASS_WITH_LIMITATIONS,{run_url("2019")}'
                  seen.add(case_id)
          if seen != case_ids:
              raise SystemExit(f'Missing statistics case rows: {sorted(case_ids-seen)}')
          path.write_text('\n'.join(lines) + '\n', encoding='utf-8')

          # Backlog implementation status.
          path = Path('Metadata/Quality/Special_Case_Gap_Backlog.csv')
          lines = path.read_text(encoding='utf-8').splitlines()
          for index, line in enumerate(lines):
              if line.startswith('SC-011,'):
                  if not line.endswith(',IMPLEMENTED_MATRIX_PENDING'):
                      raise SystemExit('Unexpected SC-011 backlog status.')
                  lines[index] = line[:-len('IMPLEMENTED_MATRIX_PENDING')] + 'IMPLEMENTED_ACTIONS_GATE'
                  break
          else:
              raise SystemExit('SC-011 backlog row missing.')
          path.write_text('\n'.join(lines) + '\n', encoding='utf-8')

          # README status.
          path = Path('README.md')
          text = path.read_text(encoding='utf-8')
          old = ('Die Version `1.1.0-special.9` ergänzt die P2-Module für Verschlüsselungslebenszyklus und Wartungsoperationen. '
                 'Der Release-Gate-Vertrag umfasst nun 19 Suiten; P0 und die ersten zwanzig P1-Fälle bis Schema-/Designkorrektheit '
                 'besitzen commitbezogene Drei-Versionen-Evidenz. Als nächste P1-Gruppe folgt die begrenzte Statistikverteilung. '
                 'Weitere Feature-Positiv-, Grenzwert-, Last- und externe Restorefälle bleiben separate Nachweise.')
          new = ('Die Version `1.1.0-special.9` ergänzt die P2-Module für Verschlüsselungslebenszyklus und Wartungsoperationen. '
                 'Der Release-Gate-Vertrag umfasst nun 20 Suiten; P0 und die ersten achtundzwanzig P1-Fälle bis einschließlich '
                 'Statistikverteilung besitzen commitbezogene Drei-Versionen-Evidenz. Als nächste P1-Gruppe folgt die tiefe '
                 'Availability-Evidenz. Weitere Feature-Positiv-, Grenzwert-, Last- und externe Restorefälle bleiben separate Nachweise.')
          if text.count(old) != 1:
              raise SystemExit('README status paragraph not found exactly once.')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')

          # Human-readable test matrix.
          path = Path('Documentation/Quality/Test_Matrix.md')
          text = path.read_text(encoding='utf-8')
          text = re.sub(
              r'^\*\*Status:\*\*.*$',
              '**Status:** commitbezogene 20-Suite-Evidenz für P0 und die ersten achtundzwanzig P1-Fälle bis einschließlich Statistikverteilung vorhanden',
              text, count=1, flags=re.MULTILINE)
          text = re.sub(
              r'^Commit `c405946d7806472f42cfc38430d5ada33620780c`.*:$',
              f'Commit `{commit}` hat Installer, den 20-Suite-Release-Gate-Vertrag einschließlich aller 17 P0-Fälle und der ersten achtundzwanzig P1-Fälle bis einschließlich Statistikverteilung sowie die Berechtigungsmatrix auf den drei Linux-Targets erfolgreich abgeschlossen. Das SQL-Server-2025-Gate hat zusätzlich die eigenständige Regex-Matrix ausgeführt:',
              text, count=1, flags=re.MULTILINE)
          rows = {
              '2019': f'| SQL Server 2019 | `15.0.4480.2` | 150 | [Run {runs["2019"]}]({run_url("2019")}) | `PASS_WITH_LIMITATIONS`; alle 17 P0- und die ersten achtundzwanzig P1-Fälle |',
              '2022': f'| SQL Server 2022 | `16.0.4265.3` | 160 | [Run {runs["2022"]}]({run_url("2022")}) | `PASS_WITH_LIMITATIONS`; alle 17 P0- und die ersten achtundzwanzig P1-Fälle |',
              '2025': f'| SQL Server 2025 | `17.0.4065.4` | 170 | [Run {runs["2025"]}]({run_url("2025")}) | `PASS_WITH_LIMITATIONS`; alle 17 P0- und die ersten achtundzwanzig P1-Fälle; `REGEX_MATRIX=PASS` |',
          }
          for version, row in rows.items():
              text, count = re.subn(rf'^\| SQL Server {version} \|.*$', row, text, count=1, flags=re.MULTILINE)
              if count != 1:
                  raise SystemExit(f'Target row {version} not found.')
          text = re.sub(
              r'^Der \[Dokumentations- und statische Vertrag\].*$',
              f'Der [Dokumentations- und statische Vertrag]({run_url("docs")}), das [Repository-Datenschutzgate]({run_url("privacy")}) und das [Commit-Message-Gate]({run_url("commit")}) sind für denselben Commit ebenfalls grün. Die vollständigen maschinenlesbaren Werte und eigenständigen Suitezeilen stehen in den CSV-Dateien. Diese Evidence gilt für disposable synthetische Linux-Ziele; Statistikindikatoren bleiben Prüfhinweise und lösen weder Statistik- noch Schemaänderungen aus. Weitere Feature-Positiv-, Grenzwert-, Last-, Windows-, Azure-MI- oder externe Restore-Nachweise bleiben separat.',
              text, count=1, flags=re.MULTILINE)
          text = text.replace('Er startet die elf folgenden Verträge', 'Er startet die zwölf folgenden Verträge', 1)
          schema_bullet = '   - `Integration/174_P1_Schema_Runtime_Contract.sql`\n'
          if 'Integration/175_P1_Statistics_Runtime_Contract.sql' not in text:
              if schema_bullet not in text:
                  raise SystemExit('Schema suite bullet missing.')
              text = text.replace(schema_bullet, schema_bullet + '   - `Integration/175_P1_Statistics_Runtime_Contract.sql`\n', 1)
          path.write_text(text, encoding='utf-8')

          # Release runbook.
          path = Path('Documentation/Quality/Release_Gate_Runbook.md')
          text = path.read_text(encoding='utf-8')
          text = text.replace('dieselben dreizehn Release-Gate-Suiten', 'dieselben zwanzig Release-Gate-Suiten')
          text = text.replace(
              'Installer, 19-Suite-Release-Gate einschließlich P0-, P1-IQP-, P1-Contention-, P1-Speicher-, P1-Backupketten- und P1-Schemavertrag',
              'Installer, 20-Suite-Release-Gate einschließlich P0-, P1-IQP-, P1-Contention-, P1-Speicher-, P1-Backupketten-, P1-Schema- und P1-Statistikverteilungsvertrag')
          text = text.replace('folgende neunzehn Suiten aus:', 'folgende zwanzig Suiten aus:', 1)
          old_list = '''11. P1-Schema-/Design-Laufzeitvertrag mit garantierter Bereinigung generischer DDL-Fixtures
12. Common
13. Current State
14. Object und Index
15. Plan Cache
16. Query Store
17. Extended Events
18. Infrastructure
19. Server Health'''
          new_list = '''11. P1-Schema-/Design-Laufzeitvertrag mit garantierter Bereinigung generischer DDL-Fixtures
12. P1-Statistikverteilungs-Laufzeitvertrag mit begrenzten synthetischen FULLSCAN-Histogrammen, Kandidatengrenze und Restricted-Group-Pfad
13. Common
14. Current State
15. Object und Index
16. Plan Cache
17. Query Store
18. Extended Events
19. Infrastructure
20. Server Health'''
          if old_list not in text:
              raise SystemExit('Old release-gate suite list missing.')
          text = text.replace(old_list, new_list, 1)
          text = text.replace('`ExecutedSuites=19`', '`ExecutedSuites=20`', 1)
          path.write_text(text, encoding='utf-8')

          # Release notes.
          path = Path('Documentation/Quality/Release_Notes.md')
          text = path.read_text(encoding='utf-8')
          anchor = '- Die neunzehnte Suite automatisiert nicht vertrauenswürdige Constraints, fehlende FK-Stützindizes, exakt gleiche Indexdefinitionen und hohen Identity-Typwertebereichsverbrauch. Alle generischen DDL-Fixtures werden im Erfolgs- und Fehlerpfad ausdrücklich entfernt. Commit `c405946d7806472f42cfc38430d5ada33620780c` hat die Suite auf SQL Server 2019, 2022 und 2025 bestätigt.\n'
          addition = (
              f'- Die zwanzigste Suite automatisiert acht Statistikverteilungsfälle: gleichmäßige, dominante und Tail-konzentrierte Histogramme, hohe Modification Counter, gefilterte und inkrementelle Statistiken, Kandidatenbegrenzung sowie einen tatsächlich verweigerten `CATALOG_DEEP`-Pfad. Commit `{commit}` hat die diagnostikfreie Suite auf SQL Server 2019, 2022 und 2025 bestätigt.\n'
              '- Die Laufzeitautomatisierung hat drei produktive Vertragsfehler offengelegt und korrigiert: eine kollidierende lokale Temp-Tabelle zwischen Verteilungs- und Basisstatistikprocedure, einen im dynamischen Histogrammbatch fehlerhaften und für den begrenzten Pfad unnötigen Query-Hint sowie eine fehlende `IsPartial=1`-Markierung bei vor der Analyse festgestellten Restricted-Statuswerten.\n'
              '- Die Statistik-Fixtures verwenden ausschließlich generische, kurzlebige Objekte und begrenzte FULLSCAN-Statistiken; sie beweisen keine universelle Histogrammqualität und ersetzen keine großen Produktionsverteilungen oder Lasttests.\n')
          if 'Die zwanzigste Suite automatisiert acht Statistikverteilungsfälle' not in text:
              if anchor not in text:
                  raise SystemExit('Release-note schema anchor missing.')
              text = text.replace(anchor, anchor + addition, 1)
          path.write_text(text, encoding='utf-8')

          # AI project context.
          path = Path('AI_Metadata/PROJECT_CONTEXT.md')
          text = path.read_text(encoding='utf-8')
          text = text.replace(
              '- Actions führen Installer, 13-Suite-Gate und synthetische Berechtigungsmatrix versionshart auf SQL Server 2019, 2022 und 2025 aus.',
              '- Actions führen Installer, 20-Suite-Gate einschließlich der ersten achtundzwanzig P1-Fälle bis Statistikverteilung und synthetische Berechtigungsmatrix versionshart auf SQL Server 2019, 2022 und 2025 aus.')
          path.write_text(text, encoding='utf-8')

          # Architecture status.
          path = Path('Documentation/Architecture/Special_Case_Modules.md')
          text = path.read_text(encoding='utf-8')
          old = ('Der Codebestand besitzt Help-, Installer-, Objekt-, Parameter-, Smoke- und Spezialfall-API-Verträge. Die Zielmatrix steht in '
                 '`Documentation/Quality/Test_Matrix.md` und `Metadata/Quality/Test_Matrix.csv`. Ein Eintrag `NOT_EXECUTED` ist Planungsstand und niemals '
                 'Ausführungsevidenz. Dieser Implementierungsstand darf erst nach dokumentierten Läufen je Zielsystem als Laufzeit-Release freigegeben werden.')
          new = ('Der Codebestand besitzt Help-, Installer-, Objekt-, Parameter-, Smoke- und Spezialfall-API-Verträge. Die Zielmatrix steht in '
                 '`Documentation/Quality/Test_Matrix.md` und `Metadata/Quality/Test_Matrix.csv`. P0 und die ersten achtundzwanzig P1-Fälle bis einschließlich '
                 'Statistikverteilung besitzen commitbezogene Drei-Versionen-Evidenz. Ein Eintrag `NOT_EXECUTED` ist weiterhin Planungsstand und niemals '
                 'Ausführungsevidenz; die vollständige Laufzeitfreigabe bleibt bis zur vorgesehenen Zielmatrix ausständig.')
          if text.count(old) != 1:
              raise SystemExit('Architecture status paragraph missing.')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')

          # Release audit: derive current matrix counts after CSV updates.
          path = Path('Metadata/Quality/Special_Case_Release_Audit.json')
          audit = json.loads(path.read_text(encoding='utf-8'), object_pairs_hook=OrderedDict)
          tracked = [p for p in subprocess.check_output(['git','ls-files'], text=True).splitlines() if Path(p).exists()]
          sql_count = sum(1 for p in tracked if p.lower().endswith('.sql'))
          audit['generatedAtUtc'] = datetime.now(timezone.utc).replace(microsecond=0).isoformat().replace('+00:00','Z')
          audit['status'] = 'ACTIONS_PASS'
          audit['scope'] = 'green commit-specific 20-suite SQL Server 2019, 2022 and 2025 evidence through eight P1 statistics-distribution cases'
          audit['inventory']['repositoryFiles'] = len(tracked)
          audit['inventory']['sqlFilesIncludingTestsAndExamples'] = sql_count
          audit['staticChecks']['sqlLexicalBalance']['filesChecked'] = sql_count

          stats_contract = OrderedDict([
              ('status','ACTIONS_PASS_WITH_LIMITATIONS'),
              ('suite','Code/Tests/Integration/175_P1_Statistics_Runtime_Contract.sql'),
              ('syntheticCases',8),
              ('caseIds',['STAT-UNIFORM','STAT-DOMINANT','STAT-TAIL','STAT-MODIFIED','STAT-FILTERED','STAT-INCREMENTAL','STAT-BOUNDED','STAT-DENIED']),
              ('boundedFullscanFixtures',True),
              ('candidateLimitVerified',True),
              ('restrictedCatalogDeepPathVerified',True),
              ('temporaryDiagnosticsRemoved',True),
              ('runtimeDataPersisted',False),
              ('validatedCommit',commit),
              ('sqlServer2019ActionsRun',run_url('2019')),
              ('sqlServer2022ActionsRun',run_url('2022')),
              ('sqlServer2025ActionsRun',run_url('2025')),
              ('note','Eight bounded synthetic distribution cases passed on SQL Server 2019, 2022 and 2025. The suite validates findings and evidence limits, not universal histogram quality or production-scale load behavior.')
          ])
          checks = OrderedDict()
          for key, value in audit['staticChecks'].items():
              checks[key] = value
              if key == 'p1SchemaRuntimeContract':
                  checks['p1StatisticsRuntimeContract'] = stats_contract
          audit['staticChecks'] = checks
          audit['staticChecks']['repositoryPrivacyGate']['repositoryFilesScanned'] = len(tracked)
          audit['staticChecks']['repositoryPrivacyGate']['zipFilesScanned'] = len(tracked)

          def count_csv(file_name, status_index):
              with open(file_name, encoding='utf-8', newline='') as handle:
                  rows = list(csv.reader(handle))
              data = rows[1:]
              counts = {}
              for row in data:
                  status = row[status_index]
                  counts[status] = counts.get(status, 0) + 1
              return len(data), counts

          target_total, target_counts = count_csv('Metadata/Quality/Test_Matrix.csv', 12)
          suite_total, suite_counts = count_csv('Metadata/Quality/Release_Gate_Evidence.csv', 3)
          case_total, case_counts = count_csv('Metadata/Quality/Special_Case_Test_Cases.csv', 8)
          doc = audit['testDocumentation']
          doc['targetRows'] = target_total
          doc['targetRowsNotExecuted'] = target_counts.get('NOT_EXECUTED',0)
          doc['targetRowsPassWithLimitations'] = target_counts.get('PASS_WITH_LIMITATIONS',0)
          doc['releaseGateSuiteRows'] = suite_total
          doc['releaseGateSuiteRowsNotExecuted'] = suite_counts.get('NOT_EXECUTED',0)
          doc['releaseGateSuiteRowsPass'] = suite_counts.get('PASS',0)
          doc['releaseGateSuiteRowsPassWithLimitations'] = suite_counts.get('PASS_WITH_LIMITATIONS',0)
          doc['specialCaseRows'] = case_total
          doc['specialCaseRowsNotExecuted'] = case_counts.get('NOT_EXECUTED',0)
          doc['specialCaseRowsPassWithLimitations'] = case_counts.get('PASS_WITH_LIMITATIONS',0)
          doc['specialCaseRowsAutomatedPending'] = case_counts.get('AUTOMATED_PENDING',0)
          doc['runtimeStatus'] = 'ACTIONS_PASS'
          doc['claim'] = (f'Commit {commit} passed the synthetic Linux installer, 20-suite release gate and permission contract on SQL Server 2019, 2022 and 2025, including all 17 P0 cases and the first twenty-eight P1 cases through statistics distribution plus the separate SQL Server 2025 regex matrix. Statistics findings remain bounded review evidence; no automatic statistics or schema change or restore was executed. Exact public product builds and immutable container image digests were captured. Further feature-positive, boundary, load, Windows, Azure MI and external restore evidence remain separate.')
          for key, version in [('sqlServer2019','2019'),('sqlServer2022','2022'),('sqlServer2025','2025')]:
              doc['targetRuntimeEvidence'][key]['actionRun'] = run_url(version)
          doc['actionEvidence']['commitSha'] = commit
          doc['actionEvidence']['documentationRun'] = run_url('docs')
          doc['actionEvidence']['repositoryPrivacyRun'] = run_url('privacy')
          doc['actionEvidence']['commitMessageRun'] = run_url('commit')
          doc['actionEvidence']['sqlServer2019Run'] = run_url('2019')
          doc['actionEvidence']['sqlServer2022Run'] = run_url('2022')
          doc['actionEvidence']['sqlServer2025Run'] = run_url('2025')
          doc['actionEvidence']['sqlServer2025RegexRun'] = run_url('2025')
          path.write_text(json.dumps(audit, indent=2, ensure_ascii=False) + '\n', encoding='utf-8')
          PY

      - name: Validate synchronized files
        shell: bash
        run: |
          set -euo pipefail
          python3 -m json.tool Metadata/Quality/Special_Case_Release_Audit.json >/dev/null
          test "$(grep -c '^STAT-.*PASS_WITH_LIMITATIONS.*29644565510$' Metadata/Quality/Special_Case_Test_Cases.csv)" -eq 8
          grep -q '^SC-011,.*IMPLEMENTED_ACTIONS_GATE$' Metadata/Quality/Special_Case_Gap_Backlog.csv
          grep -q 'ExecutedSuites=20' Documentation/Quality/Release_Gate_Runbook.md
          grep -q '20-Suite-Evidenz' Documentation/Quality/Test_Matrix.md
          ! grep -R -n 'STAT_UNIFORM_DIAGNOSTIC\|STAT_DENIED_DIAGNOSTIC' Code/Tests/Integration

      - name: Commit synchronized evidence
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'docs: synchronize P1 statistics evidence'
          git push origin HEAD:main
