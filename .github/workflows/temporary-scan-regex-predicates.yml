name: Temporary scan SQL Server 2025 regex predicates

on:
  pull_request:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Collect invalid predicate comparisons
        shell: python
        run: |
          import os
          import re
          from pathlib import Path

          invalid = []
          comparison = re.compile(r"REGEXP_LIKE\s*\(.*\)\s*=\s*[01]", re.IGNORECASE)
          for path in sorted(Path("Code").rglob("*.sql")):
              for line_number, line in enumerate(path.read_text(encoding="utf-8").splitlines(), 1):
                  if comparison.search(line):
                      invalid.append(f"{path}:{line_number}: {line.strip()}")
          output = Path(os.environ["RUNNER_TEMP"]) / "regex-predicate-scan.txt"
          output.write_text("\n".join(invalid) + ("\n" if invalid else ""), encoding="utf-8")
          print(f"Invalid predicate comparisons: {len(invalid)}")

      - name: Upload scan result
        uses: actions/upload-artifact@v7
        with:
          name: sqlserver-2025-regex-predicate-scan
          path: ${{ runner.temp }}/regex-predicate-scan.txt
          retention-days: 1
