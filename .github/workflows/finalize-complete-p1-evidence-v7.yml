name: Finalize complete P1 evidence v7

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/finalize-complete-p1-evidence-v7.yml'

permissions:
  contents: write
  actions: read
  statuses: write

jobs:
  finalize:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Generate or verify complete P1 evidence
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          EVIDENCE_COMMIT: bdb8f66e20f015e7c563e6d3747144400897b281
        run: |
          set -euo pipefail
          if [ -f .github/scripts/finalize_p1_csv.py ] && \
             [ -f .github/scripts/finalize_p1_docs.py ] && \
             [ -f .github/scripts/finalize_p1_audit.py ]; then
            gh api --paginate \
              "repos/${GITHUB_REPOSITORY}/actions/runs?head_sha=${EVIDENCE_COMMIT}&per_page=100" \
              --jq '.workflow_runs' > "$RUNNER_TEMP/runs-pages.jsonl"
            python3 - <<'PY'
          from pathlib import Path
          import json, os
          runs=[]
          for line in Path(os.environ['RUNNER_TEMP']+'/runs-pages.jsonl').read_text().splitlines():
              runs.extend(json.loads(line))
          Path(os.environ['RUNNER_TEMP']+'/runs.json').write_text(json.dumps(runs),encoding='utf-8')
          PY
            RUNS_JSON="$RUNNER_TEMP/runs.json" python3 .github/scripts/finalize_p1_csv.py
            RUNS_JSON="$RUNNER_TEMP/runs.json" python3 .github/scripts/finalize_p1_docs.py
            RUNS_JSON="$RUNNER_TEMP/runs.json" python3 .github/scripts/finalize_p1_audit.py
          else
            grep -Fq 'alle 17 P0- und alle 40 P1-Fälle' Documentation/Quality/Next_Steps.md
            grep -Fq '"specialCaseRowsNotExecuted": 115' Metadata/Quality/Special_Case_Release_Audit.json
            grep -Fq 'P1_FINDINGS_RUNTIME' Metadata/Quality/Release_Gate_Evidence.csv
          fi

      - name: Remove all temporary finalizer files
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/finalize-complete-p1-evidence-v2.yml
          rm -f .github/workflows/finalize-complete-p1-evidence-v3.yml
          rm -f .github/workflows/finalize-complete-p1-evidence-v4.yml
          rm -f .github/workflows/finalize-complete-p1-evidence-v5.yml
          rm -f .github/workflows/finalize-complete-p1-evidence-v6.yml
          rm -f .github/workflows/finalize-complete-p1-evidence-v7.yml
          rm -f .github/scripts/finalize_p1_csv.py
          rm -f .github/scripts/finalize_p1_docs.py
          rm -f .github/scripts/finalize_p1_audit.py
          rm -f Metadata/Quality/P1_Evidence_Finalizer_Run.json

      - name: Commit outstanding changes atomically
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from __future__ import annotations
          import base64, json, os, subprocess, urllib.error, urllib.request
          from pathlib import Path

          repository=os.environ['GITHUB_REPOSITORY']
          token=os.environ['GH_TOKEN']
          expected=os.environ['GITHUB_SHA']
          api='https://api.github.com'

          def call(method,path,payload=None):
              req=urllib.request.Request(
                  api+path,
                  data=None if payload is None else json.dumps(payload).encode(),
                  method=method,
                  headers={
                      'Accept':'application/vnd.github+json',
                      'Authorization':f'Bearer {token}',
                      'X-GitHub-Api-Version':'2022-11-28',
                      'User-Agent':'complete-p1-finalizer-v7',
                      'Content-Type':'application/json',
                  },
              )
              try:
                  with urllib.request.urlopen(req,timeout=30) as response:
                      body=response.read()
              except urllib.error.HTTPError as exc:
                  raise SystemExit(f'Git Data API failure: {method} {path} HTTP {exc.code}') from exc
              return json.loads(body) if body else {}

          status=subprocess.check_output(['git','status','--porcelain=v1','-z'])
          records=[record for record in status.split(b'\0') if record]
          if not records:
              print('Complete P1 evidence already finalized; no commit required.')
              raise SystemExit(0)

          ref=call('GET',f'/repos/{repository}/git/ref/heads/main')
          head=ref['object']['sha']
          if head!=expected:
              raise SystemExit('Main advanced during finalization; refusing stale update.')
          base=call('GET',f'/repos/{repository}/git/commits/{head}')['tree']['sha']
          entries=[]
          seen=set()
          for record in records:
              code=record[:2].decode('ascii','replace')
              raw=record[3:]
              if b' -> ' in raw:
                  raw=raw.split(b' -> ',1)[1]
              path=raw.decode('utf-8')
              if path in seen:
                  continue
              seen.add(path)
              file_path=Path(path)
              if 'D' in code and not file_path.exists():
                  entries.append({'path':path,'mode':'100644','type':'blob','sha':None})
                  continue
              if not file_path.is_file():
                  continue
              blob=call('POST',f'/repos/{repository}/git/blobs',{
                  'content':base64.b64encode(file_path.read_bytes()).decode('ascii'),
                  'encoding':'base64',
              })
              entries.append({'path':path,'mode':'100755' if os.access(file_path,os.X_OK) else '100644','type':'blob','sha':blob['sha']})
          tree=call('POST',f'/repos/{repository}/git/trees',{'base_tree':base,'tree':entries})
          commit=call('POST',f'/repos/{repository}/git/commits',{
              'message':'docs: finalize complete P1 evidence',
              'tree':tree['sha'],
              'parents':[head],
          })
          call('PATCH',f'/repos/{repository}/git/refs/heads/main',{'sha':commit['sha'],'force':False})
          print('Complete P1 evidence commit:',commit['sha'])
          PY

      - name: Publish status
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          case "$JOB_STATUS" in
            success) state='success' ;;
            cancelled) state='error' ;;
            *) state='failure' ;;
          esac
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state="$state" -f target_url="$RUN_URL" \
            -f description="Idempotent complete P1 finalizer: $JOB_STATUS" \
            -f context='complete-p1-evidence-finalizer-v7' >/dev/null
