name: Fix P2 dynamic execution

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/fix-p2-dynamic-exec.yml'

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Normalize dynamic statements
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          def one(text, old, new, label):
              if text.count(old)!=1:
                  raise SystemExit(f'unexpected anchor: {label}')
              return text.replace(old,new,1)

          p=Path('Code/Tests/Integration/179_P2_Special_Feature_Inventory_Runtime_Contract.sql')
          text=p.read_text(encoding='utf-8')
          text=one(text,
              "DECLARE @Definition nvarchar(max);",
              "DECLARE @Definition nvarchar(max),@Sql nvarchar(max);",
              'feature sql declaration')
          text=one(text,
              "    IF @ChangeTrackingWasEnabled=0\n        EXEC(N'ALTER DATABASE '+QUOTENAME(@DatabaseName)+N' SET CHANGE_TRACKING = ON (CHANGE_RETENTION = 2 DAYS, AUTO_CLEANUP = ON);');",
              "    IF @ChangeTrackingWasEnabled=0\n    BEGIN\n        SET @Sql=N'ALTER DATABASE '+QUOTENAME(@DatabaseName)+N' SET CHANGE_TRACKING = ON (CHANGE_RETENTION = 2 DAYS, AUTO_CLEANUP = ON);';\n        EXEC [sys].[sp_executesql] @Sql;\n    END;",
              'feature ct on')
          text=one(text,
              "    IF DB_ID(@DeniedDatabase) IS NOT NULL\n        EXEC(N'ALTER DATABASE '+QUOTENAME(@DeniedDatabase)+N' SET SINGLE_USER WITH ROLLBACK IMMEDIATE; DROP DATABASE '+QUOTENAME(@DeniedDatabase)+N';');\n    EXEC(N'CREATE DATABASE '+QUOTENAME(@DeniedDatabase)+N';');\n    EXEC(N'USE '+QUOTENAME(@DeniedDatabase)+N'; CREATE USER [ExampleFeatureRestrictedUser] WITHOUT LOGIN; DENY CONNECT TO [ExampleFeatureRestrictedUser];');",
              "    IF DB_ID(@DeniedDatabase) IS NOT NULL\n    BEGIN\n        SET @Sql=N'ALTER DATABASE '+QUOTENAME(@DeniedDatabase)+N' SET SINGLE_USER WITH ROLLBACK IMMEDIATE; DROP DATABASE '+QUOTENAME(@DeniedDatabase)+N';';\n        EXEC [sys].[sp_executesql] @Sql;\n    END;\n    SET @Sql=N'CREATE DATABASE '+QUOTENAME(@DeniedDatabase)+N';';\n    EXEC [sys].[sp_executesql] @Sql;\n    SET @Sql=N'USE '+QUOTENAME(@DeniedDatabase)+N'; CREATE USER [ExampleFeatureRestrictedUser] WITHOUT LOGIN; DENY CONNECT TO [ExampleFeatureRestrictedUser];';\n    EXEC [sys].[sp_executesql] @Sql;",
              'feature denied setup')
          text=one(text,
              "    EXEC(N'ALTER DATABASE '+QUOTENAME(@DeniedDatabase)+N' SET SINGLE_USER WITH ROLLBACK IMMEDIATE; DROP DATABASE '+QUOTENAME(@DeniedDatabase)+N';');\n    IF @ChangeTrackingWasEnabled=0\n        EXEC(N'ALTER DATABASE '+QUOTENAME(@DatabaseName)+N' SET CHANGE_TRACKING = OFF;');",
              "    SET @Sql=N'ALTER DATABASE '+QUOTENAME(@DeniedDatabase)+N' SET SINGLE_USER WITH ROLLBACK IMMEDIATE; DROP DATABASE '+QUOTENAME(@DeniedDatabase)+N';';\n    EXEC [sys].[sp_executesql] @Sql;\n    IF @ChangeTrackingWasEnabled=0\n    BEGIN\n        SET @Sql=N'ALTER DATABASE '+QUOTENAME(@DatabaseName)+N' SET CHANGE_TRACKING = OFF;';\n        EXEC [sys].[sp_executesql] @Sql;\n    END;",
              'feature success cleanup')
          text=one(text,
              "        IF DB_ID(@DeniedDatabase) IS NOT NULL EXEC(N'ALTER DATABASE '+QUOTENAME(@DeniedDatabase)+N' SET SINGLE_USER WITH ROLLBACK IMMEDIATE; DROP DATABASE '+QUOTENAME(@DeniedDatabase)+N';');\n        IF @ChangeTrackingWasEnabled=0 AND EXISTS(SELECT 1 FROM [sys].[change_tracking_databases] WITH (NOLOCK) WHERE [database_id]=DB_ID())\n            EXEC(N'ALTER DATABASE '+QUOTENAME(@DatabaseName)+N' SET CHANGE_TRACKING = OFF;');",
              "        IF DB_ID(@DeniedDatabase) IS NOT NULL\n        BEGIN\n            SET @Sql=N'ALTER DATABASE '+QUOTENAME(@DeniedDatabase)+N' SET SINGLE_USER WITH ROLLBACK IMMEDIATE; DROP DATABASE '+QUOTENAME(@DeniedDatabase)+N';';\n            EXEC [sys].[sp_executesql] @Sql;\n        END;\n        IF @ChangeTrackingWasEnabled=0 AND EXISTS(SELECT 1 FROM [sys].[change_tracking_databases] WITH (NOLOCK) WHERE [database_id]=DB_ID())\n        BEGIN\n            SET @Sql=N'ALTER DATABASE '+QUOTENAME(@DatabaseName)+N' SET CHANGE_TRACKING = OFF;';\n            EXEC [sys].[sp_executesql] @Sql;\n        END;",
              'feature error cleanup')
          p.write_text(text,encoding='utf-8',newline='\n')

          p=Path('Code/Tests/Integration/184_P2_Data_Capture_Runtime_Contract.sql')
          text=p.read_text(encoding='utf-8')
          text=one(text,
              "    EXEC(N'CREATE DATABASE '+QUOTENAME(@NoneDb)+N';');\n    EXEC(N'CREATE DATABASE '+QUOTENAME(@CtDb)+N';');\n    EXEC(N'CREATE DATABASE '+QUOTENAME(@CtDb2)+N';');\n    EXEC(N'ALTER DATABASE '+QUOTENAME(@CtDb)+N' SET CHANGE_TRACKING = ON (CHANGE_RETENTION = 2 DAYS, AUTO_CLEANUP = ON);');\n    EXEC(N'ALTER DATABASE '+QUOTENAME(@CtDb2)+N' SET CHANGE_TRACKING = ON (CHANGE_RETENTION = 2 DAYS, AUTO_CLEANUP = ON);');",
              "    SET @Sql=N'CREATE DATABASE '+QUOTENAME(@NoneDb)+N';'; EXEC [sys].[sp_executesql] @Sql;\n    SET @Sql=N'CREATE DATABASE '+QUOTENAME(@CtDb)+N';'; EXEC [sys].[sp_executesql] @Sql;\n    SET @Sql=N'CREATE DATABASE '+QUOTENAME(@CtDb2)+N';'; EXEC [sys].[sp_executesql] @Sql;\n    SET @Sql=N'ALTER DATABASE '+QUOTENAME(@CtDb)+N' SET CHANGE_TRACKING = ON (CHANGE_RETENTION = 2 DAYS, AUTO_CLEANUP = ON);'; EXEC [sys].[sp_executesql] @Sql;\n    SET @Sql=N'ALTER DATABASE '+QUOTENAME(@CtDb2)+N' SET CHANGE_TRACKING = ON (CHANGE_RETENTION = 2 DAYS, AUTO_CLEANUP = ON);'; EXEC [sys].[sp_executesql] @Sql;",
              'data capture setup')
          text=one(text,
              "    EXEC(N'ALTER DATABASE '+QUOTENAME(@CtDb)+N' SET CHANGE_TRACKING = ON (CHANGE_RETENTION = 2 DAYS, AUTO_CLEANUP = OFF);');",
              "    SET @Sql=N'ALTER DATABASE '+QUOTENAME(@CtDb)+N' SET CHANGE_TRACKING = ON (CHANGE_RETENTION = 2 DAYS, AUTO_CLEANUP = OFF);';\n    EXEC [sys].[sp_executesql] @Sql;",
              'data capture cleanup off')
          p.write_text(text,encoding='utf-8',newline='\n')
          PY
      - name: Commit fixes and remove workflow
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/fix-p2-dynamic-exec.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Code/Tests/Integration .github/workflows/fix-p2-dynamic-exec.yml
          git diff --cached --check
          git commit -m 'test: normalize P2 dynamic statements'
          git push origin HEAD:main
