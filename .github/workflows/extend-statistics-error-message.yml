name: Extend statistics error message diagnostic

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/extend-statistics-error-message.yml'

permissions:
  contents: write

jobs:
  instrument:
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Add synthetic error-message field
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('Code/Tests/Integration/175_P1_Statistics_Runtime_Contract.sql')
          text = path.read_text(encoding='utf-8')
          replacements = [
              (
                  '[HistogramVisibleCount],[ErrorNumber],[Detail]',
                  '[HistogramVisibleCount],[ErrorNumber],[ErrorMessage],[Detail]',
              ),
              (
                  "[ErrorNumber] int N'$.ErrorNumber',[Detail] nvarchar(2000) N'$.Detail'",
                  "[ErrorNumber] int N'$.ErrorNumber',[ErrorMessage] nvarchar(2048) N'$.ErrorMessage',[Detail] nvarchar(2000) N'$.Detail'",
              ),
          ]
          for old, new in replacements:
              if text.count(old) != 1:
                  raise SystemExit(f'Expected one diagnostic target for: {old}')
              text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit diagnostic and remove one-time workflow
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/extend-statistics-error-message.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Code/Tests/Integration/175_P1_Statistics_Runtime_Contract.sql \
                  .github/workflows/extend-statistics-error-message.yml
          git diff --cached --check
          git commit -m 'test: expose statistics source error message'
          git push origin HEAD:main
