name: Extend statistics error message diagnostic

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/extend-statistics-error-message.yml'

permissions:
  contents: write

jobs:
  instrument:
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Add synthetic error-message field
        shell: bash
        run: |
          set -euo pipefail
          file='Code/Tests/Integration/175_P1_Statistics_Runtime_Contract.sql'
          perl -pi -e 's/\[HistogramVisibleCount\],\[ErrorNumber\],\[Detail\]/[HistogramVisibleCount],[ErrorNumber],[ErrorMessage],[Detail]/' "$file"
          perl -pi -e "s/\[ErrorNumber\] int N'\$\.ErrorNumber',\[Detail\]/[ErrorNumber] int N'\$.ErrorNumber',[ErrorMessage] nvarchar(2048) N'\$.ErrorMessage',[Detail]/" "$file"
          grep -Fq '[ErrorNumber],[ErrorMessage],[Detail]' "$file"
          grep -Fq "[ErrorMessage] nvarchar(2048) N'$.ErrorMessage'" "$file"

      - name: Commit diagnostic and remove one-time workflow
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/extend-statistics-error-message.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Code/Tests/Integration/175_P1_Statistics_Runtime_Contract.sql \
                  .github/workflows/extend-statistics-error-message.yml
          git diff --cached --check
          git commit -m 'test: expose statistics source error message'
          git push origin HEAD:main
