name: Temporary add permission scenario step diagnostics

on:
  pull_request:

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out permission matrix branch
        uses: actions/checkout@v6
        with:
          ref: agent/sqlserver-2022-permission-matrix

      - name: Add scenario step diagnostics
        shell: python
        run: |
          from pathlib import Path

          path = Path('Code/Tests/Permissions/110_SQL_Server_2022_Permission_Matrix.sql')
          text = path.read_text(encoding='utf-8')

          dynamic_start = text.index("    SET @Sql=N'\n")
          dynamic_end = text.index("    REVERT;'", dynamic_start) + len("    REVERT;'")
          dynamic = text[dynamic_start:dynamic_end]
          lines = dynamic.splitlines(keepends=True)
          output: list[str] = []
          capability_index = 0
          inserted = {
              'current_sessions': 0,
              'standard_capabilities': 0,
              'query_store_capabilities': 0,
              'parse_results': 0,
              'policy_lookup': 0,
              'insert_result': 0,
              'revert': 0,
          }

          for index, line in enumerate(lines):
              stripped = line.strip()
              if stripped == 'EXEC [monitor].[USP_CurrentSessions]':
                  output.append("    RAISERROR(N''PERMISSION_MATRIX step=current_sessions'',10,1) WITH NOWAIT;\n")
                  inserted['current_sessions'] += 1
              elif stripped == 'EXEC [monitor].[USP_CheckFrameworkCapabilities]':
                  capability_index += 1
                  step = 'standard_capabilities' if capability_index == 1 else 'query_store_capabilities'
                  output.append(f"    RAISERROR(N''PERMISSION_MATRIX step={step}'',10,1) WITH NOWAIT;\n")
                  inserted[step] += 1
              elif stripped == 'SELECT' and index + 1 < len(lines) and '@SessionStatus=JSON_VALUE' in lines[index + 1]:
                  output.append("    RAISERROR(N''PERMISSION_MATRIX step=parse_results'',10,1) WITH NOWAIT;\n")
                  inserted['parse_results'] += 1
              elif stripped.startswith('SELECT @PlanAllowed='):
                  output.append("    RAISERROR(N''PERMISSION_MATRIX step=policy_lookup'',10,1) WITH NOWAIT;\n")
                  inserted['policy_lookup'] += 1
              elif stripped == 'INSERT [#PermissionMatrix]':
                  output.append("    RAISERROR(N''PERMISSION_MATRIX step=insert_result'',10,1) WITH NOWAIT;\n")
                  inserted['insert_result'] += 1
              elif stripped == "REVERT;'":
                  output.append("    RAISERROR(N''PERMISSION_MATRIX step=revert'',10,1) WITH NOWAIT;\n")
                  inserted['revert'] += 1
              output.append(line)

          if any(count != 1 for count in inserted.values()) or capability_index != 2:
              raise RuntimeError(f'Unexpected scenario anchors: inserted={inserted}, capability_index={capability_index}.')

          text = text[:dynamic_start] + ''.join(output) + text[dynamic_end:]

          capture_start = text.index('    DECLARE @ScenarioErrorLine int=ERROR_LINE();')
          capture_end = text.index('    BEGIN TRY\n        REVERT;', capture_start)
          replacement = (
              '    DECLARE @ScenarioErrorNumber int=ERROR_NUMBER();\n'
              '    DECLARE @ScenarioErrorLine int=ERROR_LINE();\n'
              '    DECLARE @ScenarioErrorProcedure sysname=ERROR_PROCEDURE();\n'
              '    DECLARE @ScenarioErrorText nvarchar(2048)=ERROR_MESSAGE();\n'
          )
          text = text[:capture_start] + replacement + text[capture_end:]

          message_start = text.index('    DECLARE @ScenarioError nvarchar(2048)=CONCAT(', capture_start)
          message_end = text.index(';\n', message_start) + 1
          message = (
              "    DECLARE @ScenarioError nvarchar(2048)=CONCAT("
              "N'Permission scenario ',@ScenarioCode,N' failed; number=',@ScenarioErrorNumber,"
              "N'; procedure=',COALESCE(@ScenarioErrorProcedure,N'<dynamic>'),"
              "N'; line=',@ScenarioErrorLine,N': ',@ScenarioErrorText);"
          )
          text = text[:message_start] + message + text[message_end:]

          path.write_text(text, encoding='utf-8', newline='\n')

      - name: Commit scenario diagnostics
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Code/Tests/Permissions/110_SQL_Server_2022_Permission_Matrix.sql
          git diff --cached --quiet && exit 0
          git commit -m 'test: add permission scenario step diagnostics'
          git push origin HEAD:agent/sqlserver-2022-permission-matrix
