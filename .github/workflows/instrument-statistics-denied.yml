name: Instrument statistics denied contract

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/instrument-statistics-denied.yml'

permissions:
  contents: write

jobs:
  instrument:
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Insert bounded denied diagnostic
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('Code/Tests/Integration/175_P1_Statistics_Runtime_Contract.sql')
          lines = path.read_text(encoding='utf-8').splitlines()
          start = next(i for i, line in enumerate(lines) if '/* STAT-DENIED:' in line)
          marker = '        SET @Impersonating=0;'
          insert_at = next(i + 1 for i in range(start, len(lines)) if lines[i] == marker)
          diagnostic = [
              "        SELECT N'STAT_DENIED_DIAGNOSTIC' AS [DiagnosticCode],",
              "               @Status AS [StatusCode],@Partial AS [IsPartial],",
              "               TRY_CONVERT(int,JSON_VALUE(@Json,N'$.meta.distributionCount')) AS [DistributionCount],",
              "               TRY_CONVERT(int,JSON_VALUE(@Json,N'$.meta.findingCount')) AS [FindingCount];",
              "        SELECT N'STAT_DENIED_DATABASE_STATUS' AS [DiagnosticCode],[StatusCode],",
              "               [IsPartial],[CandidateCount],[HistogramVisibleCount],[ErrorNumber],[ErrorMessage],[Detail]",
              "        FROM OPENJSON(@Json,N'$.databaseStatus') WITH",
              "        ([StatusCode] varchar(40) N'$.StatusCode',[IsPartial] bit N'$.IsPartial',",
              "         [CandidateCount] bigint N'$.CandidateCount',",
              "         [HistogramVisibleCount] bigint N'$.HistogramVisibleCount',",
              "         [ErrorNumber] int N'$.ErrorNumber',[ErrorMessage] nvarchar(2048) N'$.ErrorMessage',",
              "         [Detail] nvarchar(2000) N'$.Detail');",
          ]
          lines[insert_at:insert_at] = diagnostic
          path.write_text('\n'.join(lines) + '\n', encoding='utf-8')
          PY

      - name: Commit diagnostic and remove one-time workflow
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/instrument-statistics-denied.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Code/Tests/Integration/175_P1_Statistics_Runtime_Contract.sql \
                  .github/workflows/instrument-statistics-denied.yml
          git diff --cached --check
          git commit -m 'test: instrument statistics denied contract'
          git push origin HEAD:main
