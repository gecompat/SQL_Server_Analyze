name: Finalize complete P1 evidence v6

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/finalize-complete-p1-evidence-v6.yml'

permissions:
  contents: write
  actions: read
  statuses: write

jobs:
  finalize:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Read commit evidence
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          EVIDENCE_COMMIT: bdb8f66e20f015e7c563e6d3747144400897b281
        run: |
          set -euo pipefail
          gh api --paginate \
            "repos/${GITHUB_REPOSITORY}/actions/runs?head_sha=${EVIDENCE_COMMIT}&per_page=100" \
            --jq '.workflow_runs' > "$RUNNER_TEMP/runs-pages.jsonl"
          python3 - <<'PY'
          from pathlib import Path
          import json, os
          runs=[]
          for line in Path(os.environ['RUNNER_TEMP']+'/runs-pages.jsonl').read_text().splitlines():
              runs.extend(json.loads(line))
          Path(os.environ['RUNNER_TEMP']+'/runs.json').write_text(json.dumps(runs),encoding='utf-8')
          PY

      - name: Generate final evidence
        shell: bash
        env:
          RUNS_JSON: ${{ runner.temp }}/runs.json
        run: |
          set -euo pipefail
          python3 .github/scripts/finalize_p1_csv.py
          python3 .github/scripts/finalize_p1_docs.py
          python3 .github/scripts/finalize_p1_audit.py

      - name: Remove temporary finalizer files
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/finalize-complete-p1-evidence-v2.yml
          rm -f .github/workflows/finalize-complete-p1-evidence-v3.yml
          rm -f .github/workflows/finalize-complete-p1-evidence-v4.yml
          rm -f .github/workflows/finalize-complete-p1-evidence-v5.yml
          rm -f .github/workflows/finalize-complete-p1-evidence-v6.yml
          rm -f .github/scripts/finalize_p1_csv.py
          rm -f .github/scripts/finalize_p1_docs.py
          rm -f .github/scripts/finalize_p1_audit.py
          rm -f Metadata/Quality/P1_Evidence_Finalizer_Run.json

      - name: Commit atomically through Git Data API
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from __future__ import annotations

          import base64
          import json
          import os
          import subprocess
          import urllib.error
          import urllib.request
          from pathlib import Path

          repository=os.environ['GITHUB_REPOSITORY']
          token=os.environ['GH_TOKEN']
          expected_head=os.environ['GITHUB_SHA']
          api='https://api.github.com'

          def request(method:str,path:str,payload:dict|None=None):
              data=None if payload is None else json.dumps(payload).encode('utf-8')
              req=urllib.request.Request(
                  api+path,
                  data=data,
                  method=method,
                  headers={
                      'Accept':'application/vnd.github+json',
                      'Authorization':f'Bearer {token}',
                      'X-GitHub-Api-Version':'2022-11-28',
                      'User-Agent':'p1-evidence-finalizer',
                      'Content-Type':'application/json',
                  },
              )
              try:
                  with urllib.request.urlopen(req,timeout=30) as response:
                      body=response.read()
              except urllib.error.HTTPError as exc:
                  raise SystemExit(f'Git Data API request failed: {method} {path} HTTP {exc.code}') from exc
              return json.loads(body) if body else {}

          ref=request('GET',f'/repos/{repository}/git/ref/heads/main')
          current_head=ref['object']['sha']
          if current_head!=expected_head:
              raise SystemExit('Main advanced during evidence generation; refusing non-fast-forward update.')
          commit=request('GET',f'/repos/{repository}/git/commits/{current_head}')
          base_tree=commit['tree']['sha']

          status=subprocess.check_output(['git','status','--porcelain=v1','-z'],text=False)
          records=[item for item in status.split(b'\0') if item]
          entries=[]
          seen=set()
          for record in records:
              code=record[:2].decode('ascii','replace')
              raw_path=record[3:]
              if b' -> ' in raw_path:
                  raw_path=raw_path.split(b' -> ',1)[1]
              path=raw_path.decode('utf-8')
              if path in seen:
                  continue
              seen.add(path)
              file_path=Path(path)
              deleted='D' in code and not file_path.exists()
              if deleted:
                  entries.append({'path':path,'mode':'100644','type':'blob','sha':None})
                  continue
              if not file_path.is_file():
                  continue
              blob=request('POST',f'/repos/{repository}/git/blobs',{
                  'content':base64.b64encode(file_path.read_bytes()).decode('ascii'),
                  'encoding':'base64',
              })
              executable=os.access(file_path,os.X_OK)
              entries.append({'path':path,'mode':'100755' if executable else '100644','type':'blob','sha':blob['sha']})

          if not entries:
              raise SystemExit('No generated evidence changes found.')
          tree=request('POST',f'/repos/{repository}/git/trees',{'base_tree':base_tree,'tree':entries})
          new_commit=request('POST',f'/repos/{repository}/git/commits',{
              'message':'docs: finalize complete P1 evidence',
              'tree':tree['sha'],
              'parents':[current_head],
          })
          request('PATCH',f'/repos/{repository}/git/refs/heads/main',{'sha':new_commit['sha'],'force':False})
          print('P1 evidence commit created:',new_commit['sha'])
          PY

      - name: Publish finalizer status
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          case "$JOB_STATUS" in
            success) state='success' ;;
            cancelled) state='error' ;;
            *) state='failure' ;;
          esac
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state="$state" -f target_url="$RUN_URL" \
            -f description="Complete P1 evidence finalizer: $JOB_STATUS" \
            -f context='complete-p1-evidence-finalizer-v6' >/dev/null
