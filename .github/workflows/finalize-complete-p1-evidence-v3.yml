name: Finalize complete P1 evidence v3

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/finalize-complete-p1-evidence-v3.yml'

permissions:
  contents: write
  actions: read
  statuses: write

jobs:
  finalize:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Read commit evidence
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          EVIDENCE_COMMIT: bdb8f66e20f015e7c563e6d3747144400897b281
        run: |
          set -euo pipefail
          gh api --paginate \
            "repos/${GITHUB_REPOSITORY}/actions/runs?head_sha=${EVIDENCE_COMMIT}&per_page=100" \
            --jq '.workflow_runs' > "$RUNNER_TEMP/runs-pages.jsonl"
          python3 - <<'PY'
          from pathlib import Path
          import json, os
          runs=[]
          for line in Path(os.environ['RUNNER_TEMP']+'/runs-pages.jsonl').read_text().splitlines():
              runs.extend(json.loads(line))
          Path(os.environ['RUNNER_TEMP']+'/runs.json').write_text(json.dumps(runs),encoding='utf-8')
          PY

      - name: Generate final evidence
        shell: bash
        env:
          RUNS_JSON: ${{ runner.temp }}/runs.json
        run: |
          set -euo pipefail
          python3 .github/scripts/finalize_p1_csv.py
          python3 .github/scripts/finalize_p1_docs.py
          python3 .github/scripts/finalize_p1_audit.py

      - name: Commit evidence and clean helpers
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/finalize-complete-p1-evidence-v2.yml
          rm -f .github/workflows/finalize-complete-p1-evidence-v3.yml
          rm -f .github/scripts/finalize_p1_csv.py
          rm -f .github/scripts/finalize_p1_docs.py
          rm -f .github/scripts/finalize_p1_audit.py
          rm -f Metadata/Quality/P1_Evidence_Finalizer_Run.json
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'docs: finalize complete P1 evidence'
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Publish finalizer status
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          case "$JOB_STATUS" in
            success) state='success' ;;
            cancelled) state='error' ;;
            *) state='failure' ;;
          esac
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state="$state" -f target_url="$RUN_URL" \
            -f description="Complete P1 evidence finalizer: $JOB_STATUS" \
            -f context='complete-p1-evidence-finalizer-v3' >/dev/null
