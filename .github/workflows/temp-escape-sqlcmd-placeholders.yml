name: Temporary escape SQLCMD placeholders

on:
  push:
    branches:
      - agent/validate-sqlserver-2022-linux-gate

permissions:
  contents: write

jobs:
  fix-placeholders:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Check out branch
        uses: actions/checkout@v6
        with:
          ref: agent/validate-sqlserver-2022-linux-gate

      - name: Escape runtime placeholders from SQLCMD preprocessing
        shell: python
        run: |
          from pathlib import Path
          import re

          code_root = Path('Code')
          changed = []

          for path in sorted(code_root.rglob('*.sql')):
              text = path.read_text(encoding='utf-8')
              updated = text.replace(
                  'Definitionen. $(DATABASE) wird in der Prüf-USP mit QUOTENAME ersetzt.',
                  'Definitionen. Der Datenbank-Platzhalter wird in der Prüf-USP mit QUOTENAME ersetzt.'
              )
              updated = updated.replace(
                  '$(DATABASENAME)',
                  "' + N'$' + N'(DATABASENAME)"
              )
              updated = updated.replace(
                  '$(DATABASE)',
                  "' + N'$' + N'(DATABASE)"
              )

              if updated != text:
                  path.write_text(updated, encoding='utf-8', newline='\n')
                  changed.append(path.as_posix())

          remaining = []
          pattern = re.compile(r'\$\([A-Za-z_][A-Za-z0-9_]*\)')
          for path in sorted(code_root.rglob('*.sql')):
              for line_number, line in enumerate(path.read_text(encoding='utf-8').splitlines(), 1):
                  if pattern.search(line):
                      remaining.append(f'{path.as_posix()}:{line_number}')

          if remaining:
              raise RuntimeError('Unescaped SQLCMD-style runtime placeholders remain at: ' + ', '.join(remaining))

          expected = {
              'Code/01_Common/060_VW_FrameworkFeatureCatalog.sql',
              'Code/01_Common/070_USP_CheckFrameworkCapabilities.sql',
          }
          if set(changed) != expected:
              raise RuntimeError(f'Unexpected changed files: {changed!r}')

      - name: Commit corrected SQL templates
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Code/01_Common/060_VW_FrameworkFeatureCatalog.sql Code/01_Common/070_USP_CheckFrameworkCapabilities.sql
          git diff --cached --quiet && exit 0
          git commit -m 'fix: escape runtime SQLCMD placeholders'
          git push origin HEAD:agent/validate-sqlserver-2022-linux-gate
