name: Apply canonical execution plan session IDs

on:
  push:
    branches:
      - agent/implement-execution-plan-analysis
    paths:
      - '.bootstrap/apply_execution_plan_session_ids.py'
      - '.github/workflows/apply-execution-plan-session-ids.yml'
  pull_request:
    branches:
      - main
    paths:
      - '.bootstrap/apply_execution_plan_session_ids.py'
      - '.github/workflows/apply-execution-plan-session-ids.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/implement-execution-plan-analysis
          fetch-depth: 0
          show-progress: false

      - name: Apply canonical session-list API
        shell: bash
        run: python3 ./.bootstrap/apply_execution_plan_session_ids.py

      - name: Validate static contracts
        shell: bash
        run: |
          set -euo pipefail
          python3 ./Code/Tests/Static/950_Validate_Nonblocking_Metadata.py
          pwsh -NoLogo -NoProfile -File ./Code/Tests/Integration/192_ExecutionPlanAnalysis_Installer_Contract.ps1
          pwsh -NoLogo -NoProfile -File ./Code/Tests/Static/900_Validate_Analysis_Documentation.ps1

      - name: Commit canonical session-list API
        shell: bash
        run: |
          set -euo pipefail
          git checkout -- .bootstrap/apply_execution_plan_session_ids.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m 'Use canonical session IDs in execution plan analysis'
            git push origin HEAD:agent/implement-execution-plan-analysis
          fi
