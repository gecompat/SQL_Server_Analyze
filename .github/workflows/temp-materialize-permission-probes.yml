name: Temporary materialize permission probes

on:
  pull_request:

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out permission matrix branch
        uses: actions/checkout@v6
        with:
          ref: agent/sqlserver-2022-permission-matrix

      - name: Materialize permission values before insert
        shell: python
        run: |
          from pathlib import Path

          path = Path('Code/Tests/Permissions/110_SQL_Server_2022_Permission_Matrix.sql')
          text = path.read_text(encoding='utf-8')
          dynamic_start = text.index("    SET @Sql=N'\n")
          dynamic_end = text.index("    REVERT;'", dynamic_start) + len("    REVERT;'")
          dynamic = text[dynamic_start:dynamic_end]

          declaration_anchor = "    DECLARE @PlanAllowed bit=NULL,@PlanReason varchar(20)=NULL;"
          declarations = """    DECLARE @PlanAllowed bit=NULL,@PlanReason varchar(20)=NULL;
              DECLARE @HasViewServerState bit=NULL,@HasViewServerPerformanceState bit=NULL;
              DECLARE @HasViewDatabaseState bit=NULL,@HasViewDatabasePerformanceState bit=NULL;""".replace('              ', '    ')
          if dynamic.count(declaration_anchor) != 1:
              raise RuntimeError(f'Expected declaration anchor once, found {dynamic.count(declaration_anchor)}.')
          dynamic = dynamic.replace(declaration_anchor, declarations, 1)

          insert_marker = "    RAISERROR(N''PERMISSION_MATRIX step=insert_result'',10,1) WITH NOWAIT;"
          materialization = """    SET @HasViewServerState=CONVERT(bit,HAS_PERMS_BY_NAME(NULL,NULL,N''VIEW SERVER STATE''));
              SET @HasViewServerPerformanceState=CONVERT(bit,HAS_PERMS_BY_NAME(NULL,NULL,N''VIEW SERVER PERFORMANCE STATE''));
              SET @HasViewDatabaseState=CONVERT(bit,HAS_PERMS_BY_NAME(DB_NAME(),N''DATABASE'',N''VIEW DATABASE STATE''));
              SET @HasViewDatabasePerformanceState=CONVERT(bit,HAS_PERMS_BY_NAME(DB_NAME(),N''DATABASE'',N''VIEW DATABASE PERFORMANCE STATE''));
              SELECT
                    @HasViewServerState=COALESCE(@HasViewServerState,0)
                  , @HasViewServerPerformanceState=COALESCE(@HasViewServerPerformanceState,0)
                  , @HasViewDatabaseState=COALESCE(@HasViewDatabaseState,0)
                  , @HasViewDatabasePerformanceState=COALESCE(@HasViewDatabasePerformanceState,0);

              RAISERROR(N''PERMISSION_MATRIX step=insert_result'',10,1) WITH NOWAIT;""".replace('              ', '    ')
          if dynamic.count(insert_marker) != 1:
              raise RuntimeError(f'Expected insert marker once, found {dynamic.count(insert_marker)}.')
          dynamic = dynamic.replace(insert_marker, materialization, 1)

          replacements = {
              "CONVERT(bit,COALESCE(HAS_PERMS_BY_NAME(NULL,NULL,N''VIEW SERVER STATE''),0))": "@HasViewServerState",
              "CONVERT(bit,COALESCE(HAS_PERMS_BY_NAME(NULL,NULL,N''VIEW SERVER PERFORMANCE STATE''),0))": "@HasViewServerPerformanceState",
              "CONVERT(bit,COALESCE(HAS_PERMS_BY_NAME(DB_NAME(),N''DATABASE'',N''VIEW DATABASE STATE''),0))": "@HasViewDatabaseState",
              "CONVERT(bit,COALESCE(HAS_PERMS_BY_NAME(DB_NAME(),N''DATABASE'',N''VIEW DATABASE PERFORMANCE STATE''),0))": "@HasViewDatabasePerformanceState",
          }
          for old, new in replacements.items():
              if dynamic.count(old) != 1:
                  raise RuntimeError(f'Expected inline permission expression once: {old}; found {dynamic.count(old)}.')
              dynamic = dynamic.replace(old, new, 1)

          text = text[:dynamic_start] + dynamic + text[dynamic_end:]

          sysadmin_declaration = "DECLARE @PlanAllowed bit=NULL,@PlanReason varchar(20)=NULL;"
          sysadmin_pos = text.index("/* Sysadmin-Bypass im ursprünglichen Testkontext. */")
          declaration_pos = text.index(sysadmin_declaration, sysadmin_pos)
          sysadmin_declarations = """DECLARE @PlanAllowed bit=NULL,@PlanReason varchar(20)=NULL;
          DECLARE @HasViewServerState bit=NULL,@HasViewServerPerformanceState bit=NULL;
          DECLARE @HasViewDatabaseState bit=NULL,@HasViewDatabasePerformanceState bit=NULL;""".replace('          ', '')
          text = text[:declaration_pos] + sysadmin_declarations + text[declaration_pos + len(sysadmin_declaration):]

          sysadmin_insert_pos = text.index("INSERT [#PermissionMatrix]\nVALUES", sysadmin_pos)
          sysadmin_materialization = """SET @HasViewServerState=CONVERT(bit,HAS_PERMS_BY_NAME(NULL,NULL,N'VIEW SERVER STATE'));
          SET @HasViewServerPerformanceState=CONVERT(bit,HAS_PERMS_BY_NAME(NULL,NULL,N'VIEW SERVER PERFORMANCE STATE'));
          SET @HasViewDatabaseState=CONVERT(bit,HAS_PERMS_BY_NAME(DB_NAME(),N'DATABASE',N'VIEW DATABASE STATE'));
          SET @HasViewDatabasePerformanceState=CONVERT(bit,HAS_PERMS_BY_NAME(DB_NAME(),N'DATABASE',N'VIEW DATABASE PERFORMANCE STATE'));
          SELECT
                @HasViewServerState=COALESCE(@HasViewServerState,0)
              , @HasViewServerPerformanceState=COALESCE(@HasViewServerPerformanceState,0)
              , @HasViewDatabaseState=COALESCE(@HasViewDatabaseState,0)
              , @HasViewDatabasePerformanceState=COALESCE(@HasViewDatabasePerformanceState,0);

          """.replace('          ', '')
          text = text[:sysadmin_insert_pos] + sysadmin_materialization + text[sysadmin_insert_pos:]

          sysadmin_replacements = {
              "CONVERT(bit,COALESCE(HAS_PERMS_BY_NAME(NULL,NULL,N'VIEW SERVER STATE'),0))": "@HasViewServerState",
              "CONVERT(bit,COALESCE(HAS_PERMS_BY_NAME(NULL,NULL,N'VIEW SERVER PERFORMANCE STATE'),0))": "@HasViewServerPerformanceState",
              "CONVERT(bit,COALESCE(HAS_PERMS_BY_NAME(DB_NAME(),N'DATABASE',N'VIEW DATABASE STATE'),0))": "@HasViewDatabaseState",
              "CONVERT(bit,COALESCE(HAS_PERMS_BY_NAME(DB_NAME(),N'DATABASE',N'VIEW DATABASE PERFORMANCE STATE'),0))": "@HasViewDatabasePerformanceState",
          }
          for old, new in sysadmin_replacements.items():
              if text.count(old) != 1:
                  raise RuntimeError(f'Expected sysadmin permission expression once: {old}; found {text.count(old)}.')
              text = text.replace(old, new, 1)

          path.write_text(text, encoding='utf-8', newline='\n')

      - name: Commit permission materialization
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Code/Tests/Permissions/110_SQL_Server_2022_Permission_Matrix.sql
          git diff --cached --quiet && exit 0
          git commit -m 'fix: materialize permission probes'
          git push origin HEAD:agent/sqlserver-2022-permission-matrix
