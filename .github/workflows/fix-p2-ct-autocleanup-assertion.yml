name: Fix P2 CT auto-cleanup assertion

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/fix-p2-ct-autocleanup-assertion.yml'

permissions:
  contents: write
  statuses: write

jobs:
  fix:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Bind CT auto-cleanup to public finding
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          path=Path('Code/Tests/Integration/184_P2_Data_Capture_Runtime_Contract.sql')
          text=path.read_text(encoding='utf-8')
          old="""    IF CHARINDEX(N'''CT_AUTO_CLEANUP_DISABLED_CONTEXT''',@Definition)=0
       OR NOT EXISTS
          (
              SELECT 1 FROM OPENJSON(@Json,N'$.databaseStatus')
              WITH ([IsChangeTrackingEnabled] bit N'$.IsChangeTrackingEnabled')
              WHERE [IsChangeTrackingEnabled]=1
          )
        THROW 55806,N'P2-Vertrag CT-AUTO-CLEANUP-OFF fehlgeschlagen.',1;"""
          new="""    IF CHARINDEX(N'''CT_AUTO_CLEANUP_DISABLED''',@Definition)=0
       OR NOT EXISTS
          (
              SELECT 1 FROM OPENJSON(@Json,N'$.findings')
              WITH ([FindingCode] varchar(120) N'$.FindingCode',[MetricValue] decimal(38,4) N'$.MetricValue')
              WHERE [FindingCode]='CT_AUTO_CLEANUP_DISABLED' AND [MetricValue]=0
          )
        THROW 55806,N'P2-Vertrag CT-AUTO-CLEANUP-OFF fehlgeschlagen.',1;"""
          if text.count(old)!=1:
              raise SystemExit('unexpected CT auto-cleanup assertion')
          path.write_text(text.replace(old,new,1),encoding='utf-8',newline='\n')
          PY
      - name: Commit fix and remove helper
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/fix-p2-ct-autocleanup-assertion.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Code/Tests/Integration/184_P2_Data_Capture_Runtime_Contract.sql .github/workflows/fix-p2-ct-autocleanup-assertion.yml
          git diff --cached --check
          git commit -m 'test: bind P2 CT auto-cleanup finding'
          git push origin HEAD:main
      - name: Publish helper status
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          state='success'; if [ "$JOB_STATUS" != 'success' ]; then state='failure'; fi
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state="$state" -f description='P2 CT auto-cleanup assertion helper' \
            -f context='p2-ct-autocleanup-helper' >/dev/null
