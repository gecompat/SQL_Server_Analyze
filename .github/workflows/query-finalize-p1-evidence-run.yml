name: Query finalize P1 evidence run

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/query-finalize-p1-evidence-run.yml'

permissions:
  contents: write
  actions: read

jobs:
  query:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Query finalizer
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          run_id=$(gh run list --workflow finalize-complete-p1-evidence.yml --limit 1 --json databaseId --jq '.[0].databaseId')
          gh run view "$run_id" --json databaseId,status,conclusion,headSha > Metadata/Quality/P1_Evidence_Finalizer_Run.json
          gh run view "$run_id" --log-failed > "$RUNNER_TEMP/finalizer.log" || true
          python3 - <<'PY'
          from pathlib import Path
          import json, os, re
          path=Path('Metadata/Quality/P1_Evidence_Finalizer_Run.json')
          result=json.loads(path.read_text())
          lines=Path(os.environ['RUNNER_TEMP']+'/finalizer.log').read_text(errors='replace').splitlines()
          findings=[]
          for line in lines:
              if any(token in line for token in ('Missing ','Unexpected ','Error:','Exception','SystemExit','Traceback')):
                  line=re.sub(r'/home/runner/[^\s]+','<path>',line)
                  line=re.sub(r'\b[0-9a-f]{40}\b','<sha>',line)
                  findings.append(line[-400:])
          result['errors']=findings[-5:]
          path.write_text(json.dumps(result,indent=2)+'\n')
          PY
      - name: Commit query and remove workflow
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/query-finalize-p1-evidence-run.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Metadata/Quality/P1_Evidence_Finalizer_Run.json .github/workflows/query-finalize-p1-evidence-run.yml
          git commit -m 'chore: record P1 evidence finalizer status'
          git pull --rebase origin main
          git push origin HEAD:main
