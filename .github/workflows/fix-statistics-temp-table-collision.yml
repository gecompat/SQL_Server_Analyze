name: Fix statistics temp-table collision

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/fix-statistics-temp-table-collision.yml'

permissions:
  contents: write

jobs:
  apply-fix:
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Rename outer statistics status table
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('Code/03_ObjectIndex/045_USP_StatisticsDistributionAnalysis.sql')
          text = path.read_text(encoding='utf-8')
          old = '[#DatabaseStatus]'
          new = '[#DistributionDatabaseStatus]'
          count = text.count(old)
          if count < 8:
              raise SystemExit(f'Unexpected status-table reference count: {count}')
          text = text.replace(old, new)
          if old in text:
              raise SystemExit('Old temp-table identifier remains.')
          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit correction and remove one-time workflow
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/fix-statistics-temp-table-collision.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Code/03_ObjectIndex/045_USP_StatisticsDistributionAnalysis.sql \
                  .github/workflows/fix-statistics-temp-table-collision.yml
          git diff --cached --check
          git commit -m 'fix: isolate statistics distribution status table'
          git push origin HEAD:main
