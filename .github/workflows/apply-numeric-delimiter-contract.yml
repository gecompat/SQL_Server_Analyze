name: Apply numeric delimiter contract

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/apply-numeric-delimiter-contract.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Add numeric delimiter contracts
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('Code/Tests/Integration/165_Filter_Output_Contract.sql')
          text = path.read_text(encoding='utf-8')
          marker = "    INSERT [#Failure] VALUES(N'TVF_ParsePipeList_bracket_syntax',N'Nicht geschlossene Klammer wurde nicht als ungültig erkannt.');\n"
          block = """

          /* Numerische Listen: Pipe, Beistrich und Strichpunkt sind gleichwertig. */
          IF (SELECT COUNT(*) FROM [monitor].[TVF_ParseBigintList](N'11, 22;33|44') WHERE [IsValid]=1) <> 4
              INSERT [#Failure] VALUES(N'TVF_ParseBigintList_delimiters',N'Gemischte numerische Trennzeichen wurden nicht in vier gültige Elemente zerlegt.');

          IF NOT EXISTS
          (
              SELECT 1
              FROM [monitor].[TVF_ParseBigintList](N'11, 22;33|44')
              WHERE [ItemOrdinal]=2 AND [ItemText]=N'22' AND [NumberValue]=22 AND [IsValid]=1
          )
              INSERT [#Failure] VALUES(N'TVF_ParseBigintList_ordinal',N'Beistrich-getrenntes numerisches Listenelement wurde nicht korrekt normalisiert.');

          IF NOT EXISTS
          (
              SELECT 1
              FROM [monitor].[TVF_ParseBigintList](N'11,;22')
              WHERE [ItemOrdinal]=2 AND [IsValid]=0 AND [ErrorCode]='EMPTY_ITEM'
          )
              INSERT [#Failure] VALUES(N'TVF_ParseBigintList_empty_item',N'Leeres numerisches Listenelement zwischen gemischten Trennzeichen wurde nicht erkannt.');
          """
          if 'TVF_ParseBigintList_delimiters' in text:
              raise SystemExit('Numeric delimiter contracts already exist.')
          if text.count(marker) != 1:
              raise SystemExit('Expected one insertion anchor.')
          path.write_text(text.replace(marker, marker + block, 1), encoding='utf-8', newline='\n')
          PY

      - name: Commit contract and remove maintenance workflow
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          rm .github/workflows/apply-numeric-delimiter-contract.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Code/Tests/Integration/165_Filter_Output_Contract.sql \
                  .github/workflows/apply-numeric-delimiter-contract.yml
          git diff --cached --check
          git commit -m 'test: cover numeric list delimiters'
          git push origin HEAD:main
          gh api --method DELETE "repos/${GITHUB_REPOSITORY}/git/refs/heads/agent/numeric-list-delimiters"
