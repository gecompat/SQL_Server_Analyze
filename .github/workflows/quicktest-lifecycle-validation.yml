name: Quick-test lifecycle validation

on:
  pull_request:
    paths:
      - '.github/workflows/quicktest-lifecycle-validation.yml'
      - 'Lab/Install-Lab.ps1'
      - 'Lab/Uninstall-Lab.ps1'
      - 'Lab/QuickTest/**'
      - 'Lab/Validation/Invoke-LabQuickTestLifecycleTests.ps1'
      - 'Lab/Orchestration/Modules/DiagnosticLab/Public/Install-LabContainerFramework.ps1'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/quicktest-lifecycle-validation.yml'
      - 'Lab/Install-Lab.ps1'
      - 'Lab/Uninstall-Lab.ps1'
      - 'Lab/QuickTest/**'
      - 'Lab/Validation/Invoke-LabQuickTestLifecycleTests.ps1'
      - 'Lab/Orchestration/Modules/DiagnosticLab/Public/Install-LabContainerFramework.ps1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quicktest-lifecycle-validation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  synthetic-lifecycle:
    name: Validate synthetic quick-test lifecycle
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Run focused lifecycle contract
        shell: pwsh
        run: |
          pwsh -NoLogo -NoProfile `
            -File ./Lab/Validation/Invoke-LabQuickTestLifecycleTests.ps1
