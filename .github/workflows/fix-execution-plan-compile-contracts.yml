name: Fix execution plan compile and public contracts

on:
  push:
    branches:
      - agent/implement-execution-plan-analysis
    paths:
      - '.bootstrap/fix_execution_plan_compile_and_contracts.py'
      - '.github/workflows/fix-execution-plan-compile-contracts.yml'
  pull_request:
    branches:
      - main
    paths:
      - '.bootstrap/fix_execution_plan_compile_and_contracts.py'
      - '.github/workflows/fix-execution-plan-compile-contracts.yml'

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/implement-execution-plan-analysis
          fetch-depth: 0
          show-progress: false

      - name: Correct generated Showplan inventory column order
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('.bootstrap/fix_execution_plan_compile_and_contracts.py')
          text = path.read_text(encoding='utf-8')
          old = """    'USP_ShowplanAnalysis', 'findings', '1', '1', '2',
              '#ShowplanAnalysis_Findings', '1', showplan_schema,"""
          new = """    'USP_ShowplanAnalysis', 'findings', '1', '1', '1',
              '#ShowplanAnalysis_Findings', '2', showplan_schema,"""
          if old not in text:
              raise RuntimeError('Showplan result-set row template was not found.')
          path.write_text(text.replace(old, new, 1), encoding='utf-8', newline='\n')
          PY

      - name: Apply SQL and contract fixes
        shell: bash
        run: python3 ./.bootstrap/fix_execution_plan_compile_and_contracts.py

      - name: Validate nonblocking metadata
        shell: bash
        run: python3 ./Code/Tests/Static/950_Validate_Nonblocking_Metadata.py

      - name: Validate procedure documentation
        shell: pwsh
        run: pwsh -NoLogo -NoProfile -File ./Code/Tests/Static/900_Validate_Analysis_Documentation.ps1

      - name: Commit SQL and contract fixes
        shell: bash
        run: |
          set -euo pipefail
          git checkout -- .bootstrap/fix_execution_plan_compile_and_contracts.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m 'Fix execution plan XML projections and contracts'
            git push origin HEAD:agent/implement-execution-plan-analysis
          fi
