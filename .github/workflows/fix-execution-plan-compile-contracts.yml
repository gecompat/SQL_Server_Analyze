name: Fix execution plan compile and public contracts

on:
  push:
    branches:
      - agent/implement-execution-plan-analysis
    paths:
      - '.bootstrap/fix_execution_plan_compile_and_contracts.py'
      - '.github/workflows/fix-execution-plan-compile-contracts.yml'
  pull_request:
    branches:
      - main
    paths:
      - '.bootstrap/fix_execution_plan_compile_and_contracts.py'
      - '.github/workflows/fix-execution-plan-compile-contracts.yml'

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/implement-execution-plan-analysis
          fetch-depth: 0
          show-progress: false

      - name: Apply SQL and contract fixes
        shell: bash
        run: python3 ./.bootstrap/fix_execution_plan_compile_and_contracts.py

      - name: Validate nonblocking metadata
        shell: bash
        run: python3 ./Code/Tests/Static/950_Validate_Nonblocking_Metadata.py

      - name: Validate procedure documentation
        id: documentation
        continue-on-error: true
        shell: pwsh
        run: pwsh -NoLogo -NoProfile -File ./Code/Tests/Static/900_Validate_Analysis_Documentation.ps1 > /tmp/documentation.log 2>&1

      - name: Report documentation contract failure
        if: steps.documentation.outcome == 'failure'
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const text = fs.existsSync('/tmp/documentation.log') ? fs.readFileSync('/tmp/documentation.log', 'utf8') : 'No diagnostic file was created.';
            const tail = text.split(/\r?\n/).slice(-80).join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: 27,
              body: `Execution-plan contract synchronization still has documentation errors:\n\n\`\`\`text\n${tail}\n\`\`\``
            });
            core.setFailed('Documentation contract still has errors.');

      - name: Commit SQL and contract fixes
        if: steps.documentation.outcome == 'success'
        shell: bash
        run: |
          set -euo pipefail
          git checkout -- .bootstrap/fix_execution_plan_compile_and_contracts.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m 'Fix execution plan XML projections and contracts'
            git push origin HEAD:agent/implement-execution-plan-analysis
          fi
