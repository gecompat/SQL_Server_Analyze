name: Documentation validation

on:
  pull_request:
    paths:
      - '.github/workflows/documentation-validation.yml'
      - 'README.md'
      - 'Code/**/*.sql'
      - 'Code/Install/*.ps1'
      - 'Code/Tests/Static/900_Validate_Analysis_Documentation.ps1'
      - 'Code/Tests/Static/905_Validate_Analysis_Navigator.py'
      - 'Code/Tests/Static/915_Validate_Documentation_Style.py'
      - 'Code/Tests/Static/920_Validate_SQL_Server_2025_Regex.py'
      - 'Code/Tests/Static/940_Validate_Wait_Type_Catalog.py'
      - 'Code/Tests/Static/950_Validate_Nonblocking_Metadata.py'
      - 'Code/Tests/Static/960_Validate_Complete_P1_Evidence.py'
      - 'Code/Tests/Static/970_Validate_Complete_P2_Evidence.py'
      - 'Code/Tests/Static/980_Validate_External_Documentation_Links.py'
      - 'Code/Tests/Static/990_Validate_Release_Evidence.py'
      - 'Code/Tests/Static/995_Validate_Wave1_Contracts.py'
      - 'Code/Tests/Static/996_Validate_Wave2_Contracts.py'
      - 'Code/Tests/Static/997_Validate_ExecutionPlanAnalysis_Public_Contract.py'
      - 'Code/Tests/Static/998_Validate_SnapshotBaseline_Public_Contract.py'
      - 'Code/Tests/Static/999_Validate_Runtime001_Contracts.py'
      - 'Code/Tests/Integration/192_ExecutionPlanAnalysis_Installer_Contract.ps1'
      - 'Code/Tests/Integration/191_Standalone_Installer_Contract.ps1'
      - 'Code/Tests/Integration/194_SnapshotBaseline_Installer_Contract.ps1'
      - 'Documentation/**/*.md'
      - 'AI_Metadata/Internal_Documentation/**/*.md'
      - 'Metadata/Inventory/*.csv'
      - 'Metadata/Quality/Wait_Type_Curation_Evidence.json'
      - 'Metadata/Quality/Analysis_Documentation_Review.csv'
      - 'Metadata/Quality/Special_Case_Test_Cases.csv'
      - 'Metadata/Quality/Release_Gate_Evidence.csv'
      - 'Metadata/Quality/Test_Matrix.csv'
      - 'Metadata/Quality/Special_Case_Gap_Backlog.csv'
      - 'Metadata/Quality/Special_Case_Release_Audit.json'
      - 'Metadata/Quality/ExecutionPlanAnalysis_Public_Contract.json'
      - 'Metadata/Quality/SnapshotBaseline_Public_Contract.json'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/documentation-validation.yml'
      - 'README.md'
      - 'Code/**/*.sql'
      - 'Code/Install/*.ps1'
      - 'Code/Tests/Static/900_Validate_Analysis_Documentation.ps1'
      - 'Code/Tests/Static/905_Validate_Analysis_Navigator.py'
      - 'Code/Tests/Static/915_Validate_Documentation_Style.py'
      - 'Code/Tests/Static/920_Validate_SQL_Server_2025_Regex.py'
      - 'Code/Tests/Static/940_Validate_Wait_Type_Catalog.py'
      - 'Code/Tests/Static/950_Validate_Nonblocking_Metadata.py'
      - 'Code/Tests/Static/960_Validate_Complete_P1_Evidence.py'
      - 'Code/Tests/Static/970_Validate_Complete_P2_Evidence.py'
      - 'Code/Tests/Static/980_Validate_External_Documentation_Links.py'
      - 'Code/Tests/Static/990_Validate_Release_Evidence.py'
      - 'Code/Tests/Static/995_Validate_Wave1_Contracts.py'
      - 'Code/Tests/Static/996_Validate_Wave2_Contracts.py'
      - 'Code/Tests/Static/997_Validate_ExecutionPlanAnalysis_Public_Contract.py'
      - 'Code/Tests/Static/998_Validate_SnapshotBaseline_Public_Contract.py'
      - 'Code/Tests/Static/999_Validate_Runtime001_Contracts.py'
      - 'Code/Tests/Integration/192_ExecutionPlanAnalysis_Installer_Contract.ps1'
      - 'Code/Tests/Integration/191_Standalone_Installer_Contract.ps1'
      - 'Code/Tests/Integration/194_SnapshotBaseline_Installer_Contract.ps1'
      - 'Documentation/**/*.md'
      - 'AI_Metadata/Internal_Documentation/**/*.md'
      - 'Metadata/Inventory/*.csv'
      - 'Metadata/Quality/Wait_Type_Curation_Evidence.json'
      - 'Metadata/Quality/Analysis_Documentation_Review.csv'
      - 'Metadata/Quality/Special_Case_Test_Cases.csv'
      - 'Metadata/Quality/Release_Gate_Evidence.csv'
      - 'Metadata/Quality/Test_Matrix.csv'
      - 'Metadata/Quality/Special_Case_Gap_Backlog.csv'
      - 'Metadata/Quality/Special_Case_Release_Audit.json'
      - 'Metadata/Quality/ExecutionPlanAnalysis_Public_Contract.json'
      - 'Metadata/Quality/SnapshotBaseline_Public_Contract.json'
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

concurrency:
  group: documentation-validation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate analysis documentation
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate SQL Server 2025 regex predicates
        shell: bash
        run: |
          set -euo pipefail
          python3 ./Code/Tests/Static/920_Validate_SQL_Server_2025_Regex.py \
            --repository-root . \
            --self-test
          python3 ./Code/Tests/Static/920_Validate_SQL_Server_2025_Regex.py \
            --repository-root .

      - name: Validate documentation style regressions
        shell: bash
        run: |
          set -euo pipefail
          python3 ./Code/Tests/Static/915_Validate_Documentation_Style.py \
            --repository-root . \
            --self-test
          python3 ./Code/Tests/Static/915_Validate_Documentation_Style.py \
            --repository-root .

      - name: Validate Analysis Navigator contract
        shell: bash
        run: |
          set -euo pipefail
          python3 ./Code/Tests/Static/905_Validate_Analysis_Navigator.py \
            --repository-root . \
            --self-test
          python3 ./Code/Tests/Static/905_Validate_Analysis_Navigator.py \
            --repository-root .

      - name: Validate Wait Type catalog curation
        shell: bash
        run: |
          set -euo pipefail
          python3 ./Code/Tests/Static/940_Validate_Wait_Type_Catalog.py \
            --repository-root . \
            --self-test
          python3 ./Code/Tests/Static/940_Validate_Wait_Type_Catalog.py \
            --repository-root .

      - name: Validate complete P1 evidence
        shell: bash
        run: |
          set -euo pipefail
          python3 ./Code/Tests/Static/960_Validate_Complete_P1_Evidence.py \
            --repository-root .

      - name: Validate complete P2 evidence
        shell: bash
        run: |
          set -euo pipefail
          python3 ./Code/Tests/Static/970_Validate_Complete_P2_Evidence.py \
            --repository-root .

      - name: Validate nonblocking metadata and temp names
        shell: bash
        run: python3 ./Code/Tests/Static/950_Validate_Nonblocking_Metadata.py

      - name: Validate canonical release evidence
        shell: bash
        run: python3 ./Code/Tests/Static/990_Validate_Release_Evidence.py --repository-root .

      - name: Validate Wave 1 contracts
        shell: bash
        run: |
          set -euo pipefail
          python3 ./Code/Tests/Static/995_Validate_Wave1_Contracts.py \
            --repository-root . \
            --self-test
          python3 ./Code/Tests/Static/995_Validate_Wave1_Contracts.py \
            --repository-root .

      - name: Validate Wave 2 contracts
        shell: bash
        run: |
          set -euo pipefail
          python3 ./Code/Tests/Static/996_Validate_Wave2_Contracts.py \
            --repository-root . \
            --self-test
          python3 ./Code/Tests/Static/996_Validate_Wave2_Contracts.py \
            --repository-root .

      - name: Validate frozen Execution Plan Analysis public contract
        shell: bash
        run: |
          set -euo pipefail
          python3 ./Code/Tests/Static/997_Validate_ExecutionPlanAnalysis_Public_Contract.py \
            --repository-root . \
            --self-test
          python3 ./Code/Tests/Static/997_Validate_ExecutionPlanAnalysis_Public_Contract.py \
            --repository-root .

      - name: Validate Execution Plan Analysis installer contract
        shell: pwsh
        run: pwsh -NoLogo -NoProfile -File ./Code/Tests/Integration/192_ExecutionPlanAnalysis_Installer_Contract.ps1

      - name: Validate full standalone installer contract
        shell: pwsh
        run: pwsh -NoLogo -NoProfile -File ./Code/Tests/Integration/191_Standalone_Installer_Contract.ps1

      - name: Validate Snapshot Baseline public contract
        shell: bash
        run: |
          set -euo pipefail
          python3 ./Code/Tests/Static/998_Validate_SnapshotBaseline_Public_Contract.py \
            --repository-root . \
            --self-test
          python3 ./Code/Tests/Static/998_Validate_SnapshotBaseline_Public_Contract.py \
            --repository-root .

      - name: Validate Snapshot Baseline installer contract
        shell: pwsh
        run: pwsh -NoLogo -NoProfile -File ./Code/Tests/Integration/194_SnapshotBaseline_Installer_Contract.ps1

      - name: Validate RUNTIME-001 contracts
        shell: bash
        run: |
          set -euo pipefail
          python3 ./Code/Tests/Static/999_Validate_Runtime001_Contracts.py \
            --repository-root . \
            --self-test
          python3 ./Code/Tests/Static/999_Validate_Runtime001_Contracts.py \
            --repository-root .

      - name: Validate procedure documentation
        shell: pwsh
        run: |
          $logPath = Join-Path $env:RUNNER_TEMP 'analysis-documentation-validation.log'
          & pwsh -NoLogo -NoProfile -File ./Code/Tests/Static/900_Validate_Analysis_Documentation.ps1 *>&1 |
              Tee-Object -FilePath $logPath
          exit $LASTEXITCODE

      - name: Validate external documentation links
        shell: bash
        run: |
          set -euo pipefail
          python3 ./Code/Tests/Static/980_Validate_External_Documentation_Links.py \
            --repository-root . \
            --self-test \
            --check-network

      - name: Upload failed validation log
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: analysis-documentation-validation-log
          path: ${{ runner.temp }}/analysis-documentation-validation.log
          if-no-files-found: ignore
          retention-days: 1

      - name: Publish documentation validation status
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          state='success'; if [ "$JOB_STATUS" != 'success' ]; then state='failure'; fi
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state="$state" \
            -f target_url="$RUN_URL" \
            -f description='Analysis documentation and evidence validation' \
            -f context='documentation-validation' >/dev/null
