name: Documentation validation

on:
  pull_request:
    paths:
      - '.github/workflows/documentation-validation.yml'
      - 'Code/**/*.sql'
      - 'Code/Tests/Static/900_Validate_Analysis_Documentation.ps1'
      - 'Documentation/**/*.md'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/documentation-validation.yml'
      - 'Code/**/*.sql'
      - 'Code/Tests/Static/900_Validate_Analysis_Documentation.ps1'
      - 'Documentation/**/*.md'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: documentation-validation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate analysis documentation
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate procedure documentation
        shell: pwsh
        run: ./Code/Tests/Static/900_Validate_Analysis_Documentation.ps1
