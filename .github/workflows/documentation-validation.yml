name: Documentation validation

on:
  pull_request:
    paths:
      - '.github/workflows/documentation-validation.yml'
      - 'Code/**/*.sql'
      - 'Code/Tests/Static/900_Validate_Analysis_Documentation.ps1'
      - 'Code/Tests/Static/920_Validate_SQL_Server_2025_Regex.py'
      - 'Code/Tests/Static/940_Validate_Wait_Type_Catalog.py'
      - 'Documentation/**/*.md'
      - 'Metadata/Quality/Wait_Type_Curation_Evidence.json'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/documentation-validation.yml'
      - 'Code/**/*.sql'
      - 'Code/Tests/Static/900_Validate_Analysis_Documentation.ps1'
      - 'Code/Tests/Static/920_Validate_SQL_Server_2025_Regex.py'
      - 'Code/Tests/Static/940_Validate_Wait_Type_Catalog.py'
      - 'Documentation/**/*.md'
      - 'Metadata/Quality/Wait_Type_Curation_Evidence.json'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: documentation-validation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate analysis documentation
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate SQL Server 2025 regex predicates
        shell: bash
        run: |
          set -euo pipefail
          python3 ./Code/Tests/Static/920_Validate_SQL_Server_2025_Regex.py \
            --repository-root . \
            --self-test
          python3 ./Code/Tests/Static/920_Validate_SQL_Server_2025_Regex.py \
            --repository-root .

      - name: Validate Wait Type catalog curation
        shell: bash
        run: |
          set -euo pipefail
          python3 ./Code/Tests/Static/940_Validate_Wait_Type_Catalog.py \
            --repository-root . \
            --self-test
          python3 ./Code/Tests/Static/940_Validate_Wait_Type_Catalog.py \
            --repository-root .

      - name: Validate procedure documentation
        shell: pwsh
        run: |
          $logPath = Join-Path $env:RUNNER_TEMP 'analysis-documentation-validation.log'
          & pwsh -NoLogo -NoProfile -File ./Code/Tests/Static/900_Validate_Analysis_Documentation.ps1 *>&1 |
              Tee-Object -FilePath $logPath
          exit $LASTEXITCODE

      - name: Upload failed validation log
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: analysis-documentation-validation-log
          path: ${{ runner.temp }}/analysis-documentation-validation.log
          if-no-files-found: error
          retention-days: 1
