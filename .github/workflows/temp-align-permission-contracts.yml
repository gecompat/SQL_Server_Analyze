name: Temporary align permission matrix contracts

on:
  pull_request:

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out permission matrix branch
        uses: actions/checkout@v6
        with:
          ref: agent/sqlserver-2022-permission-matrix

      - name: Align assertions with SQL Server 2022 hierarchy
        shell: python
        run: |
          from pathlib import Path

          matrix = Path('Code/Tests/Permissions/110_SQL_Server_2022_Permission_Matrix.sql')
          text = matrix.read_text(encoding='utf-8')
          start = text.index("IF EXISTS\n(\n    SELECT 1 FROM [#PermissionMatrix]\n    WHERE [ScenarioCode]='RESTRICTED'")
          end = text.index("IF EXISTS\n(\n    SELECT 1 FROM [#PermissionMatrix]\n    WHERE [ScenarioCode]='GROUP_MEMBER'", start)
          replacement = """IF EXISTS
          (
              SELECT 1 FROM [#PermissionMatrix]
              WHERE [ScenarioCode]='RESTRICTED'
                AND NOT
                (
                    [HasViewServerState]=0 AND [HasViewServerPerformanceState]=0
                    AND [HasViewDatabaseState]=0 AND [HasViewDatabasePerformanceState]=0
                    AND [CurrentSessionsStatus] IN('DENIED_PERMISSION','AVAILABLE_LIMITED')
                    AND [CurrentSessionsIsPartial]=1
                    AND [CurrentSessionsCapabilityPermission]='VIEW SERVER PERFORMANCE STATE'
                    AND [CurrentSessionsCapabilityHasPermission]=0
                    AND [CurrentSessionsCapabilityStatus]='AVAILABLE_LIMITED'
                    AND [QueryStorePerformanceRequiredRows]>0
                    AND [QueryStorePerformanceGrantedRows]=0
                    AND [PlanCacheDeepAllowed]=0 AND [PlanCacheDeepAccessReason]='NO_MATCH'
                )
          )
              THROW 54212,N'Das vollständig eingeschränkte Szenario verletzt den erwarteten kontrollierten Denied-/Limited-Vertrag.',1;

          IF EXISTS
          (
              SELECT 1 FROM [#PermissionMatrix]
              WHERE [ScenarioCode]='VIEW_SERVER_STATE'
                AND NOT
                (
                    [HasViewServerState]=1 AND [HasViewServerPerformanceState]=1
                    AND [HasViewDatabaseState]=1 AND [HasViewDatabasePerformanceState]=1
                    AND (([CurrentSessionsStatus]='AVAILABLE' AND [CurrentSessionsIsPartial]=0)
                      OR ([CurrentSessionsStatus]='AVAILABLE_LIMITED' AND [CurrentSessionsIsPartial]=1))
                    AND [CurrentSessionsCapabilityPermission]='VIEW SERVER PERFORMANCE STATE'
                    AND [CurrentSessionsCapabilityHasPermission]=1
                    AND [CurrentSessionsCapabilityStatus]='AVAILABLE'
                    AND [QueryStorePerformanceRequiredRows]>0
                    AND [QueryStorePerformanceGrantedRows]=[QueryStorePerformanceRequiredRows]
                    AND [PlanCacheDeepAllowed]=0 AND [PlanCacheDeepAccessReason]='NO_MATCH'
                )
          )
              THROW 54213,N'Die SQL-Server-2022-Implikation von VIEW SERVER STATE wurde nicht korrekt erkannt.',1;

          IF EXISTS
          (
              SELECT 1 FROM [#PermissionMatrix]
              WHERE [ScenarioCode]='VIEW_SERVER_PERFORMANCE_STATE'
                AND NOT
                (
                    [HasViewServerState]=0 AND [HasViewServerPerformanceState]=1
                    AND [HasViewDatabaseState]=0 AND [HasViewDatabasePerformanceState]=1
                    AND (([CurrentSessionsStatus]='AVAILABLE' AND [CurrentSessionsIsPartial]=0)
                      OR ([CurrentSessionsStatus]='AVAILABLE_LIMITED' AND [CurrentSessionsIsPartial]=1))
                    AND [CurrentSessionsCapabilityPermission]='VIEW SERVER PERFORMANCE STATE'
                    AND [CurrentSessionsCapabilityHasPermission]=1
                    AND [CurrentSessionsCapabilityStatus]='AVAILABLE'
                    AND [QueryStorePerformanceRequiredRows]>0
                    AND [QueryStorePerformanceGrantedRows]=[QueryStorePerformanceRequiredRows]
                    AND [PlanCacheDeepAllowed]=0 AND [PlanCacheDeepAccessReason]='NO_MATCH'
                )
          )
              THROW 54214,N'Das eigenständige Recht VIEW SERVER PERFORMANCE STATE wurde nicht korrekt abgegrenzt.',1;

          IF EXISTS
          (
              SELECT 1 FROM [#PermissionMatrix]
              WHERE [ScenarioCode]='VIEW_DATABASE_STATE'
                AND NOT
                (
                    [HasViewServerState]=0 AND [HasViewServerPerformanceState]=0
                    AND [HasViewDatabaseState]=1 AND [HasViewDatabasePerformanceState]=1
                    AND [CurrentSessionsStatus] IN('DENIED_PERMISSION','AVAILABLE_LIMITED')
                    AND [CurrentSessionsIsPartial]=1
                    AND [QueryStorePerformanceRequiredRows]>0
                    AND [QueryStorePerformanceGrantedRows]=[QueryStorePerformanceRequiredRows]
                    AND [PlanCacheDeepAllowed]=0 AND [PlanCacheDeepAccessReason]='NO_MATCH'
                )
          )
              THROW 54215,N'Die SQL-Server-2022-Implikation von VIEW DATABASE STATE wurde nicht korrekt erkannt.',1;

          IF EXISTS
          (
              SELECT 1 FROM [#PermissionMatrix]
              WHERE [ScenarioCode]='VIEW_DATABASE_PERFORMANCE_STATE'
                AND NOT
                (
                    [HasViewServerState]=0 AND [HasViewServerPerformanceState]=0
                    AND [HasViewDatabaseState]=0 AND [HasViewDatabasePerformanceState]=1
                    AND [CurrentSessionsStatus] IN('DENIED_PERMISSION','AVAILABLE_LIMITED')
                    AND [CurrentSessionsIsPartial]=1
                    AND [QueryStorePerformanceRequiredRows]>0
                    AND [QueryStorePerformanceGrantedRows]=[QueryStorePerformanceRequiredRows]
                    AND [PlanCacheDeepAllowed]=0 AND [PlanCacheDeepAccessReason]='NO_MATCH'
                )
          )
              THROW 54216,N'Das eigenständige Recht VIEW DATABASE PERFORMANCE STATE wurde nicht korrekt abgegrenzt.',1;

          """.replace('          ', '')
          text = text[:start] + replacement + text[end:]

          old_group = """IF EXISTS
          (
              SELECT 1 FROM [#PermissionMatrix]
              WHERE [ScenarioCode]='GROUP_MEMBER'
                AND NOT([PlanCacheDeepAllowed]=1 AND [PlanCacheDeepAccessReason]='IS_MEMBER')
          )
              THROW 54217,N'Die IS_MEMBER-Fallbackprüfung für die synthetische Datenbankrolle ist fehlgeschlagen.',1;""".replace('          ', '')
          new_group = """IF EXISTS
          (
              SELECT 1 FROM [#PermissionMatrix]
              WHERE [ScenarioCode]='GROUP_MEMBER'
                AND NOT
                (
                    [HasViewServerState]=0 AND [HasViewServerPerformanceState]=0
                    AND [HasViewDatabaseState]=0 AND [HasViewDatabasePerformanceState]=0
                    AND [CurrentSessionsStatus] IN('DENIED_PERMISSION','AVAILABLE_LIMITED')
                    AND [CurrentSessionsIsPartial]=1
                    AND [CurrentSessionsCapabilityHasPermission]=0
                    AND [CurrentSessionsCapabilityStatus]='AVAILABLE_LIMITED'
                    AND [QueryStorePerformanceGrantedRows]=0
                    AND [PlanCacheDeepAllowed]=1 AND [PlanCacheDeepAccessReason]='IS_MEMBER'
                )
          )
              THROW 54217,N'Die IS_MEMBER-Fallbackprüfung für die synthetische Datenbankrolle ist fehlgeschlagen.',1;""".replace('          ', '')
          if text.count(old_group) != 1:
              raise RuntimeError(f'Expected group assertion once, found {text.count(old_group)}.')
          text = text.replace(old_group, new_group, 1)

          old_sysadmin = """IF EXISTS
          (
              SELECT 1 FROM [#PermissionMatrix]
              WHERE [ScenarioCode]='SYSADMIN'
                AND NOT([PlanCacheDeepAllowed]=1 AND [PlanCacheDeepAccessReason]='SYSADMIN')
          )
              THROW 54218,N'Der sysadmin-Bypass der Gruppenpolicy ist fehlgeschlagen.',1;""".replace('          ', '')
          new_sysadmin = """IF EXISTS
          (
              SELECT 1 FROM [#PermissionMatrix]
              WHERE [ScenarioCode]='SYSADMIN'
                AND NOT
                (
                    [HasViewServerState]=1 AND [HasViewServerPerformanceState]=1
                    AND [HasViewDatabaseState]=1 AND [HasViewDatabasePerformanceState]=1
                    AND [CurrentSessionsStatus]='AVAILABLE' AND [CurrentSessionsIsPartial]=0
                    AND [CurrentSessionsCapabilityHasPermission]=1
                    AND [CurrentSessionsCapabilityStatus]='AVAILABLE'
                    AND [QueryStorePerformanceRequiredRows]>0
                    AND [QueryStorePerformanceGrantedRows]=[QueryStorePerformanceRequiredRows]
                    AND [PlanCacheDeepAllowed]=1 AND [PlanCacheDeepAccessReason]='SYSADMIN'
                )
          )
              THROW 54218,N'Der sysadmin-Bypass der Gruppenpolicy ist fehlgeschlagen.',1;""".replace('          ', '')
          if text.count(old_sysadmin) != 1:
              raise RuntimeError(f'Expected sysadmin assertion once, found {text.count(old_sysadmin)}.')
          text = text.replace(old_sysadmin, new_sysadmin, 1)
          matrix.write_text(text, encoding='utf-8', newline='\n')

          runbook = Path('Documentation/Quality/Release_Gate_Runbook.md')
          doc = runbook.read_text(encoding='utf-8')
          old = """- eingeschränkte Current-Sessions-Sicht liefert `AVAILABLE_LIMITED` und gültiges JSON statt eines unkontrollierten Abbruchs;
          - `VIEW SERVER STATE` erfüllt auf SQL Server 2022 nicht den Vertrag von `VIEW SERVER PERFORMANCE STATE`;
          - `VIEW SERVER PERFORMANCE STATE` liefert für `CURRENT_SESSIONS` den Vollsichtvertrag;
          - `VIEW DATABASE STATE` wird gegenüber `VIEW DATABASE PERFORMANCE STATE` getrennt bewertet;
          - nicht berechtigte geschützte Klassen liefern `NO_MATCH`, Rollenmitglieder `IS_MEMBER` und sysadmin `SYSADMIN`;
          - sieben Szenarien werden vollständig ausgeführt und der Test endet mit `StatusCode=AVAILABLE`.""".replace('          ', '')
          new = """- eingeschränkte Current-Sessions-Sicht liefert kontrolliert `DENIED_PERMISSION` oder `AVAILABLE_LIMITED` und gültiges JSON statt eines unkontrollierten Abbruchs;
          - `VIEW SERVER STATE` umfasst auf SQL Server 2022 die neue Berechtigung `VIEW SERVER PERFORMANCE STATE`; umgekehrt entsteht kein `VIEW SERVER STATE`;
          - `CURRENT_SESSIONS` ist capability-seitig mit `VIEW SERVER PERFORMANCE STATE` verfügbar, kann wegen weiterer geschützter Teilquellen aber weiterhin kontrolliert `AVAILABLE_LIMITED` liefern;
          - `VIEW DATABASE STATE` umfasst `VIEW DATABASE PERFORMANCE STATE`; umgekehrt entsteht kein `VIEW DATABASE STATE`;
          - beide Database-State-Szenarien erfüllen die geprüften Query-Store-Performance-Capabilities;
          - nicht berechtigte geschützte Klassen liefern `NO_MATCH`, Rollenmitglieder `IS_MEMBER` und sysadmin `SYSADMIN`;
          - sieben Szenarien werden vollständig ausgeführt und der Test endet mit `StatusCode=AVAILABLE`.""".replace('          ', '')
          if doc.count(old) != 1:
              raise RuntimeError(f'Expected runbook expectation block once, found {doc.count(old)}.')
          runbook.write_text(doc.replace(old, new, 1), encoding='utf-8', newline='\n')

      - name: Commit aligned permission contracts
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Code/Tests/Permissions/110_SQL_Server_2022_Permission_Matrix.sql Documentation/Quality/Release_Gate_Runbook.md
          git diff --cached --quiet && exit 0
          git commit -m 'test: align SQL Server 2022 permission contracts'
          git push origin HEAD:agent/sqlserver-2022-permission-matrix
