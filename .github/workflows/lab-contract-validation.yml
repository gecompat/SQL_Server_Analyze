name: LAB-001 contract validation

on:
  pull_request:
    paths:
      - '.github/workflows/lab-contract-validation.yml'
      - 'Lab/**'
      - 'Documentation/Architecture/Docker_Podman_Quick_Test_System_Requirements.md'
      - 'Code/Tests/Static/988_Validate_LAB001_Wave0_Contracts.py'
      - 'Code/Tests/Static/989_Validate_LAB001_Wave1_Orchestrator.py'
      - 'Code/Tests/Static/990_Validate_LAB001_Wave2_ContainerBaseline.py'
      - 'Code/Tests/Static/Validate_LAB001_Wave3_CorePerformance.py'
      - 'Code/Tests/Static/Validate_LAB001_Wave4_ContractFoundation.py'
      - 'Code/Tests/Static/Validate_LAB001_Wave5_ImagePipelineFoundation.py'
      - 'Code/Tests/Static/Validate_Docker_Podman_QuickTest_ComposeFoundation.py'
      - 'Code/Tests/Static/Validate_Docker_Podman_QuickTest_Preflight.py'
      - 'Metadata/Inventory/Objects.csv'
      - 'Metadata/Quality/Docker_Podman_Quick_Test_Status.json'
      - 'Metadata/Quality/Implementation_Status.csv'
      - 'Metadata/Quality/Lab_External_Evidence_Gates.csv'
      - 'Metadata/Quality/Lab_Scenario_Coverage.csv'
      - 'Metadata/Quality/Lab_Wave_Status.csv'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/lab-contract-validation.yml'
      - 'Lab/**'
      - 'Documentation/Architecture/Docker_Podman_Quick_Test_System_Requirements.md'
      - 'Code/Tests/Static/988_Validate_LAB001_Wave0_Contracts.py'
      - 'Code/Tests/Static/989_Validate_LAB001_Wave1_Orchestrator.py'
      - 'Code/Tests/Static/990_Validate_LAB001_Wave2_ContainerBaseline.py'
      - 'Code/Tests/Static/Validate_LAB001_Wave3_CorePerformance.py'
      - 'Code/Tests/Static/Validate_LAB001_Wave4_ContractFoundation.py'
      - 'Code/Tests/Static/Validate_LAB001_Wave5_ImagePipelineFoundation.py'
      - 'Code/Tests/Static/Validate_Docker_Podman_QuickTest_ComposeFoundation.py'
      - 'Code/Tests/Static/Validate_Docker_Podman_QuickTest_Preflight.py'
      - 'Metadata/Inventory/Objects.csv'
      - 'Metadata/Quality/Docker_Podman_Quick_Test_Status.json'
      - 'Metadata/Quality/Implementation_Status.csv'
      - 'Metadata/Quality/Lab_External_Evidence_Gates.csv'
      - 'Metadata/Quality/Lab_Scenario_Coverage.csv'
      - 'Metadata/Quality/Lab_Wave_Status.csv'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lab-contract-validation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate LAB-001 Wellen 0 to 5 and quick-test Preflight
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate Welle 0 contracts
        shell: bash
        run: |
          set -euo pipefail
          python3 ./Code/Tests/Static/988_Validate_LAB001_Wave0_Contracts.py \
            --repository-root .

      - name: Validate Welle 1 orchestration contract
        shell: bash
        run: |
          set -euo pipefail
          python3 ./Code/Tests/Static/989_Validate_LAB001_Wave1_Orchestrator.py \
            --repository-root .

      - name: Validate Welle 2 container contract
        shell: bash
        run: |
          set -euo pipefail
          python3 ./Code/Tests/Static/990_Validate_LAB001_Wave2_ContainerBaseline.py \
            --repository-root .

      - name: Validate Welle 3 core-performance contract
        shell: bash
        run: |
          set -euo pipefail
          python3 ./Code/Tests/Static/Validate_LAB001_Wave3_CorePerformance.py \
            --repository-root .

      - name: Validate LAB-001 Wellen 0 to 4 contract foundation
        shell: bash
        run: |
          set -euo pipefail
          python3 ./Code/Tests/Static/Validate_LAB001_Wave4_ContractFoundation.py \
            --repository-root .

      - name: Validate Welle 5 image-pipeline foundation
        shell: bash
        run: |
          set -euo pipefail
          python3 ./Code/Tests/Static/Validate_LAB001_Wave5_ImagePipelineFoundation.py \
            --repository-root .

      - name: Validate Docker Podman quick-test Compose foundation
        shell: bash
        run: |
          set -euo pipefail
          python3 ./Code/Tests/Static/Validate_Docker_Podman_QuickTest_ComposeFoundation.py \
            --repository-root .

      - name: Validate Docker Podman quick-test Preflight
        shell: bash
        run: |
          set -euo pipefail
          python3 ./Code/Tests/Static/Validate_Docker_Podman_QuickTest_Preflight.py \
            --repository-root .

      - name: Validate example manifests against JSON schemas
        shell: pwsh
        run: |
          pwsh -NoLogo -NoProfile -File ./Lab/Validation/Invoke-LabValidation.ps1

      - name: Run Welle 1 orchestration and negative tests
        shell: pwsh
        run: |
          pwsh -NoLogo -NoProfile -File ./Lab/Validation/Invoke-LabWave1Tests.ps1

      - name: Run Welle 2 contract tests
        shell: pwsh
        run: |
          pwsh -NoLogo -NoProfile -File ./Lab/Validation/Invoke-LabWave2Tests.ps1

      - name: Run Welle 3 contract tests
        shell: pwsh
        run: |
          pwsh -NoLogo -NoProfile -File ./Lab/Validation/Invoke-LabWave3Tests.ps1

      - name: Run Docker Podman quick-test Preflight tests
        shell: pwsh
        run: |
          pwsh -NoLogo -NoProfile -File ./Lab/Validation/Invoke-LabQuickTestPreflightTests.ps1

      - name: Validate Docker Compose model
        shell: bash
        run: |
          set -euo pipefail
          runtime_dir="$(mktemp -d)"
          trap 'rmdir -- "$runtime_dir"' EXIT
          LAB_COMPOSE_PROJECT=lab001-validation \
          LAB_RUN_ID=LAB-20000101T000000Z-00000000 \
          LAB_CONTAINER_HOSTNAME=lab-sql \
          LAB_RUNTIME_DIR="$runtime_dir" \
          LAB_DATA_DIR="$runtime_dir" \
          LAB_SQL_IMAGE=mcr.microsoft.com/mssql/server:2025-latest \
          LAB_SQL_SA_PASSWORD="$(openssl rand -hex 24)" \
          docker compose \
            --project-name lab001-validation \
            --file ./Lab/Containers/compose.yaml \
            --file ./Lab/Containers/compose.docker.yaml \
            config --quiet

      - name: Validate quick-test Docker and Podman Compose models
        shell: bash
        run: |
          set -euo pipefail
          runtime_dir="$(mktemp -d)"
          trap 'rm -r -- "$runtime_dir"' EXIT
          mkdir -p \
            "$runtime_dir/2019/data" "$runtime_dir/2019/log" "$runtime_dir/2019/backup" \
            "$runtime_dir/2022/data" "$runtime_dir/2022/log" "$runtime_dir/2022/backup" \
            "$runtime_dir/2025/data" "$runtime_dir/2025/log" "$runtime_dir/2025/backup" \
            "$runtime_dir/runtime"
          secret_suffix='PASS''WORD'
          export "MSSQL_SA_${secret_suffix}=$(openssl rand -hex 24)"
          export QTLAB_COMPOSE_PROJECT=qt-validation
          export QTLAB_SCOPE=qt-validation
          export QTLAB_RUN_ID=QTLAB-20000101T000000Z-00000000
          export QTLAB_RUNTIME_DIR="$runtime_dir/runtime"
          export QTLAB_SQL_MEMORY_MB=2048
          export QTLAB_MEMORY_LIMIT=3g
          export QTLAB_CPU_LIMIT=2.0
          for version in 2019 2022 2025; do
            export "QTLAB_SQL${version}_IMAGE=mcr.microsoft.com/mssql/server:${version}-latest"
            export "QTLAB_SQL${version}_CONTAINER=qt-validation-sql${version}"
            export "QTLAB_SQL${version}_PORT=$((14330 + (version == 2019 ? 1 : version == 2022 ? 2 : 5)))"
            export "QTLAB_SQL${version}_DATA_DIR=$runtime_dir/${version}/data"
            export "QTLAB_SQL${version}_LOG_DIR=$runtime_dir/${version}/log"
            export "QTLAB_SQL${version}_BACKUP_DIR=$runtime_dir/${version}/backup"
          done
          for override_file in \
            quick-test.compose.docker.yaml \
            quick-test.compose.podman.yaml; do
            docker compose \
              --project-name qt-validation \
              --file ./Lab/Containers/quick-test.compose.yaml \
              --file "./Lab/Containers/${override_file}" \
              --profile sql2019 \
              --profile sql2022 \
              --profile sql2025 \
              config --quiet
          done

      - name: Install pinned PowerShell analyzer
        shell: pwsh
        run: |
          Install-Module PSScriptAnalyzer `
            -RequiredVersion 1.25.0 `
            -Repository PSGallery `
            -Scope CurrentUser `
            -Force

      - name: Analyze existing LAB orchestration
        shell: pwsh
        run: |
          $findings = @(
            Invoke-ScriptAnalyzer `
              -Path ./Lab/Orchestration `
              -Recurse `
              -Severity Error
          )
          if ($findings.Count -gt 0) {
            $findings |
              Select-Object RuleName, Severity, ScriptName, Line |
              Format-Table -AutoSize
            throw "Existing LAB orchestration analyzer reported $($findings.Count) error finding(s)."
          }

      - name: Analyze quick-test module
        shell: pwsh
        run: |
          $findings = @(
            Invoke-ScriptAnalyzer `
              -Path ./Lab/QuickTest `
              -Recurse `
              -Severity Error
          )
          if ($findings.Count -gt 0) {
            $findings |
              Select-Object RuleName, Severity, ScriptName, Line |
              Format-Table -AutoSize
            throw "Quick-test module analyzer reported $($findings.Count) error finding(s)."
          }

      - name: Analyze quick-test entrypoint
        shell: pwsh
        run: |
          $findings = @(
            Invoke-ScriptAnalyzer `
              -Path ./Lab/Install-Lab.ps1 `
              -Severity Error
          )
          if ($findings.Count -gt 0) {
            $findings |
              Select-Object RuleName, Severity, ScriptName, Line |
              Format-Table -AutoSize
            throw "Quick-test entrypoint analyzer reported $($findings.Count) error finding(s)."
          }
