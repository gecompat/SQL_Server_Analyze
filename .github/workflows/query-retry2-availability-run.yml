name: Query retry2 availability run

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/query-retry2-availability-run.yml'

permissions:
  contents: write
  actions: read

jobs:
  query:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh run list --workflow retry2-p1-availability-contract.yml --limit 3 --json databaseId,status,conclusion,headSha > Metadata/Quality/Availability_Retry2_Run.json
      - shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/query-retry2-availability-run.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Metadata/Quality/Availability_Retry2_Run.json .github/workflows/query-retry2-availability-run.yml
          git commit -m 'chore: record availability retry2 status'
          git pull --rebase origin main
          git push origin HEAD:main
