name: Fix P2 Full-Text Windows allowlist

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/fix-p2-fulltext-windows-allowlist.yml'

permissions:
  contents: write
  statuses: write

jobs:
  fix:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Allow positive Full-Text DDL only on explicit Windows
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          path=Path('Code/Tests/Integration/183_P2_FullText_Runtime_Contract.sql')
          text=path.read_text(encoding='utf-8')
          old="     AND LOWER(COALESCE(@HostPlatform,CONVERT(nvarchar(32),SERVERPROPERTY(N'HostPlatform')),N''))<>N'linux'"
          new="     AND UPPER(LTRIM(RTRIM(COALESCE(@HostPlatform,N''))))=N'WINDOWS'"
          if text.count(old)!=1:
              raise SystemExit('unexpected Full-Text platform condition')
          path.write_text(text.replace(old,new,1),encoding='utf-8',newline='\n')
          PY
      - name: Commit fix and remove helper
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/fix-p2-fulltext-windows-allowlist.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Code/Tests/Integration/183_P2_FullText_Runtime_Contract.sql .github/workflows/fix-p2-fulltext-windows-allowlist.yml
          git diff --cached --check
          git commit -m 'test: allow P2 Full-Text fixtures only on Windows'
          git push origin HEAD:main
      - name: Publish helper status
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          state='success'; if [ "$JOB_STATUS" != 'success' ]; then state='failure'; fi
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state="$state" -f description='P2 Full-Text Windows allowlist helper' \
            -f context='p2-fulltext-windows-helper' >/dev/null
