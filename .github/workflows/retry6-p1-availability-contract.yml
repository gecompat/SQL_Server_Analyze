name: Retry P1 availability contract with all multiline anchors

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/retry6-p1-availability-contract.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Normalize all verified anchors and execute patch
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          proc=Path('Code/07_Infrastructure/110_USP_AvailabilityDeepAnalysis.sql')
          text=proc.read_text(encoding='utf-8')

          def normalize(start_marker,end_marker,expected,search_from=0):
              global text
              start=text.index(start_marker,search_from)
              end=text.index(end_marker,start)+len(end_marker)
              text=text[:start]+expected+text[end:]

          normalize(
              "                , CASE WHEN [drs].[is_suspended] = 1 THEN 'DATA_MOVEMENT_SUSPENDED'",
              "                       ELSE 'INFO' END",
              "                , CASE WHEN [drs].[is_suspended] = 1 THEN 'DATA_MOVEMENT_SUSPENDED'\n"
              "                       WHEN [drs].[synchronization_health_desc] = N'NOT_HEALTHY' THEN 'DATABASE_NOT_HEALTHY'\n"
              "                       WHEN [drs].[synchronization_state_desc] = N'NOT_SYNCHRONIZING' THEN 'DATABASE_NOT_SYNCHRONIZING'\n"
              "                       WHEN COALESCE([drs].[log_send_queue_size], 0) >= @QueueWarnMb * 1024 THEN 'LOG_SEND_QUEUE_THRESHOLD'\n"
              "                       WHEN COALESCE([drs].[redo_queue_size], 0) >= @QueueWarnMb * 1024 THEN 'REDO_QUEUE_THRESHOLD'\n"
              "                       WHEN COALESCE([drs].[secondary_lag_seconds], 0) >= @SecondaryLagWarnSeconds THEN 'SECONDARY_LAG_THRESHOLD'\n"
              "                       ELSE 'DATABASE_STATE_ACCEPTABLE' END\n"
              "                , CASE WHEN [drs].[is_suspended] = 1 OR [drs].[synchronization_health_desc] = N'NOT_HEALTHY'\n"
              "                            OR [drs].[synchronization_state_desc] = N'NOT_SYNCHRONIZING' THEN 'HIGH'\n"
              "                       WHEN COALESCE([drs].[log_send_queue_size], 0) >= @QueueWarnMb * 1024\n"
              "                         OR COALESCE([drs].[redo_queue_size], 0) >= @QueueWarnMb * 1024\n"
              "                         OR COALESCE([drs].[secondary_lag_seconds], 0) >= @SecondaryLagWarnSeconds THEN 'MEDIUM'\n"
              "                       ELSE 'INFO' END")

          normalize(
              "            JOIN [sys].[availability_replicas] AS [ar]\n",
              "              ON [ar].[group_id] = [drs].[group_id] AND [ar].[replica_id] = [drs].[replica_id];",
              "            JOIN [sys].[availability_replicas] AS [ar]\n"
              "              ON [ar].[group_id] = [drs].[group_id] AND [ar].[replica_id] = [drs].[replica_id];",
              text.index('INSERT [#Databases]'))

          normalize(
              "            INSERT [#Seeding]\n",
              "            FROM [sys].[dm_hadr_physical_seeding_stats];",
              "            INSERT [#Seeding]\n"
              "            SELECT [remote_machine_name], [role_desc], [local_database_name], [internal_state_desc]\n"
              "                 , [failure_code], [transferred_size_bytes], [database_size_bytes]\n"
              "                 , [transfer_rate_bytes_per_second], [start_time_utc], [end_time_utc]\n"
              "            FROM [sys].[dm_hadr_physical_seeding_stats];")

          normalize(
              "                   SELECT 1 FROM [#Databases] WHERE [FindingCode] <> 'DATABASE_STATE_ACCEPTABLE'",
              "                   SELECT 1 FROM [#PageRepair] WHERE [FindingCode] <> 'PAGE_REPAIR_SUCCEEDED'",
              "                   SELECT 1 FROM [#Databases] WHERE [FindingCode] <> 'DATABASE_STATE_ACCEPTABLE'\n"
              "                   UNION ALL\n"
              "                   SELECT 1 FROM [#PageRepair] WHERE [FindingCode] <> 'PAGE_REPAIR_SUCCEEDED'")

          normalize(
              "        SELECT TOP (@Limit) N'AG-Seeding' AS [Ergebnis], [RemoteMachineName] AS [Remote_Knoten],",
              "        FROM [#Seeding] ORDER BY [StartTimeUtc] DESC;",
              "        SELECT TOP (@Limit) N'AG-Seeding' AS [Ergebnis], [RemoteMachineName] AS [Remote_Knoten],\n"
              "               [DatabaseName] AS [Datenbank], [CurrentStateDesc] AS [Status],\n"
              "               [FailureCode] AS [Fehlercode], [TransferRateBytesPerSecond] AS [Bytes_pro_Sekunde],\n"
              "               [StartTimeUtc] AS [Start_UTC], [EndTimeUtc] AS [Ende_UTC]\n"
              "        FROM [#Seeding] ORDER BY [StartTimeUtc] DESC;")

          proc.write_text(text,encoding='utf-8',newline='\n')

          source=Path('.github/workflows/apply-p1-availability-contract.yml').read_text(encoding='utf-8').splitlines()
          begin=next(i for i,line in enumerate(source) if "python3 - <<'PY'" in line)+1
          finish=next(i for i in range(begin,len(source)) if source[i].strip()=='PY')
          script='\n'.join(line[10:] if line.startswith('          ') else line for line in source[begin:finish])
          exec(compile(script,'availability_apply.py','exec'),{})
          PY
      - name: Commit verified implementation and clean diagnostics
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/apply-p1-availability-contract.yml
          rm -f .github/workflows/retry-p1-availability-contract.yml
          rm -f .github/workflows/retry2-p1-availability-contract.yml
          rm -f .github/workflows/retry3-p1-availability-contract.yml
          rm -f .github/workflows/retry4-p1-availability-contract.yml
          rm -f .github/workflows/retry5-p1-availability-contract.yml
          rm -f .github/workflows/retry6-p1-availability-contract.yml
          rm -f Metadata/Quality/Availability_Apply_Diagnostic.json
          rm -f Metadata/Quality/Availability_Apply_Run.json
          rm -f Metadata/Quality/Availability_Apply_Error.json
          rm -f Metadata/Quality/Availability_Apply_Error_Tail.json
          rm -f Metadata/Quality/Availability_Retry2_Run.json
          rm -f Metadata/Quality/Availability_Retry2_Error.json
          rm -f Metadata/Quality/Availability_Retry3_Run.json
          rm -f Metadata/Quality/Availability_Retry4_Run.json
          rm -f Metadata/Quality/Availability_Retry5_Run.json
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Code Metadata/Inventory/Objects.csv .github/workflows Metadata/Quality
          git diff --cached --check
          git commit -m 'test: automate P1 availability cases'
          git pull --rebase origin main
          git push origin HEAD:main
