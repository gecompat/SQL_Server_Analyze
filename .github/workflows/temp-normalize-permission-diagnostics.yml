name: Temporary normalize permission matrix diagnostics

on:
  pull_request:

permissions:
  contents: write

jobs:
  normalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out permission matrix branch
        uses: actions/checkout@v6
        with:
          ref: agent/sqlserver-2022-permission-matrix

      - name: Normalize diagnostics structurally
        shell: python
        run: |
          from pathlib import Path
          import re

          path = Path('Code/Tests/Permissions/110_SQL_Server_2022_Permission_Matrix.sql')
          text = path.read_text(encoding='utf-8')

          for phase in ('setup', 'open_policy', 'protected_policy', 'sysadmin', 'assertions'):
              marker_line = f"RAISERROR(N'PERMISSION_MATRIX phase={phase}',10,1) WITH NOWAIT;"
              pattern = re.compile(
                  rf"(?:{re.escape(marker_line)}\nGO\n\n)+"
              )
              text, count = pattern.subn(marker_line + "\nGO\n\n", text, count=1)
              if count != 1:
                  raise RuntimeError(f'Phase marker not found for {phase}.')

          dynamic_end = "END CATCH;';\n\n"
          start_anchor = "    RAISERROR(N'PERMISSION_MATRIX scenario=%s',10,1,@ScenarioCode) WITH NOWAIT;"
          end_anchor = "    SET @ScenarioOrdinal+=1;"
          dynamic_pos = text.index(dynamic_end) + len(dynamic_end)
          wrapper_start = text.index(start_anchor, dynamic_pos)
          wrapper_end = text.index(end_anchor, wrapper_start)

          single_wrapper = """    RAISERROR(N'PERMISSION_MATRIX scenario=%s',10,1,@ScenarioCode) WITH NOWAIT;
              BEGIN TRY
                  EXEC [sys].[sp_executesql] @Sql,N'@ScenarioCode varchar(48)',@ScenarioCode=@ScenarioCode;
              END TRY
              BEGIN CATCH
                  DECLARE @ScenarioError nvarchar(2048)=CONCAT(N'Permission scenario ',@ScenarioCode,N' failed at line ',ERROR_LINE(),N': ',ERROR_MESSAGE());
                  THROW 54209,@ScenarioError,1;
              END CATCH;
          """.replace('              ', '    ')

          text = text[:wrapper_start] + single_wrapper + text[wrapper_end:]
          path.write_text(text, encoding='utf-8', newline='\n')

      - name: Commit normalized diagnostics
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Code/Tests/Permissions/110_SQL_Server_2022_Permission_Matrix.sql
          git diff --cached --quiet && exit 0
          git commit -m 'fix: normalize permission matrix diagnostics'
          git push origin HEAD:agent/sqlserver-2022-permission-matrix
