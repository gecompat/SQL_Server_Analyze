name: Finalize P1 statistics evidence

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/update-p1-statistics-evidence.yml'

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Update canonical evidence
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import json

          commit = 'f4bf1d4333e7f4a38814dea72a0799ca1d949364'
          runs = {
              '2019': '29644565510',
              '2022': '29644565475',
              '2025': '29644565446',
          }

          cases_path = Path('Metadata/Quality/Special_Case_Test_Cases.csv')
          lines = cases_path.read_text(encoding='utf-8').splitlines()
          statistic_ids = {
              'STAT-UNIFORM','STAT-DOMINANT','STAT-TAIL','STAT-MODIFIED',
              'STAT-FILTERED','STAT-INCREMENTAL','STAT-BOUNDED','STAT-DENIED'
          }
          updated = []
          seen = set()
          for line in lines:
              case_id = line.split(',', 1)[0]
              if case_id in statistic_ids:
                  parts = line.split(',')
                  if len(parts) != 10 or parts[8] != 'NOT_EXECUTED' or parts[9] != '':
                      raise SystemExit(f'Unexpected statistics evidence row shape: {case_id}')
                  parts[8] = 'PASS_WITH_LIMITATIONS'
                  parts[9] = f'https://github.com/gecompat/SQL_Server_Analyze/actions/runs/{runs["2019"]}'
                  line = ','.join(parts)
                  seen.add(case_id)
              updated.append(line)
          if seen != statistic_ids:
              raise SystemExit('Not all statistics evidence rows were found.')
          cases_path.write_text('\n'.join(updated) + '\n', encoding='utf-8')

          matrix_path = Path('Documentation/Quality/Test_Matrix.md')
          text = matrix_path.read_text(encoding='utf-8')
          replacements = {
              '**Status:** commitbezogene 19-Suite-Evidenz für P0 und die ersten zwanzig P1-Fälle bis Schema-/Designkorrektheit vorhanden':
              '**Status:** commitbezogene 20-Suite-Evidenz für P0 und die ersten achtundzwanzig P1-Fälle bis einschließlich Statistikverteilung vorhanden',
              'Commit `c405946d7806472f42cfc38430d5ada33620780c` hat Installer, den 19-Suite-Release-Gate-Vertrag einschließlich 15 P0-Laufzeitfällen und der ersten zwanzig P1-Fälle bis Schema-/Designkorrektheit sowie die Berechtigungsmatrix einschließlich zwei P0-Restricted-Login-Fällen auf den drei Linux-Targets erfolgreich abgeschlossen.':
              f'Commit `{commit}` hat Installer, den 20-Suite-Release-Gate-Vertrag einschließlich 15 P0-Laufzeitfällen und der ersten achtundzwanzig P1-Fälle bis einschließlich Statistikverteilung sowie die Berechtigungsmatrix einschließlich zwei P0-Restricted-Login-Fällen auf den drei Linux-Targets erfolgreich abgeschlossen.',
              '| SQL Server 2019 | `15.0.4480.2` | 150 | [Run 29640112460](https://github.com/gecompat/SQL_Server_Analyze/actions/runs/29640112460) | `PASS_WITH_LIMITATIONS`; alle 17 P0- und die ersten zwanzig P1-Fälle |':
              f'| SQL Server 2019 | `15.0.4480.2` | 150 | [Run {runs["2019"]}](https://github.com/gecompat/SQL_Server_Analyze/actions/runs/{runs["2019"]}) | `PASS_WITH_LIMITATIONS`; alle 17 P0- und die ersten achtundzwanzig P1-Fälle |',
              '| SQL Server 2022 | `16.0.4265.3` | 160 | [Run 29640112513](https://github.com/gecompat/SQL_Server_Analyze/actions/runs/29640112513) | `PASS_WITH_LIMITATIONS`; alle 17 P0- und die ersten zwanzig P1-Fälle |':
              f'| SQL Server 2022 | `16.0.4265.3` | 160 | [Run {runs["2022"]}](https://github.com/gecompat/SQL_Server_Analyze/actions/runs/{runs["2022"]}) | `PASS_WITH_LIMITATIONS`; alle 17 P0- und die ersten achtundzwanzig P1-Fälle |',
              '| SQL Server 2025 | `17.0.4065.4` | 170 | [Run 29640112494](https://github.com/gecompat/SQL_Server_Analyze/actions/runs/29640112494) | `PASS_WITH_LIMITATIONS`; alle 17 P0- und die ersten zwanzig P1-Fälle; `REGEX_MATRIX=PASS` |':
              f'| SQL Server 2025 | `17.0.4065.4` | 170 | [Run {runs["2025"]}](https://github.com/gecompat/SQL_Server_Analyze/actions/runs/{runs["2025"]}) | `PASS_WITH_LIMITATIONS`; alle 17 P0- und die ersten achtundzwanzig P1-Fälle; `REGEX_MATRIX=PASS` |',
              'Er startet die elf folgenden Verträge und danach acht Bereichs-Smoke-Tests':
              'Er startet die zwölf folgenden Verträge und danach acht Bereichs-Smoke-Tests',
              '   - `Integration/174_P1_Schema_Runtime_Contract.sql`\n   - Common, Current State':
              '   - `Integration/174_P1_Schema_Runtime_Contract.sql`\n   - `Integration/175_P1_Statistics_Runtime_Contract.sql`\n   - Common, Current State',
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f'Missing Test_Matrix.md replacement anchor: {old[:80]}')
              text = text.replace(old, new, 1)
          matrix_path.write_text(text, encoding='utf-8')

          release_path = Path('Documentation/Quality/Release_Notes.md')
          text = release_path.read_text(encoding='utf-8')
          anchor = '- Die neunzehnte Suite automatisiert nicht vertrauenswürdige Constraints, fehlende FK-Stützindizes, exakt gleiche Indexdefinitionen und hohen Identity-Typwertebereichsverbrauch. Alle generischen DDL-Fixtures werden im Erfolgs- und Fehlerpfad ausdrücklich entfernt. Commit `c405946d7806472f42cfc38430d5ada33620780c` hat die Suite auf SQL Server 2019, 2022 und 2025 bestätigt.\n'
          addition = anchor + f'- Die zwanzigste Suite automatisiert acht Statistikverteilungsfälle mit begrenzten synthetischen FULLSCAN-Histogrammen: gleichmäßig, dominant, Tail-konzentriert, geändert, gefiltert, inkrementell, kandidatenseitig begrenzt und `CATALOG_DEEP`-verweigert. Commit `{commit}` hat die Suite auf SQL Server 2019, 2022 und 2025 bestätigt. Die Auswertung bleibt Indikator und führt weder Statistikupdates noch Benutzerdaten-Scans aus.\n'
          if anchor not in text:
              raise SystemExit('Missing Release_Notes anchor.')
          release_path.write_text(text.replace(anchor, addition, 1), encoding='utf-8')

          readme_path = Path('README.md')
          text = readme_path.read_text(encoding='utf-8')
          old = 'Der Release-Gate-Vertrag umfasst nun 19 Suiten; P0 und die ersten zwanzig P1-Fälle bis Schema-/Designkorrektheit besitzen commitbezogene Drei-Versionen-Evidenz. Als nächste P1-Gruppe folgt die begrenzte Statistikverteilung.'
          new = 'Der Release-Gate-Vertrag umfasst nun 20 Suiten; P0 und die ersten achtundzwanzig P1-Fälle bis einschließlich Statistikverteilung besitzen commitbezogene Drei-Versionen-Evidenz. Als nächste P1-Gruppe folgt die tiefe Availability-Evidenz.'
          if old not in text:
              raise SystemExit('Missing README evidence anchor.')
          readme_path.write_text(text.replace(old, new, 1), encoding='utf-8')

          audit_path = Path('Metadata/Quality/Special_Case_Release_Audit.json')
          audit = json.loads(audit_path.read_text(encoding='utf-8'))
          audit['generatedAtUtc'] = '2026-07-18T12:34:20Z'
          audit['scope'] = 'green commit-specific 20-suite SQL Server 2019, 2022 and 2025 evidence through eight P1 statistics-distribution cases'
          checks = audit['staticChecks']
          checks['p1StatisticsRuntimeContract'] = {
              'status': 'ACTIONS_PASS_WITH_LIMITATIONS',
              'suite': 'Code/Tests/Integration/175_P1_Statistics_Runtime_Contract.sql',
              'syntheticCases': 8,
              'caseIds': sorted(statistic_ids),
              'boundedFullscanFixtures': True,
              'candidateLimitValidated': True,
              'restrictedCatalogDeepPathValidated': True,
              'userTableDataPersisted': False,
              'runtimeDataPersisted': False,
              'validatedCommit': commit,
              'sqlServer2019ActionsRun': f'https://github.com/gecompat/SQL_Server_Analyze/actions/runs/{runs["2019"]}',
              'sqlServer2022ActionsRun': f'https://github.com/gecompat/SQL_Server_Analyze/actions/runs/{runs["2022"]}',
              'sqlServer2025ActionsRun': f'https://github.com/gecompat/SQL_Server_Analyze/actions/runs/{runs["2025"]}',
              'note': 'The suite passed on SQL Server 2019, 2022 and 2025 using bounded synthetic histograms and a transactional restricted group path. Distribution indicators do not prove plan quality and no statistics update or user-data scan is executed by the analysis module.'
          }
          td = audit['testDocumentation']
          td['releaseGateSuiteRows'] = 47
          td['releaseGateSuiteRowsNotExecuted'] = 15
          td['releaseGateSuiteRowsPass'] = 8
          td['releaseGateSuiteRowsPassWithLimitations'] = 24
          td['specialCaseRowsNotExecuted'] = 127
          td['specialCaseRowsPassWithLimitations'] = 54
          td['claim'] = f'Commit {commit} passed the synthetic Linux installer, 20-suite release gate and permission contract on SQL Server 2019, 2022 and 2025, including all 17 P0 cases and the first twenty-eight P1 cases through statistics distribution plus the separate SQL Server 2025 regex matrix. Statistics and schema findings remain review tasks; no automatic statistics or schema change or restore was executed. Exact public product builds and immutable container image digests were retained. Further feature-positive, boundary, load, Windows, Azure MI and external restore evidence remain separate.'
          td['targetRuntimeEvidence']['sqlServer2019']['actionRun'] = f'https://github.com/gecompat/SQL_Server_Analyze/actions/runs/{runs["2019"]}'
          td['targetRuntimeEvidence']['sqlServer2022']['actionRun'] = f'https://github.com/gecompat/SQL_Server_Analyze/actions/runs/{runs["2022"]}'
          td['targetRuntimeEvidence']['sqlServer2025']['actionRun'] = f'https://github.com/gecompat/SQL_Server_Analyze/actions/runs/{runs["2025"]}'
          ae = td['actionEvidence']
          ae['commitSha'] = commit
          ae['sqlServer2019Run'] = f'https://github.com/gecompat/SQL_Server_Analyze/actions/runs/{runs["2019"]}'
          ae['sqlServer2022Run'] = f'https://github.com/gecompat/SQL_Server_Analyze/actions/runs/{runs["2022"]}'
          ae['sqlServer2025Run'] = f'https://github.com/gecompat/SQL_Server_Analyze/actions/runs/{runs["2025"]}'
          ae['sqlServer2025RegexRun'] = f'https://github.com/gecompat/SQL_Server_Analyze/actions/runs/{runs["2025"]}'
          audit_path.write_text(json.dumps(audit, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          Path('.github/workflows/update-p1-statistics-evidence.yml').unlink()
          PY

      - name: Commit evidence update
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Metadata/Quality/Special_Case_Test_Cases.csv \
                  Metadata/Quality/Special_Case_Release_Audit.json \
                  Documentation/Quality/Test_Matrix.md \
                  Documentation/Quality/Release_Notes.md \
                  README.md \
                  .github/workflows/update-p1-statistics-evidence.yml
          git commit -m 'docs: finalize P1 statistics evidence'
          git push
