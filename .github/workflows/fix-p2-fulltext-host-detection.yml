name: Fix P2 Full-Text host detection

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/fix-p2-fulltext-host-detection.yml'

permissions:
  contents: write
  statuses: write

jobs:
  fix:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Use dm_os_host_info for platform detection
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          path=Path('Code/Tests/Integration/183_P2_FullText_Runtime_Contract.sql')
          text=path.read_text(encoding='utf-8')
          start_marker="DECLARE @IsInstalled bit=COALESCE(TRY_CONVERT(bit,SERVERPROPERTY(N'IsFullTextInstalled')),0);"
          end_marker='    THEN 1 ELSE 0 END);'
          start=text.index(start_marker)
          end=text.index(end_marker,start)+len(end_marker)
          replacement='\n'.join([
              start_marker,
              'DECLARE @HostPlatform nvarchar(32)=',
              '    (SELECT TOP (1) [host_platform] FROM [sys].[dm_os_host_info]);',
              'DECLARE @CanCreateFixtures bit=CONVERT(bit,CASE',
              '    WHEN @IsInstalled=1',
              "     AND LOWER(COALESCE(@HostPlatform,CONVERT(nvarchar(32),SERVERPROPERTY(N'HostPlatform')),N''))<>N'linux'",
              '    THEN 1 ELSE 0 END);',
          ])
          path.write_text(text[:start]+replacement+text[end:],encoding='utf-8',newline='\n')
          PY
      - name: Commit fix and remove helper
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/fix-p2-fulltext-host-detection.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Code/Tests/Integration/183_P2_FullText_Runtime_Contract.sql .github/workflows/fix-p2-fulltext-host-detection.yml
          git diff --cached --check
          git commit -m 'test: detect Linux for P2 Full-Text fixtures'
          git push origin HEAD:main
      - name: Publish helper status
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
        run: |
          set -euo pipefail
          state='success'; if [ "$JOB_STATUS" != 'success' ]; then state='failure'; fi
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state="$state" -f description='P2 Full-Text host detection helper' \
            -f context='p2-fulltext-host-helper' >/dev/null
