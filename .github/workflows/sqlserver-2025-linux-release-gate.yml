name: SQL Server 2025 Linux release gate

on:
  pull_request:
    paths:
      - '.github/workflows/sqlserver-2025-linux-release-gate.yml'
      - 'Code/**/*.sql'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/sqlserver-2025-linux-release-gate.yml'
      - 'Code/**/*.sql'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sqlserver-2025-linux-release-gate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  patch-contracts:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out target branch
        uses: actions/checkout@v6
        with:
          ref: agent/sqlserver-2025-regex-contracts

      - name: Apply permission and runbook fixes
        shell: python
        run: |
          from pathlib import Path

          sql_path = Path('Code/02_CurrentState/010_USP_CurrentSessions.sql')
          sql_text = sql_path.read_text(encoding='utf-8')
          sql_replacements = {
              'Version      : 2.0.1': 'Version      : 2.0.2',
              'Stand        : 2026-07-16': 'Stand        : 2026-07-18',
              "@ErrorNumber IN(229,262,297,300,916)": "@ErrorNumber IN(229,262,297,300,368,371,373,916)",
          }
          for old, new in sql_replacements.items():
              if sql_text.count(old) != 1:
                  raise RuntimeError(f'Expected CurrentSessions anchor once: {old!r}; found {sql_text.count(old)}.')
              sql_text = sql_text.replace(old, new, 1)
          sql_path.write_text(sql_text, encoding='utf-8', newline='\n')

          runbook_path = Path('Documentation/Quality/Release_Gate_Runbook.md')
          runbook = runbook_path.read_text(encoding='utf-8')
          old_section = '''Der Workflow `.github/workflows/sqlserver-2025-linux-release-gate.yml` verwendet das offizielle Image `mcr.microsoft.com/mssql/server:2025-latest`, erzwingt Product Major Version 17, Compatibility Level 170 und die gemeinsame case-sensitive Collation. Installer, 13-Suite-Release-Gate und die SQL-Server-2022+-Berechtigungsmatrix laufen gegen ausschließlich synthetische Job- und Principalnamen.

Wie bei den anderen Targets werden Kennwort und Datenbank erst im Job erzeugt, vollständige Ausgaben nicht als Artefakt persistiert, Fehlerartefakte auf eine generische Kurzfassung und einen Tag Retention begrenzt und der Container immer entfernt.
'''
          new_section = '''Der Workflow `.github/workflows/sqlserver-2025-linux-release-gate.yml` verwendet das offizielle Image `mcr.microsoft.com/mssql/server:2025-latest`, erzwingt Product Major Version 17, Compatibility Level 170 und die gemeinsame case-sensitive Collation. Installer, 13-Suite-Release-Gate und die SQL-Server-2022+-Berechtigungsmatrix laufen gegen ausschließlich synthetische Job- und Principalnamen.

Zusätzlich führt der Workflow `Code/Tests/VersionAdaptive/120_SQL_Server_2025_Regex_Matrix.sql` aus. Die Matrix prüft `REGEXP_LIKE` als Prädikat, die Präfixe `regex:` und `regexi:`, repräsentative Frameworkfilter sowie das kontrollierte `UNAVAILABLE_FEATURE` nach temporärer Absenkung auf Compatibility Level 160. Der Test stellt Compatibility Level 170 auch nach einem Fehler wieder her und bestätigt anschließend erneut die Regex-Verfügbarkeit.

Eine vorgelagerte statische Workflowprüfung verbietet Skalarvergleiche wie `REGEXP_LIKE(...)=0`, `=1`, `<>0`, `<>1`, `!=0` oder `!=1`. SQL Server 2025 behandelt `REGEXP_LIKE` als Prädikat; Negation erfolgt mit `NOT REGEXP_LIKE(...)`.

SQL Server 2025 kann fehlende Performance-State-Rechte über die kombinierten SQL-/External-Policy-Fehler 368, 371 oder 373 melden. `USP_CurrentSessions` klassifiziert diese Meldungen als `DENIED_PERMISSION`, nicht als allgemeinen Laufzeitfehler.

Wie bei den anderen Targets werden Kennwort und Datenbank erst im Job erzeugt, vollständige Ausgaben nicht als Artefakt persistiert, Fehlerartefakte auf eine generische Kurzfassung und einen Tag Retention begrenzt und der Container immer entfernt.
'''
          if runbook.count(old_section) != 1:
              raise RuntimeError(f'Expected SQL Server 2025 runbook section once; found {runbook.count(old_section)}.')
          runbook_path.write_text(runbook.replace(old_section, new_section, 1), encoding='utf-8', newline='\n')

      - name: Commit contract fixes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Code/02_CurrentState/010_USP_CurrentSessions.sql Documentation/Quality/Release_Gate_Runbook.md
          git diff --cached --quiet && exit 0
          git commit -m 'fix: classify SQL Server 2025 policy denials'
          git push origin HEAD:agent/sqlserver-2025-regex-contracts

  release-gate:
    name: SQL Server 2025 Linux release gate
    runs-on: ubuntu-24.04
    timeout-minutes: 35

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Validate regex predicate syntax
        shell: python
        run: |
          import re
          from pathlib import Path

          invalid = []
          comparison = re.compile(r"REGEXP_LIKE\s*\(.*\)\s*(?:=|<>|!=)\s*[01]", re.IGNORECASE)
          for path in sorted(Path("Code").rglob("*.sql")):
              for line_number, line in enumerate(path.read_text(encoding="utf-8").splitlines(), 1):
                  if comparison.search(line):
                      invalid.append(f"{path}:{line_number}: {line.strip()}")
          if invalid:
              print("REGEXP_LIKE is a predicate and must not be compared with 0 or 1:")
              print("\n".join(invalid))
              raise SystemExit(1)

      - name: Prepare isolated SQL files
        shell: bash
        run: |
          set -euo pipefail
          cp -R Code "$RUNNER_TEMP/Code"
          find "$RUNNER_TEMP/Code" -type f -name '*.sql' -print0 \
            | xargs -0 perl -pi -e 's/\[DeineDatenbank\]/[SQLServerAnalyzeTest]/g'

      - name: Generate ephemeral SQL credential
        shell: bash
        run: |
          set -euo pipefail
          password="A$(openssl rand -hex 16)a1!"
          echo "::add-mask::$password"
          echo "MSSQL_EPHEMERAL_PASSWORD=$password" >> "$GITHUB_ENV"

      - name: Start SQL Server 2025 Linux
        shell: bash
        run: |
          set -euo pipefail
          docker pull --quiet mcr.microsoft.com/mssql/server:2025-latest >/dev/null
          docker run --name sqlserver-analyze-test-2025 \
            --detach \
            --env ACCEPT_EULA=Y \
            --env MSSQL_PID=Developer \
            --env MSSQL_COLLATION=SQL_Latin1_General_CP1_CS_AS \
            --env MSSQL_SA_PASSWORD="$MSSQL_EPHEMERAL_PASSWORD" \
            --volume "$RUNNER_TEMP/Code:/work/Code:ro" \
            mcr.microsoft.com/mssql/server:2025-latest >/dev/null

      - name: Wait for SQL Server readiness
        shell: bash
        run: |
          set -euo pipefail
          sqlcmd_path=''
          readiness_query="SET NOCOUNT ON; IF TRY_CONVERT(int,SERVERPROPERTY(N'ProductMajorVersion'))<>17 THROW 50000,N'VERSION_NOT_READY',1; IF CONVERT(sysname,SERVERPROPERTY(N'Collation'))<>N'SQL_Latin1_General_CP1_CS_AS' OR CONVERT(sysname,DATABASEPROPERTYEX(N'tempdb',N'Collation'))<>N'SQL_Latin1_General_CP1_CS_AS' THROW 50001,N'COLLATION_NOT_READY',1; SELECT 1;"
          for attempt in $(seq 1 120); do
            sqlcmd_path=$(docker exec sqlserver-analyze-test-2025 bash -lc \
              "if [ -x /opt/mssql-tools18/bin/sqlcmd ]; then echo /opt/mssql-tools18/bin/sqlcmd; elif [ -x /opt/mssql-tools/bin/sqlcmd ]; then echo /opt/mssql-tools/bin/sqlcmd; fi" \
              || true)
            if [ -n "$sqlcmd_path" ] && docker exec \
              --env SQLCMDPASSWORD="$MSSQL_EPHEMERAL_PASSWORD" \
              sqlserver-analyze-test-2025 \
              "$sqlcmd_path" -S localhost -U sa -C -b -Q "$readiness_query" >/dev/null 2>&1; then
              echo "SQLCMD_PATH=$sqlcmd_path" >> "$GITHUB_ENV"
              exit 0
            fi
            sleep 2
          done
          docker logs --tail 40 sqlserver-analyze-test-2025
          exit 1

      - name: Create synthetic test database
        shell: bash
        run: |
          set -euo pipefail
          docker exec \
            --env SQLCMDPASSWORD="$MSSQL_EPHEMERAL_PASSWORD" \
            sqlserver-analyze-test-2025 \
            "$SQLCMD_PATH" -S localhost -U sa -C -b -Q \
            "CREATE DATABASE [SQLServerAnalyzeTest] COLLATE SQL_Latin1_General_CP1_CS_AS; ALTER DATABASE [SQLServerAnalyzeTest] SET COMPATIBILITY_LEVEL = 170;" >/dev/null

      - name: Install framework
        shell: bash
        run: |
          set -euo pipefail
          install_log="$RUNNER_TEMP/sqlserver-analyze-install.log"
          error_summary="$RUNNER_TEMP/sqlserver-analyze-error.txt"
          if ! docker exec \
            --env SQLCMDPASSWORD="$MSSQL_EPHEMERAL_PASSWORD" \
            --workdir /work/Code/Install \
            sqlserver-analyze-test-2025 \
            "$SQLCMD_PATH" -S localhost -U sa -C -b -i Install_All.sql >"$install_log" 2>&1; then
            echo 'Framework installation failed.'
            {
              grep -A 2 -E 'Msg [0-9]+|Sqlcmd: Error|Error:' "$install_log" | tail -n 100 || true
              echo 'Unresolved SQLCMD variable references:'
              grep -R -n -E '\$\([A-Za-z_][A-Za-z0-9_]*\)' "$RUNNER_TEMP/Code" || true
            } >"$error_summary"
            cat "$error_summary"
            exit 1
          fi
          echo 'Framework installation succeeded.'

      - name: Run release gate
        shell: bash
        run: |
          set -euo pipefail
          release_log="$RUNNER_TEMP/sqlserver-analyze-release-gate.log"
          error_summary="$RUNNER_TEMP/sqlserver-analyze-error.txt"
          if ! docker exec \
            --env SQLCMDPASSWORD="$MSSQL_EPHEMERAL_PASSWORD" \
            --workdir /work/Code/Tests \
            sqlserver-analyze-test-2025 \
            "$SQLCMD_PATH" -S localhost -U sa -C -b -i Run_Release_Gate.sql >"$release_log" 2>&1; then
            echo 'Release gate failed.'
            {
              echo 'Release-gate markers:'
              grep -E 'RELEASE_GATE [0-9]+/[0-9]+' "$release_log" | tail -n 40 || true
              echo 'Detected SQL errors:'
              grep -B 2 -A 4 -E 'Msg [0-9]+|Sqlcmd: Error|Error:' "$release_log" | tail -n 120 || true
              echo 'Final release-gate output:'
              tail -n 120 "$release_log"
            } >"$error_summary"
            cat "$error_summary"
            exit 1
          fi
          echo 'Release gate succeeded.'

      - name: Run SQL Server 2025 permission matrix
        shell: bash
        run: |
          set -euo pipefail
          permission_log="$RUNNER_TEMP/sqlserver-analyze-permission-matrix.log"
          error_summary="$RUNNER_TEMP/sqlserver-analyze-error.txt"
          if ! docker exec \
            --env SQLCMDPASSWORD="$MSSQL_EPHEMERAL_PASSWORD" \
            --workdir /work/Code/Tests \
            sqlserver-analyze-test-2025 \
            "$SQLCMD_PATH" -S localhost -U sa -C -b \
            -v PermissionMatrixPassword="$MSSQL_EPHEMERAL_PASSWORD" ExpectedMajorVersion=17 \
            -i Permissions/110_SQL_Server_2022_Permission_Matrix.sql >"$permission_log" 2>&1; then
            echo 'Permission matrix failed.'
            {
              echo 'Final permission-matrix output:'
              tail -n 220 "$permission_log"
            } >"$error_summary"
            cat "$error_summary"
            exit 1
          fi
          echo 'Permission matrix succeeded.'

      - name: Run SQL Server 2025 regex matrix
        shell: bash
        run: |
          set -euo pipefail
          regex_log="$RUNNER_TEMP/sqlserver-analyze-regex-matrix.log"
          error_summary="$RUNNER_TEMP/sqlserver-analyze-error.txt"
          if ! docker exec \
            --env SQLCMDPASSWORD="$MSSQL_EPHEMERAL_PASSWORD" \
            --workdir /work/Code/Tests \
            sqlserver-analyze-test-2025 \
            "$SQLCMD_PATH" -S localhost -U sa -C -b \
            -i VersionAdaptive/120_SQL_Server_2025_Regex_Matrix.sql >"$regex_log" 2>&1; then
            echo 'Regex matrix failed.'
            {
              echo 'Final regex-matrix output:'
              tail -n 220 "$regex_log"
            } >"$error_summary"
            cat "$error_summary"
            exit 1
          fi
          echo 'Regex matrix succeeded.'

      - name: Record generic success summary
        if: success()
        shell: bash
        run: |
          {
            echo '## SQL Server 2025 Linux release gate'
            echo '- Target: synthetic SQL Server 2025 Developer on Linux'
            echo '- Compatibility level: 170'
            echo '- Installer: passed'
            echo '- Release gate: passed'
            echo '- Permission matrix: passed'
            echo '- Regex matrix: passed'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload sanitized failure summary
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: sqlserver-2025-linux-release-gate-error
          path: ${{ runner.temp }}/sqlserver-analyze-error.txt
          if-no-files-found: ignore
          retention-days: 1

      - name: Stop synthetic SQL Server
        if: always()
        shell: bash
        run: docker rm --force sqlserver-analyze-test-2025 >/dev/null 2>&1 || true
