name: Temporary locate release gate error

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  locate:
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Check out branch
        uses: actions/checkout@v6
        with:
          ref: agent/validate-sqlserver-2022-linux-gate

      - name: Locate metadata source contracts
        shell: bash
        run: |
          set -euo pipefail
          {
            echo '=== THROW 541xx ==='
            grep -R -n -C 5 -E 'THROW[[:space:]]+541[0-9]+' Code/Tests || true
            echo '=== metadata-source wording ==='
            grep -R -n -i -C 8 -E 'metadatenquellen|read-only|service.?broker|service_queues|transmission_queue|conversation_endpoints' Code/Tests || true
          } > /tmp/release-gate-contract-location.txt
          cat /tmp/release-gate-contract-location.txt

      - name: Upload location
        uses: actions/upload-artifact@v7
        with:
          name: release-gate-contract-location
          path: /tmp/release-gate-contract-location.txt
          if-no-files-found: error
          retention-days: 1
