name: Temporary locate release gate error

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  locate:
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Check out branch
        uses: actions/checkout@v6
        with:
          ref: agent/validate-sqlserver-2022-linux-gate

      - name: Locate message
        shell: bash
        run: |
          set -euo pipefail
          grep -R -n -C 6 'Service-Broker-Analyse' Code > /tmp/service-broker-contract-location.txt
          cat /tmp/service-broker-contract-location.txt

      - name: Upload location
        uses: actions/upload-artifact@v7
        with:
          name: service-broker-contract-location
          path: /tmp/service-broker-contract-location.txt
          if-no-files-found: error
          retention-days: 1
