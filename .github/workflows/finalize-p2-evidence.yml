name: Finalize complete P2 evidence

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/finalize-p2-evidence.yml'

permissions:
  contents: write
  actions: read
  statuses: write

jobs:
  finalize:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Read final SQL workflow evidence
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          for run_id in 29656121684 29656121674 29656121672; do
            gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}"
          done | jq -s '.' > "$RUNNER_TEMP/p2-runs.json"

      - name: Normalize README finalizer rules
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          path=Path('.github/scripts/finalize_p2_evidence.py')
          text=path.read_text(encoding='utf-8')
          start_marker='for relative in ("README.md", "Documentation/README.md"):'
          end_marker='relative = "Documentation/Architecture/Special_Case_Modules.md"'
          start=text.index(start_marker)
          end=text.index(end_marker,start)
          replacement='\n'.join([
              'relative = "README.md"',
              'path = ROOT / relative',
              'text = path.read_text(encoding="utf-8")',
              'text, count = re.subn(',
              '    r"Der Release-Gate-Vertrag umfasst nun \\d+ Suiten;.*?Weitere Feature-Positiv-, Grenzwert-, Last- und externe Restorefälle bleiben separate Nachweise\\.",',
              '    "Der Release-Gate-Vertrag umfasst nun 31 Suiten; alle 17 P0-, 40 P1- und 124 P2-Fälle besitzen commitbezogene Drei-Versionen-Evidenz. Die 115 zuvor offenen P2-Zeilen sind abgeschlossen. Feature-positive Windows-/Azure-MI-Zustände, Lasttests und externe Restorefälle bleiben separate Nachweise.",',
              '    text,',
              '    count=1,',
              ')',
              'if count != 1:',
              '    raise SystemExit("Missing README release-gate status: README.md")',
              'write_text(relative, text)',
              '',
              'relative = "Documentation/README.md"',
              'text = (ROOT / relative).read_text(encoding="utf-8")',
              'text = regex_once(',
              '    text,',
              '    r"^Die Version `1\\.1\\.0-special\\.9`.*$",',
              '    "Die Version `1.1.0-special.9` besitzt einen 31-Suite-Vertrag mit commitbezogener Drei-Versionen-Evidenz für alle 17 P0-, 40 P1- und 124 P2-Fälle. Feature-positive Windows-/Azure-MI-Zustände, Lasttests und externe Restorebeweise bleiben getrennte Evidence-Klassen.",',
              '    "documentation README status",',
              '    re.MULTILINE,',
              ')',
              'write_text(relative, text)',
              '',
          ])
          path.write_text(text[:start]+replacement+text[end:],encoding='utf-8',newline='\n')
          PY

      - name: Compile and finalize P2 evidence
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RUNS_JSON: ${{ runner.temp }}/p2-runs.json
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          if ! output=$(python3 -m py_compile .github/scripts/finalize_p2_evidence.py 2>&1 && python3 .github/scripts/finalize_p2_evidence.py 2>&1); then
            printf '%s\n' "$output"
            export FINALIZER_OUTPUT="$output"
            slug=$(python3 - <<'PY'
          import os,re
          lines=[line.strip() for line in os.environ.get('FINALIZER_OUTPUT','').splitlines() if line.strip()]
          value=lines[-1] if lines else 'unknown-finalizer-error'
          value=re.sub(r'[^a-z0-9]+','-',value.lower()).strip('-')[:140] or 'unknown-finalizer-error'
          print(value)
          PY
            )
            gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
              -f state='failure' \
              -f target_url="$RUN_URL" \
              -f description='P2 finalizer generated-content validation failed' \
              -f context="p2-finalizer-error/${slug}" >/dev/null
            exit 1
          fi
          printf '%s\n' "$output"

      - name: Commit evidence and remove temporary finalizer
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/finalize-p2-evidence.yml
          rm .github/scripts/finalize_p2_evidence.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'docs: finalize complete P2 evidence'
          git push origin HEAD:main

      - name: Publish finalizer status
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          state='success'; if [ "$JOB_STATUS" != 'success' ]; then state='failure'; fi
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state="$state" \
            -f target_url="$RUN_URL" \
            -f description='Complete P2 evidence finalizer' \
            -f context='complete-p2-evidence-finalizer' >/dev/null
