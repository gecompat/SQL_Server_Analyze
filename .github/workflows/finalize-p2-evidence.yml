name: Finalize complete P2 evidence

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/finalize-p2-evidence.yml'

permissions:
  contents: write
  actions: read
  statuses: write

jobs:
  finalize:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Read final SQL workflow evidence
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          for run_id in 29656121684 29656121674 29656121672; do
            gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}"
          done | jq -s '.' > "$RUNNER_TEMP/p2-runs.json"

      - name: Compile and finalize P2 evidence
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RUNS_JSON: ${{ runner.temp }}/p2-runs.json
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          if ! output=$(python3 -m py_compile .github/scripts/finalize_p2_evidence.py 2>&1 && python3 .github/scripts/finalize_p2_evidence.py 2>&1); then
            printf '%s\n' "$output"
            export FINALIZER_OUTPUT="$output"
            slug=$(python3 - <<'PY'
          import os,re
          lines=[line.strip() for line in os.environ.get('FINALIZER_OUTPUT','').splitlines() if line.strip()]
          value=lines[-1] if lines else 'unknown-finalizer-error'
          value=re.sub(r'[^a-z0-9]+','-',value.lower()).strip('-')[:140] or 'unknown-finalizer-error'
          print(value)
          PY
            )
            gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
              -f state='failure' \
              -f target_url="$RUN_URL" \
              -f description='P2 finalizer generated-content validation failed' \
              -f context="p2-finalizer-error/${slug}" >/dev/null
            exit 1
          fi
          printf '%s\n' "$output"

      - name: Commit evidence and remove temporary finalizer
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/finalize-p2-evidence.yml
          rm .github/scripts/finalize_p2_evidence.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'docs: finalize complete P2 evidence'
          git push origin HEAD:main

      - name: Publish finalizer status
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          state='success'; if [ "$JOB_STATUS" != 'success' ]; then state='failure'; fi
          gh api --method POST "repos/${GITHUB_REPOSITORY}/statuses/${GITHUB_SHA}" \
            -f state="$state" \
            -f target_url="$RUN_URL" \
            -f description='Complete P2 evidence finalizer' \
            -f context='complete-p2-evidence-finalizer' >/dev/null
