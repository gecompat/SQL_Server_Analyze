name: Fix P2 UDT binding

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/fix-p2-udt-binding.yml'

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          path=Path('Code/Tests/Integration/179_P2_Special_Feature_Inventory_Runtime_Contract.sql')
          text=path.read_text(encoding='utf-8')
          old="""    CREATE TYPE [dbo].[ExampleFeatureType] FROM int NOT NULL;
    CREATE TABLE [dbo].[ExampleFeatureTypes]
    (
        [Id] int NOT NULL,
        [SpatialGeometry] geometry NULL,
        [SpatialGeography] geography NULL,
        [XmlValue] xml NULL,
        [TypedValue] [dbo].[ExampleFeatureType] NULL
    );"""
          new="""    CREATE TYPE [dbo].[ExampleFeatureType] FROM int NOT NULL;
    SET @Sql=N'CREATE TABLE [dbo].[ExampleFeatureTypes]
    (
        [Id] int NOT NULL,
        [SpatialGeometry] geometry NULL,
        [SpatialGeography] geography NULL,
        [XmlValue] xml NULL,
        [TypedValue] [dbo].[ExampleFeatureType] NOT NULL
    );';
    EXEC [sys].[sp_executesql] @Sql;"""
          if text.count(old)!=1:
              raise SystemExit('unexpected UDT fixture anchor')
          path.write_text(text.replace(old,new,1),encoding='utf-8',newline='\n')
          PY
      - shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/fix-p2-udt-binding.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Code/Tests/Integration/179_P2_Special_Feature_Inventory_Runtime_Contract.sql .github/workflows/fix-p2-udt-binding.yml
          git diff --cached --check
          git commit -m 'test: defer P2 UDT table binding'
          git push origin HEAD:main
