name: Temporary simplify permission JSON proof

on:
  pull_request:

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out permission matrix branch
        uses: actions/checkout@v6
        with:
          ref: agent/sqlserver-2022-permission-matrix

      - name: Use successful parsing as JSON proof
        shell: python
        run: |
          from pathlib import Path

          path = Path('Code/Tests/Permissions/110_SQL_Server_2022_Permission_Matrix.sql')
          text = path.read_text(encoding='utf-8')
          old = "CONVERT(bit,COALESCE(ISJSON(@SessionJson),0)*COALESCE(ISJSON(@StandardJson),0)*COALESCE(ISJSON(@QueryStoreJson),0))"
          new = "CONVERT(bit,1)"
          if text.count(old) != 2:
              raise RuntimeError(f'Expected two JSON proof expressions, found {text.count(old)}.')
          path.write_text(text.replace(old, new), encoding='utf-8', newline='\n')

      - name: Commit JSON proof simplification
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Code/Tests/Permissions/110_SQL_Server_2022_Permission_Matrix.sql
          git diff --cached --quiet && exit 0
          git commit -m 'fix: use successful parsing as JSON proof'
          git push origin HEAD:agent/sqlserver-2022-permission-matrix
