name: Temporary centralize permission scenario errors

on:
  pull_request:

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out permission matrix branch
        uses: actions/checkout@v6
        with:
          ref: agent/sqlserver-2022-permission-matrix

      - name: Centralize impersonation error handling
        shell: python
        run: |
          from pathlib import Path

          path = Path('Code/Tests/Permissions/110_SQL_Server_2022_Permission_Matrix.sql')
          text = path.read_text(encoding='utf-8')

          old_start = "    SET @Sql=N'\nBEGIN TRY\n    EXECUTE AS LOGIN="
          new_start = "    SET @Sql=N'\n    EXECUTE AS LOGIN="
          if text.count(old_start) != 1:
              raise RuntimeError(f'Expected dynamic TRY start once, found {text.count(old_start)}.')
          text = text.replace(old_start, new_start, 1)

          old_end = """    REVERT;
          END TRY
          BEGIN CATCH
              DECLARE @InnerError nvarchar(2048)=ERROR_MESSAGE();
              REVERT;
              RAISERROR(N''%s'',16,1,@InnerError);
              RETURN;
          END CATCH;'""".replace('          ', '')
          new_end = "    REVERT;'"
          if text.count(old_end) != 1:
              raise RuntimeError(f'Expected dynamic TRY/CATCH end once, found {text.count(old_end)}.')
          text = text.replace(old_end, new_end, 1)

          old_outer = """    BEGIN CATCH
              DECLARE @ScenarioError nvarchar(2048)=CONCAT(N'Permission scenario ',@ScenarioCode,N' failed at line ',ERROR_LINE(),N': ',ERROR_MESSAGE());
              THROW 54209,@ScenarioError,1;
          END CATCH;""".replace('          ', '')
          new_outer = """    BEGIN CATCH
              DECLARE @ScenarioErrorLine int=ERROR_LINE();
              DECLARE @ScenarioErrorText nvarchar(2048)=ERROR_MESSAGE();
              BEGIN TRY
                  REVERT;
              END TRY
              BEGIN CATCH
                  SET @ScenarioErrorText=@ScenarioErrorText;
              END CATCH;
              DECLARE @ScenarioError nvarchar(2048)=CONCAT(N'Permission scenario ',@ScenarioCode,N' failed at line ',@ScenarioErrorLine,N': ',@ScenarioErrorText);
              THROW 54209,@ScenarioError,1;
          END CATCH;""".replace('          ', '')
          if text.count(old_outer) != 1:
              raise RuntimeError(f'Expected outer scenario catch once, found {text.count(old_outer)}.')
          text = text.replace(old_outer, new_outer, 1)

          path.write_text(text, encoding='utf-8', newline='\n')

      - name: Commit centralized error handling
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Code/Tests/Permissions/110_SQL_Server_2022_Permission_Matrix.sql
          git diff --cached --quiet && exit 0
          git commit -m 'fix: centralize permission scenario errors'
          git push origin HEAD:agent/sqlserver-2022-permission-matrix
