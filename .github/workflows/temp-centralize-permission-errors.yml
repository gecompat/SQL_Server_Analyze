name: Temporary centralize permission scenario errors

on:
  pull_request:

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out permission matrix branch
        uses: actions/checkout@v6
        with:
          ref: agent/sqlserver-2022-permission-matrix

      - name: Centralize impersonation error handling
        shell: python
        run: |
          from pathlib import Path

          path = Path('Code/Tests/Permissions/110_SQL_Server_2022_Permission_Matrix.sql')
          text = path.read_text(encoding='utf-8')

          sql_start = text.index("    SET @Sql=N'\n")
          body_start = sql_start + len("    SET @Sql=N'\n")
          execute_anchor = "    EXECUTE AS LOGIN="
          execute_pos = text.index(execute_anchor, body_start)
          prefix = text[body_start:execute_pos]
          if prefix.strip() != 'BEGIN TRY':
              raise RuntimeError(f'Unexpected dynamic prefix: {prefix!r}')
          text = text[:body_start] + text[execute_pos:]

          sql_start = text.index("    SET @Sql=N'\n")
          success_revert = text.index("\n    REVERT;\nEND TRY\nBEGIN CATCH\n", sql_start)
          dynamic_end = text.index("END CATCH;'", success_revert) + len("END CATCH;'")
          text = text[:success_revert] + "\n    REVERT;'" + text[dynamic_end:]

          wrapper_marker = "    RAISERROR(N'PERMISSION_MATRIX scenario=%s',10,1,@ScenarioCode) WITH NOWAIT;"
          wrapper_pos = text.index(wrapper_marker, sql_start)
          outer_catch_start = text.index("    BEGIN CATCH\n", wrapper_pos)
          outer_catch_end = text.index("    END CATCH;", outer_catch_start) + len("    END CATCH;")
          new_outer = """    BEGIN CATCH
              DECLARE @ScenarioErrorLine int=ERROR_LINE();
              DECLARE @ScenarioErrorText nvarchar(2048)=ERROR_MESSAGE();
              BEGIN TRY
                  REVERT;
              END TRY
              BEGIN CATCH
                  SET @ScenarioErrorText=@ScenarioErrorText;
              END CATCH;
              DECLARE @ScenarioError nvarchar(2048)=CONCAT(N'Permission scenario ',@ScenarioCode,N' failed at line ',@ScenarioErrorLine,N': ',@ScenarioErrorText);
              THROW 54209,@ScenarioError,1;
          END CATCH;""".replace('          ', '')
          text = text[:outer_catch_start] + new_outer + text[outer_catch_end:]

          path.write_text(text, encoding='utf-8', newline='\n')

      - name: Commit centralized error handling
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Code/Tests/Permissions/110_SQL_Server_2022_Permission_Matrix.sql
          git diff --cached --quiet && exit 0
          git commit -m 'fix: centralize permission scenario errors'
          git push origin HEAD:agent/sqlserver-2022-permission-matrix
