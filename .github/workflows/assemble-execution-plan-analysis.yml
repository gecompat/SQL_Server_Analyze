name: Assemble execution plan analysis sources

on:
  push:
    branches:
      - agent/implement-execution-plan-analysis
    paths:
      - '.bootstrap/epa/**'
      - '.github/workflows/assemble-execution-plan-analysis.yml'

permissions:
  contents: write

jobs:
  assemble:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Assemble canonical SQL sources
        shell: bash
        run: |
          set -euo pipefail
          cat .bootstrap/epa/bundle.part* > /tmp/epa.b64
          base64 -d /tmp/epa.b64 > /tmp/epa.zip
          unzip -o /tmp/epa.zip -d .
          rm -rf .bootstrap
          rm -f .github/workflows/assemble-execution-plan-analysis.yml

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m 'Add execution plan analysis core'
            git push
          fi
