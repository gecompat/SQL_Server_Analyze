name: Temporary fix SQL Server 2025 workflow paths

on:
  pull_request:

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out SQL Server 2025 branch
        uses: actions/checkout@v6
        with:
          ref: agent/sqlserver-2025-linux-release-gate

      - name: Fix runner path handling
        shell: python
        run: |
          from pathlib import Path

          path = Path('.github/workflows/sqlserver-2025-linux-release-gate.yml')
          text = path.read_text(encoding='utf-8')
          old = '''          from pathlib import Path

          source = Path("${RUNNER_TEMP}/Code/Tests/Permissions/110_SQL_Server_2022_Permission_Matrix.sql")
          target = Path("${RUNNER_TEMP}/Code/Tests/Permissions/110_SQL_Server_2025_Permission_Matrix.sql")'''
          new = '''          import os
          from pathlib import Path

          temp_root = Path(os.environ["RUNNER_TEMP"])
          source = temp_root / "Code/Tests/Permissions/110_SQL_Server_2022_Permission_Matrix.sql"
          target = temp_root / "Code/Tests/Permissions/110_SQL_Server_2025_Permission_Matrix.sql"'''
          if text.count(old) != 1:
              raise RuntimeError(f'Expected runner-path block once; found {text.count(old)}.')
          path.write_text(text.replace(old, new, 1), encoding='utf-8', newline='\n')

      - name: Commit path fix
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/workflows/sqlserver-2025-linux-release-gate.yml
          git diff --cached --quiet && exit 0
          git commit -m 'fix: resolve SQL Server 2025 runner paths'
          git push origin HEAD:agent/sqlserver-2025-linux-release-gate
