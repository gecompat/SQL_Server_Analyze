name: Temporary document SQL Server 2025 regex matrix

on:
  pull_request:

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out SQL Server 2025 branch
        uses: actions/checkout@v6
        with:
          ref: agent/sqlserver-2025-regex-contracts

      - name: Extend current runbook section
        shell: python
        run: |
          from pathlib import Path

          path = Path('Documentation/Quality/Release_Gate_Runbook.md')
          text = path.read_text(encoding='utf-8')
          old = '''Der Workflow `.github/workflows/sqlserver-2025-linux-release-gate.yml` verwendet das offizielle Image `mcr.microsoft.com/mssql/server:2025-latest`, erzwingt Product Major Version 17, Compatibility Level 170 und die gemeinsame case-sensitive Collation. Installer, 13-Suite-Release-Gate und die SQL-Server-2022+-Berechtigungsmatrix laufen gegen ausschließlich synthetische Job- und Principalnamen.

Wie bei den anderen Targets werden Kennwort und Datenbank erst im Job erzeugt, vollständige Ausgaben nicht als Artefakt persistiert, Fehlerartefakte auf eine generische Kurzfassung und einen Tag Retention begrenzt und der Container immer entfernt.
'''
          new = '''Der Workflow `.github/workflows/sqlserver-2025-linux-release-gate.yml` verwendet das offizielle Image `mcr.microsoft.com/mssql/server:2025-latest`, erzwingt Product Major Version 17, Compatibility Level 170 und die gemeinsame case-sensitive Collation. Installer, 13-Suite-Release-Gate und die SQL-Server-2022+-Berechtigungsmatrix laufen gegen ausschließlich synthetische Job- und Principalnamen.

Zusätzlich führt der Workflow `Code/Tests/VersionAdaptive/120_SQL_Server_2025_Regex_Matrix.sql` aus. Die Matrix prüft `REGEXP_LIKE` als Prädikat, die Präfixe `regex:` und `regexi:`, repräsentative Frameworkfilter sowie das kontrollierte `UNAVAILABLE_FEATURE` nach temporärer Absenkung auf Compatibility Level 160. Der Test stellt Compatibility Level 170 auch nach einem Fehler wieder her und bestätigt anschließend erneut die Regex-Verfügbarkeit.

Eine vorgelagerte statische Workflowprüfung verbietet Skalarvergleiche wie `REGEXP_LIKE(...)=0`, `=1`, `<>0`, `<>1`, `!=0` oder `!=1`. SQL Server 2025 behandelt `REGEXP_LIKE` als Prädikat; Negation erfolgt mit `NOT REGEXP_LIKE(...)`.

Wie bei den anderen Targets werden Kennwort und Datenbank erst im Job erzeugt, vollständige Ausgaben nicht als Artefakt persistiert, Fehlerartefakte auf eine generische Kurzfassung und einen Tag Retention begrenzt und der Container immer entfernt.
'''
          if text.count(old) != 1:
              raise RuntimeError(f'Expected SQL Server 2025 runbook section once; found {text.count(old)}.')
          path.write_text(text.replace(old, new, 1), encoding='utf-8', newline='\n')

      - name: Commit runbook update
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Documentation/Quality/Release_Gate_Runbook.md
          git diff --cached --quiet && exit 0
          git commit -m 'docs: document SQL Server 2025 regex matrix'
          git push origin HEAD:agent/sqlserver-2025-regex-contracts
