name: Temporary fix filter and temporal contract

on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  fix-contract:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Check out branch
        uses: actions/checkout@v6
        with:
          ref: agent/validate-sqlserver-2022-linux-gate

      - name: Fix parser fixture and Temporal update target
        shell: python
        run: |
          from pathlib import Path

          test_path = Path('Code/Tests/Integration/165_Filter_Output_Contract.sql')
          test_text = test_path.read_text(encoding='utf-8')
          replacements = {
              "FROM [monitor].[TVF_ParseFullObjectNameList](N'[DeineDatenbank].[dbo].[A|B]|[dbo].[C]')":
                  "FROM [monitor].[TVF_ParseFullObjectNameList](N'[ExampleDatabase].[dbo].[A|B]|[dbo].[C]')",
              "WHERE [ItemOrdinal]=1 AND [DatabaseName]=N'DeineDatenbank' AND [SchemaName]=N'dbo' AND [ObjectName]=N'A|B' AND [IsValid]=1":
                  "WHERE [ItemOrdinal]=1 AND [DatabaseName]=N'ExampleDatabase' AND [SchemaName]=N'dbo' AND [ObjectName]=N'A|B' AND [IsValid]=1",
          }
          for old, new in replacements.items():
              if test_text.count(old) != 1:
                  raise RuntimeError(f'Expected parser fixture anchor exactly once: {old}')
              test_text = test_text.replace(old, new, 1)
          test_path.write_text(test_text, encoding='utf-8', newline='\n')

          temporal_path = Path('Code/09_VersionAdaptive/040_USP_TemporalAnalysis.sql')
          temporal_text = temporal_path.read_text(encoding='utf-8')
          old = "           AND [f].[Severity]='WARN') THEN 'REVIEW' ELSE 'AVAILABLE' END;\n\n    UPDATE [ds]"
          new = "           AND [f].[Severity]='WARN') THEN 'REVIEW' ELSE 'AVAILABLE' END\n    FROM [#TemporalTable] AS [tt];\n\n    UPDATE [ds]"
          if temporal_text.count(old) != 1:
              raise RuntimeError('Expected Temporal update suffix exactly once.')
          temporal_text = temporal_text.replace(old, new, 1)
          temporal_path.write_text(temporal_text, encoding='utf-8', newline='\n')

      - name: Commit contract fixes
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Code/Tests/Integration/165_Filter_Output_Contract.sql Code/09_VersionAdaptive/040_USP_TemporalAnalysis.sql
          git diff --cached --quiet && exit 0
          git commit -m 'fix: repair filter fixture and Temporal update'
          git push origin HEAD:agent/validate-sqlserver-2022-linux-gate
