name: Temporary fix XE 2019 compatibility

on:
  push:
    branches:
      - agent/sqlserver-2019-linux-release-gate
  pull_request:

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out SQL Server 2019 branch
        uses: actions/checkout@v6
        with:
          ref: agent/sqlserver-2019-linux-release-gate

      - name: Add version-adaptive XE target-memory handling
        shell: python
        run: |
          from pathlib import Path

          path = Path('Code/06_ExtendedEvents/010_USP_ExtendedEventsSessions.sql')
          text = path.read_text(encoding='utf-8')

          replacements = {
              'Version      : 1.0.1': 'Version      : 1.0.2',
              'Änderungen   : 1.0.1 - Alias [ObjectType] für die sortierte Feldklassifikation ergänzt.': 'Änderungen   : 1.0.2 - total_target_memory wird nur bei nachgewiesener Spaltenverfügbarkeit gelesen; SQL Server 2019 liefert NULL.\n               1.0.1 - Alias [ObjectType] für die sortierte Feldklassifikation ergänzt.',
              '                CASE WHEN @MitLaufzeitstatus = 1 THEN [r].[total_target_memory] END,': '                CAST(NULL AS bigint),',
          }
          for old, new in replacements.items():
              if text.count(old) != 1:
                  raise RuntimeError(f'Expected anchor once: {old!r}; found {text.count(old)}.')
              text = text.replace(old, new, 1)

          anchor = '            SELECT @RowCount = COUNT_BIG(*) FROM [#Sessions];'
          addition = '''            IF @MitLaufzeitstatus = 1
               AND EXISTS
               (
                   SELECT 1
                   FROM [sys].[all_objects] AS [o] WITH (NOLOCK)
                   INNER JOIN [sys].[schemas] AS [sc] WITH (NOLOCK)
                       ON [sc].[schema_id]=[o].[schema_id]
                   INNER JOIN [sys].[all_columns] AS [c] WITH (NOLOCK)
                       ON [c].[object_id]=[o].[object_id]
                   WHERE [sc].[name]=N'sys'
                     AND [o].[name]=N'dm_xe_sessions'
                     AND [c].[name]=N'total_target_memory'
               )
            BEGIN
                DECLARE @TargetMemorySql nvarchar(max)=N'
UPDATE [s]
SET [TotalTargetMemoryBytes]=[r].[total_target_memory]
FROM [#Sessions] AS [s]
INNER JOIN [sys].[dm_xe_sessions] AS [r]
    ON [r].[name]=[s].[SessionName];';
                EXEC [sys].[sp_executesql] @TargetMemorySql;
            END;

            SELECT @RowCount = COUNT_BIG(*) FROM [#Sessions];'''
          if text.count(anchor) != 1:
              raise RuntimeError(f'Expected row-count anchor once; found {text.count(anchor)}.')
          text = text.replace(anchor, addition, 1)
          path.write_text(text, encoding='utf-8', newline='\n')

      - name: Commit compatibility fix
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Code/06_ExtendedEvents/010_USP_ExtendedEventsSessions.sql
          git diff --cached --quiet && exit 0
          git commit -m 'fix: support XE sessions on SQL Server 2019'
          git push origin HEAD:agent/sqlserver-2019-linux-release-gate
