name: Retry P1 availability contract

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/retry-p1-availability-contract.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Execute verified availability patch
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import textwrap
          source=Path('.github/workflows/apply-p1-availability-contract.yml').read_text(encoding='utf-8').splitlines()
          begin=next(i for i,line in enumerate(source) if "python3 - <<'PY'" in line)+1
          end=next(i for i in range(begin,len(source)) if source[i].strip()=='PY')
          script=textwrap.dedent('\n'.join(source[begin:end]))
          exec(compile(script,'availability_apply.py','exec'),{})
          PY
      - name: Commit verified implementation
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/apply-p1-availability-contract.yml
          rm -f .github/workflows/retry-p1-availability-contract.yml
          rm -f .github/workflows/diagnose-p1-availability-apply.yml
          rm -f Metadata/Quality/Availability_Apply_Diagnostic.json
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Code Metadata/Inventory/Objects.csv .github/workflows Metadata/Quality/Availability_Apply_Diagnostic.json
          git diff --cached --check
          git commit -m 'test: automate P1 availability cases'
          git pull --rebase origin main
          git push origin HEAD:main
