name: Temporary fix permission matrix

on:
  push:
    branches:
      - agent/sqlserver-2022-permission-matrix
  pull_request:

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out permission matrix branch
        uses: actions/checkout@v6
        with:
          ref: agent/sqlserver-2022-permission-matrix

      - name: Replace unsupported DROP LOGIN syntax
        shell: python
        run: |
          from pathlib import Path
          import re

          path = Path('Code/Tests/Permissions/110_SQL_Server_2022_Permission_Matrix.sql')
          text = path.read_text(encoding='utf-8')
          pattern = re.compile(r'^DROP LOGIN IF EXISTS \[(Example[A-Za-z]+Login)\];$', re.MULTILINE)

          def replacement(match: re.Match[str]) -> str:
              name = match.group(1)
              return (
                  f"IF EXISTS(SELECT 1 FROM [sys].[server_principals] WHERE [name]=N'{name}') "
                  f"DROP LOGIN [{name}];"
              )

          updated, count = pattern.subn(replacement, text)
          if count != 6:
              raise RuntimeError(f'Expected six unsupported DROP LOGIN statements, found {count}.')
          path.write_text(updated, encoding='utf-8', newline='\n')

      - name: Commit syntax fix
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add Code/Tests/Permissions/110_SQL_Server_2022_Permission_Matrix.sql
          git diff --cached --quiet && exit 0
          git commit -m 'fix: use supported login cleanup syntax'
          git push origin HEAD:agent/sqlserver-2022-permission-matrix
